<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sube las fotos de tu menú</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{--marca:#FCBD43;--tinta:#222;--crema:#fff;--ok:#1FA85B;--gris:#8a8a8a;--linea:#ececec}
    html,body{height:100%}
    body{font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif;background:#f6f6f7;color:var(--tinta);
         max-width:560px;margin:0 auto;padding-bottom:40px}
    img{display:block}
    .oculto{display:none!important}

    /* ---- Cabecera ---- */
    header{position:sticky;top:0;z-index:10;background:var(--tinta);color:#fff;padding:14px 16px 12px;
           box-shadow:0 2px 12px rgba(0,0,0,.12)}
    .h-top{display:flex;align-items:center;gap:11px}
    .h-logo{width:42px;height:42px;border-radius:11px;object-fit:cover;background:var(--marca);flex:none}
    .h-tit{font-size:.78rem;opacity:.75;font-weight:600;letter-spacing:.2px}
    .h-nom{font-size:1.18rem;font-weight:800;line-height:1.15}
    .prog-wrap{margin-top:12px}
    .prog-bar{height:9px;border-radius:99px;background:rgba(255,255,255,.18);overflow:hidden}
    .prog-fill{height:100%;width:0;border-radius:99px;background:var(--marca);transition:width .35s ease}
    .prog-txt{display:flex;justify-content:space-between;align-items:center;margin-top:7px;font-size:.82rem}
    .prog-txt b{color:var(--marca)}
    .filtro{margin-top:11px;display:flex;align-items:center;gap:8px;font-size:.85rem;cursor:pointer;
            user-select:none;width:fit-content}
    .filtro input{width:17px;height:17px;accent-color:var(--marca)}

    /* ---- Lista ---- */
    .cat{margin:18px 14px 6px;font-size:.72rem;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--gris)}
    .card{display:flex;align-items:center;gap:12px;background:#fff;margin:9px 12px;padding:11px;border-radius:15px;
          box-shadow:0 1px 5px rgba(0,0,0,.05)}
    .thumb{width:62px;height:62px;border-radius:12px;flex:none;background:#f0f0f0;display:flex;align-items:center;
           justify-content:center;font-size:1.7rem;overflow:hidden;position:relative}
    .thumb img{width:100%;height:100%;object-fit:cover}
    .info{flex:1;min-width:0}
    .nom{font-size:.97rem;font-weight:700;line-height:1.2}
    .estado{font-size:.76rem;color:var(--gris);margin-top:3px;display:flex;align-items:center;gap:4px}
    .estado.lista{color:var(--ok);font-weight:700}
    .btn{border:none;border-radius:11px;padding:10px 14px;font-size:.86rem;font-weight:800;cursor:pointer;flex:none;
         background:var(--marca);color:var(--tinta);min-width:96px}
    .btn.sec{background:#f0f0f0;color:#555}
    .btn:active{transform:scale(.96)}
    .btn.cargando{opacity:.6;pointer-events:none}
    .ring{width:14px;height:14px;border:2.5px solid rgba(0,0,0,.25);border-top-color:var(--tinta);border-radius:50%;
          display:inline-block;animation:spin .7s linear infinite;vertical-align:-2px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ---- Estados pantalla ---- */
    .pantalla{padding:48px 26px;text-align:center}
    .pantalla .emo{font-size:2.6rem}
    .pantalla h2{margin:14px 0 6px;font-size:1.15rem}
    .pantalla p{color:var(--gris);font-size:.92rem;line-height:1.5}

    /* ---- Celebración ---- */
    .done-banner{margin:14px 12px;padding:16px;border-radius:15px;background:#e9f9ef;color:var(--ok);
                 text-align:center;font-weight:700;font-size:.95rem;border:1px solid #c7eed5}

    /* ---- Toast ---- */
    #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);
           background:#222;color:#fff;padding:11px 18px;border-radius:12px;font-size:.88rem;font-weight:600;
           box-shadow:0 6px 24px rgba(0,0,0,.25);transition:transform .3s ease;z-index:50;max-width:90%}
    #toast.show{transform:translateX(-50%) translateY(0)}
    #toast.err{background:#c0392b}
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="toast"></div>

  <!-- Configs de cada local (única fuente del restauranteId + paleta) -->
  <script src="restaurantes/papazota.js"></script>
  <script src="restaurantes/srmoro.js"></script>

  <script>
  (function(){
    'use strict';
    var SUPA_URL  = "https://wfpdtjmmrhhfuxayvpzu.supabase.co";
    var SUPA_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmcGR0am1tcmhoZnV4YXl2cHp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzE1NDksImV4cCI6MjA4ODY0NzU0OX0.Iyeogfs5AIiVrM5agXuMZsgFrud460OYvn0zkYgJH0s";
    var WEBHOOK_FOTO = "https://restaurante1-n8n.bqspdc.easypanel.host/webhook/subir-foto-vitrina";

    var params = new URLSearchParams(location.search);
    var rid_key = params.get("r") || "srmoro";
    var TOKEN   = (params.get("token") || "").trim();
    var cfg = (window.RESTAURANTES && window.RESTAURANTES[rid_key]) || null;

    var root  = document.getElementById("root");
    var toastEl = document.getElementById("toast");
    var soloFaltan = false;
    var items = [];           // [{id,nombre,categoria,foto_url}]
    var conFoto = 0, total = 0;

    function pantalla(emo, tit, txt){
      root.innerHTML =
        '<div class="pantalla"><div class="emo">'+emo+'</div><h2>'+tit+'</h2><p>'+txt+'</p></div>';
    }
    function toast(msg, err){
      toastEl.textContent = msg;
      toastEl.className = "show" + (err ? " err" : "");
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(function(){ toastEl.className = ""; }, err ? 4200 : 2200);
    }
    function esc(s){ return String(s||"").replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

    /* ---- Validaciones de entrada ---- */
    if (!cfg){ pantalla("🤔","Local no encontrado",
        'El enlace no trae un local válido. Pídele a DEWAN el enlace correcto.'); return; }
    if (!TOKEN){ pantalla("🔒","Falta tu código de acceso",
        'Este enlace no incluye el código para subir fotos. Pídele a DEWAN tu enlace personal.'); return; }
    if (!cfg.restauranteId){ pantalla("⚠️","Configuración incompleta",
        'A '+esc(cfg.nombre)+' le falta el restauranteId. Avisa a DEWAN.'); return; }

    /* ---- Aplicar paleta del local ---- */
    document.documentElement.style.setProperty("--marca", cfg.marca || "#FCBD43");
    document.documentElement.style.setProperty("--tinta", cfg.tinta || "#222");

    /* ---- Compresión a webp (igual que la app de menú) ---- */
    function comprimirWebp(file, max){
      return createImageBitmap(file, { imageOrientation: "from-image" }).then(function(img){
        var escala = Math.min(1, max / Math.max(img.width, img.height));
        var c = document.createElement("canvas");
        c.width  = Math.round(img.width  * escala);
        c.height = Math.round(img.height * escala);
        c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
        return new Promise(function(res){ c.toBlob(res, "image/webp", 0.82); });
      });
    }
    function blobABase64(blob){
      return new Promise(function(res){
        var fr = new FileReader();
        fr.onload = function(){ res(String(fr.result).split(",")[1]); };
        fr.readAsDataURL(blob);
      });
    }
    function subirFoto(file, itemId){
      return comprimirWebp(file, 1280).then(function(blob){
        return blobABase64(blob);
      }).then(function(b64){
        return fetch(WEBHOOK_FOTO, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: TOKEN, item_id: itemId, foto_base64: b64 })
        });
      }).then(function(r){
        return r.json().catch(function(){ return {}; }).then(function(out){
          if (!r.ok || !out.ok) throw new Error((out && out.error) || ("HTTP " + r.status));
          return out.url;
        });
      });
    }

    /* ---- Cargar el menú real del local ---- */
    function cargarMenu(){
      var url = SUPA_URL + "/rest/v1/menu_items?restaurante_id=eq." +
                encodeURIComponent(cfg.restauranteId) +
                "&select=id,nombre_item,categoria_menu,foto_url&disponible=eq.true" +
                "&order=categoria_menu.asc,nombre_item.asc";
      return fetch(url, { headers: { apikey: SUPA_ANON, Authorization: "Bearer " + SUPA_ANON } })
        .then(function(r){ if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
        .then(function(rows){
          items = (rows || []).map(function(row){
            return { id: row.id, nombre: row.nombre_item,
                     categoria: row.categoria_menu || "Menú", foto_url: row.foto_url || "" };
          });
        });
    }

    function recalcular(){
      total = items.length;
      conFoto = items.filter(function(it){ return !!it.foto_url; }).length;
    }

    /* ---- Render principal ---- */
    function render(){
      recalcular();
      var pct = total ? Math.round(conFoto / total * 100) : 0;
      var faltan = total - conFoto;

      var h = '<header>'+
        '<div class="h-top">'+
          '<div class="h-logo"></div>'+
          '<div><div class="h-tit">SUBE LAS FOTOS DE TU MENÚ</div>'+
          '<div class="h-nom">'+esc(cfg.nombre)+'</div></div>'+
        '</div>'+
        '<div class="prog-wrap">'+
          '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>'+
          '<div class="prog-txt"><span><b>'+conFoto+'</b> de '+total+' platos con foto</span>'+
            '<span>'+pct+'%</span></div>'+
          (faltan>0 ?
            '<label class="filtro"><input type="checkbox" id="chk-faltan"'+(soloFaltan?' checked':'')+'>'+
            ' Mostrar solo los '+faltan+' que faltan</label>' : '')+
        '</div>'+
      '</header>';

      if (total && faltan === 0){
        h += '<div class="done-banner">🎉 ¡Listo! Todos tus platos ya tienen foto. '+
             'Se ven al instante en DEWAN.</div>';
      }

      var visibles = soloFaltan ? items.filter(function(it){ return !it.foto_url; }) : items;
      var catActual = null;
      visibles.forEach(function(it){
        if (it.categoria !== catActual){
          catActual = it.categoria;
          h += '<div class="cat">'+esc(catActual)+'</div>';
        }
        var tiene = !!it.foto_url;
        h += '<div class="card" id="card-'+it.id+'">'+
          '<div class="thumb">'+ (tiene
              ? '<img src="'+esc(it.foto_url)+'?v='+Date.now()+'" alt="">'
              : '📷') +'</div>'+
          '<div class="info">'+
            '<div class="nom">'+esc(it.nombre)+'</div>'+
            '<div class="estado'+(tiene?' lista':'')+'">'+(tiene?'✓ Con foto':'Sin foto')+'</div>'+
          '</div>'+
          '<button class="btn'+(tiene?' sec':'')+'" data-id="'+it.id+'">'+
            (tiene?'Cambiar':'Subir foto')+'</button>'+
        '</div>';
      });

      if (soloFaltan && !visibles.length){
        h += '<div class="done-banner">🎉 No falta ninguna. ¡Buen trabajo!</div>';
      }

      root.innerHTML = h;
      if (cfg.logo){ var lg=root.querySelector(".h-logo");
        if(lg){ lg.style.backgroundImage='url('+cfg.logo+')'; lg.style.backgroundSize='cover'; lg.style.backgroundPosition='center'; } }

      var chk = document.getElementById("chk-faltan");
      if (chk) chk.addEventListener("change", function(){ soloFaltan = chk.checked; render(); });

      root.querySelectorAll(".btn[data-id]").forEach(function(btn){
        btn.addEventListener("click", function(){ elegirFoto(btn.dataset.id, btn); });
      });
    }

    /* ---- Elegir + subir foto de un plato ---- */
    function elegirFoto(itemId, btn){
      var input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*";
      input.setAttribute("capture", "environment"); // sugiere cámara en el celular
      input.style.display = "none";
      document.body.appendChild(input);
      input.addEventListener("change", function(){
        var file = input.files && input.files[0];
        input.remove();
        if (!file) return;
        btn.classList.add("cargando");
        btn.innerHTML = '<span class="ring"></span>';
        subirFoto(file, itemId).then(function(url){
          var it = items.filter(function(x){ return x.id === itemId; })[0];
          if (it) it.foto_url = url;
          toast("✓ Foto subida");
          render();
        }).catch(function(err){
          btn.classList.remove("cargando");
          btn.textContent = "Reintentar";
          toast("No se pudo subir: " + (err.message || err), true);
        });
      });
      input.click();
    }

    /* ---- Arranque ---- */
    pantalla("⏳","Cargando tu menú…","Un momento.");
    cargarMenu().then(function(){
      if (!items.length){
        pantalla("🍽️","Sin platos","Este local todavía no tiene platos cargados en DEWAN.");
        return;
      }
      render();
    }).catch(function(err){
      pantalla("📡","No pudimos cargar el menú",
        "Revisa tu internet y vuelve a abrir el enlace. ("+esc(err.message||err)+")");
    });
  })();
  </script>
</body>
</html>
