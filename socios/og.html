<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1200px;height:630px;background:#111114;font-family:'Poppins',sans-serif;color:#fff;
    display:flex;align-items:center;overflow:hidden;position:relative}
  body::before{content:'';position:absolute;top:-200px;right:-200px;width:640px;height:640px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,182,39,.25),transparent 70%)}
  .col{position:relative;z-index:1;padding:0 90px}
  img.logo{width:230px;display:block;margin-bottom:36px}
  .pill{display:inline-block;background:#FFB627;color:#111;font-weight:700;font-size:26px;
    padding:12px 26px;border-radius:999px;margin-bottom:26px}
  h1{font-family:'Archivo Black';font-size:64px;line-height:1.1;max-width:900px}
  h1 em{font-style:normal;color:#FFB627}
  p{margin-top:22px;font-size:28px;color:#D8D2CB;font-weight:600}
</style>
</head>
<body>
  <div class="col">
    <img class="logo" src="logo.png" alt="DEWAN">
    <span class="pill">10% solo cuando vendes</span>
    <h1><em>Vende más.</em> Tu local en la app de pedidos de Riobamba</h1>
    <p>Sin mensualidad · App gratis · Motorizados de DEWAN</p>
  </div>
</body>
</html>
