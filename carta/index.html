<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Menú</title>
  <link rel="stylesheet" href="base.css" />
</head>
<body>
  <!-- Configs de cada local -->
  <script src="restaurantes/papazota.js"></script>
  <script src="restaurantes/srmoro.js"></script>
  <script src="restaurantes/baltimore.js"></script>
  <script src="restaurantes/monaco.js"></script>
  <script src="restaurantes/prinfresa.js"></script>
  <script src="restaurantes/texas.js"></script>
  <script src="restaurantes/aidita.js"></script>
  <script src="restaurantes/bogati.js"></script>
  <script src="restaurantes/verdebolon.js"></script>
  <script src="restaurantes/mammamia.js"></script>
  <script src="restaurantes/bellavista.js"></script>
  <script src="restaurantes/demo.js"></script>

  <!-- Helpers compartidos -->
  <script src="templates/_helpers.js"></script>

  <!-- Plantillas de diseño (cada una un layout distinto) -->
  <script src="templates/pz-street.js"></script>
  <script src="templates/pz-delivery.js"></script>
  <script src="templates/pz-pizarra.js"></script>
  <script src="templates/sm-vino.js"></script>
  <script src="templates/sm-mosaico.js"></script>
  <script src="templates/sm-carta.js"></script>
  <script src="templates/sm-luxe.js"></script>
  <script src="templates/sm-delivery.js"></script>
  <script src="templates/sm-circular.js"></script>

  <!-- Sistema PRO de looks (reusables por marca) -->
  <script src="templates/brasa-noir.js"></script>
  <script src="templates/street.js"></script>
  <script src="templates/swift.js"></script>
  <script src="templates/trattoria.js"></script>
  <script src="templates/editorial.js"></script>
  <script src="templates/tostado.js"></script>
  <script src="templates/marea.js"></script>
  <script src="templates/dulce.js"></script>
  <!-- Arquetipos estructurales (esqueletos distintos) -->
  <script src="templates/grid-foto.js"></script>
  <script src="templates/inmersivo.js"></script>
  <script src="templates/ticket.js"></script>
  <script src="templates/premium.js"></script>
  <script src="templates/poster.js"></script>
  <script src="templates/estantes.js"></script>
  <script src="templates/portada.js"></script>
  <script src="templates/revista.js"></script>

  <!-- Aquí pinta la plantilla (header + menú) -->
  <main id="app"></main>

  <!-- Botón flotante (compartido) -->
  <button id="cart-fab" class="oculto">
    <span class="fab-l">🛒 <span id="fab-cant">0</span> · ver pedido</span>
    <span id="fab-total">$0.00</span>
  </button>

  <!-- Panel del carrito (compartido) -->
  <div id="overlay" class="oculto"></div>
  <aside id="cart" class="oculto">
    <div class="cart-head"><h2>Tu pedido</h2><button id="cart-cerrar">✕</button></div>
    <div id="cart-items"></div>
    <div id="cart-vacio">Tu carrito está vacío 🍽️</div>
    <div class="cart-foot">
      <label class="campo">Tu nombre
        <input id="cli-nombre" type="text" placeholder="Ej: Juan Pérez" /></label>
      <label class="campo">Tipo de entrega
        <select id="cli-entrega">
          <option value="Delivery">Delivery a domicilio</option>
          <option value="Retiro en local">Retiro en el local</option>
        </select></label>
      <div id="campo-dir">
        <label class="campo">Dirección
          <input id="cli-dir" type="text" placeholder="Calle, número, referencia" /></label>
        <button type="button" id="cli-ubic" class="ubic-btn">📍 Usar mi ubicación actual</button>
        <div id="ubic-ok" class="ubic-ok oculto">✓ Ubicación adjuntada al pedido</div>
      </div>
      <label class="campo">Nota (opcional)
        <input id="cli-nota" type="text" placeholder="Ej: sin cebolla, tocar timbre..." /></label>

      <label class="fact-toggle"><input type="checkbox" id="cli-fact-chk" /> <span>🧾 ¿Necesitas factura?</span></label>
      <div id="campo-fact" class="oculto">
        <label class="campo">Nombre / Razón social
          <input id="cli-fact-nom" type="text" placeholder="Nombre para la factura" /></label>
        <label class="campo">Cédula / RUC
          <input id="cli-fact-id" type="text" inputmode="numeric" placeholder="Ej: 0601234567" /></label>
        <label class="campo">Correo electrónico
          <input id="cli-fact-mail" type="email" placeholder="correo@ejemplo.com" /></label>
      </div>

      <div class="cart-total"><span>Total</span><strong id="cart-total">$0.00</strong></div>
      <button id="enviar" disabled>Enviar pedido por WhatsApp</button>
    </div>
  </aside>

  <script src="engine.js"></script>
</body>
</html>
