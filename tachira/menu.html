                p.precioUnidad=(precioFinal!=null)?Number(precioFinal):(data.precioUnidad||0);
                p.salsasCada=data.salsasCada||5;
                p.min=data.min||p.salsasCada;
                p.qty=p.min;
                p.sabores=Math.floor(p.qty/p.salsasCada);
            } else {
                p.precio=(precioFinal!=null)?Number(precioFinal):(data.precio||0);
                p.sabores=data.sabores||1;
            }
            window._wingsPending=p;
            var precioShow=porUnidad?(p.qty*p.precioUnidad):p.precio;
            var h='<div class="almuerzo-modal">'+
                '<div class="almuerzo-header">'+
                    '<div class="almuerzo-header-icon">🍗</div>'+
                    '<div class="almuerzo-header-title">'+esc(nombre)+'</div>'+
                    '<div class="almuerzo-header-rest">'+esc(rest)+'</div>'+
                    '<div class="almuerzo-header-price"><span id="wings-price">'+fmtMoney(precioShow,moneda)+'</span></div>'+
                '</div>'+
                (porUnidad?'<div class="wings-row" style="margin-bottom:10px"><span class="wings-salsa-name">🍗 Cantidad de alas</span><div class="wings-stepper"><button class="btn-qty btn-qty-minus" onclick="changeWingQty(-1)">−</button><span class="wings-salsa-count" id="wings-qty">'+p.qty+'</span><button class="btn-qty btn-qty-plus" onclick="changeWingQty(1)">+</button></div></div>':'')+
                '<div class="wings-counter">🌶️ Elige <b id="wings-sabores">'+p.sabores+'</b> salsa(s) · puedes repetir · faltan <span id="wings-left">'+p.sabores+'</span></div>'+
                '<div class="wings-list">';
            salsas.forEach(function(s,i){
                h+='<div class="wings-row">'+
                    '<span class="wings-salsa-name">'+esc(s)+'</span>'+
                    '<div class="wings-stepper">'+
                        '<button class="btn-qty btn-qty-minus" onclick="changeWingSalsa('+i+',-1)">−</button>'+
                        '<span class="wings-salsa-count" id="wcount-'+i+'">0</span>'+
                        '<button class="btn-qty btn-qty-plus" onclick="changeWingSalsa('+i+',1)">+</button>'+
                    '</div>'+
                '</div>';
            });
            h+='</div>'+
                '<button class="btn-almuerzo-add" id="btn-wings-add" onclick="confirmWings()" disabled>🍗 Agregar al pedido</button>'+
                '<button class="btn btn-outline" style="margin-top:8px" onclick="closeModal()">Cancelar</button>'+
            '</div>';
            document.getElementById('modal-content').innerHTML=h;
            document.getElementById('modal-overlay').classList.add('visible');
        };
        // Alitas por unidad: cambia cantidad → recalcula sabores = ⌊cant/salsasCada⌋
        window.changeWingQty=function(delta){
            var p=window._wingsPending; if(!p||!p.porUnidad)return;
            var nq=p.qty+delta; if(nq<p.min)nq=p.min;
            p.qty=nq;
            p.sabores=Math.floor(p.qty/p.salsasCada);
            var total=p.counts.reduce(function(a,b){return a+b},0);
            while(total>p.sabores){ for(var i=0;i<p.counts.length&&total>p.sabores;i++){ if(p.counts[i]>0){p.counts[i]--;total--;} } }
            var qEl=document.getElementById('wings-qty'); if(qEl)qEl.textContent=p.qty;
            var prEl=document.getElementById('wings-price'); if(prEl)prEl.textContent=fmtMoney(p.qty*p.precioUnidad,p.moneda);
            var sEl=document.getElementById('wings-sabores'); if(sEl)sEl.textContent=p.sabores;
            p.counts.forEach(function(c,i){var el=document.getElementById('wcount-'+i);if(el)el.textContent=c;});
            var nt=p.counts.reduce(function(a,b){return a+b},0);
            var lEl=document.getElementById('wings-left'); if(lEl)lEl.textContent=(p.sabores-nt);
            var btn=document.getElementById('btn-wings-add'); if(btn)btn.disabled=(nt!==p.sabores);
        };
        window.changeWingSalsa=function(i,delta){
            var p=window._wingsPending; if(!p)return;
            var total=p.counts.reduce(function(a,b){return a+b},0);
            if(delta>0&&total>=p.sabores) return; // no exceder el máximo
            var nv=p.counts[i]+delta; if(nv<0)nv=0;
            p.counts[i]=nv;
            var cEl=document.getElementById('wcount-'+i); if(cEl)cEl.textContent=nv;
            var newTotal=p.counts.reduce(function(a,b){return a+b},0);
            var leftEl=document.getElementById('wings-left'); if(leftEl)leftEl.textContent=(p.sabores-newTotal);
            var btn=document.getElementById('btn-wings-add'); if(btn)btn.disabled=(newTotal!==p.sabores);
        };
        window.confirmWings=function(){
            var p=window._wingsPending; if(!p)return;
            var _rc=getRestByName(p.rest); if(_rc&&isRestOpen(_rc.horario)===false){ avisarCerrado(_rc); closeModal(); return; }
            var total=p.counts.reduce(function(a,b){return a+b},0);
            if(total!==p.sabores)return;
            var choices=[];
            p.salsas.forEach(function(s,i){ if(p.counts[i]>0) choices.push({salsa:s,n:p.counts[i]}); });
            var precio=p.porUnidad?(Math.round(p.qty*p.precioUnidad*100)/100):p.precio;
            var nombre=p.porUnidad?(p.qty+' Alitas'):p.nombre;
            window._cart.push({restaurante:p.rest,nombre:nombre,precio:precio,delivery:p.delivery,qty:1,wingsChoices:choices,foto_url:p.foto||null,moneda:p.moneda});
            saveCart();
            window._wingsPending=null;
            closeModal();
            refreshView();
        };
        // ── MULTI-GRUPO (ej. 2 ensaladas + 2 salsas) ── N grupos independientes; precio incluido (no suma).
        function openWingsModalGrupos(rest,nombre,data,delivery,precioFinal,foto,moneda){
            moneda=moneda||restMonedaByNombre(rest)||'COP';
            var precio=(precioFinal!=null)?Number(precioFinal):(data.precio||0);
            var grupos=(data.grupos||[]).map(function(g){
                return {label:g.label||'Opciones',emoji:g.emoji||'🌶️',elige:g.elige||1,
                        opciones:g.opciones||[],counts:(g.opciones||[]).map(function(){return 0})};
            });
            var p={rest:rest,nombre:nombre,delivery:delivery,precio:precio,grupos:grupos,foto:foto||null,moneda:moneda};
            window._wingsPending=p;
            var h='<div class="almuerzo-modal">'+
                '<div class="almuerzo-header">'+
                    '<div class="almuerzo-header-icon">🥔</div>'+
                    '<div class="almuerzo-header-title">'+esc(nombre)+'</div>'+
                    '<div class="almuerzo-header-rest">'+esc(rest)+'</div>'+
                    '<div class="almuerzo-header-price">'+fmtMoney(precio,moneda)+'</div>'+
                '</div>';
            grupos.forEach(function(g,gi){
                h+='<div class="wings-counter">'+g.emoji+' Elige <b>'+g.elige+'</b> '+esc(g.label.toLowerCase())+' · puedes repetir · faltan <span id="wleft-'+gi+'">'+g.elige+'</span></div>'+
                   '<div class="wings-list">';
                g.opciones.forEach(function(s,oi){
                    h+='<div class="wings-row">'+
                        '<span class="wings-salsa-name">'+esc(s)+'</span>'+
                        '<div class="wings-stepper">'+
                            '<button class="btn-qty btn-qty-minus" onclick="changeWingGrupo('+gi+','+oi+',-1)">−</button>'+
                            '<span class="wings-salsa-count" id="wgc-'+gi+'-'+oi+'">0</span>'+
                            '<button class="btn-qty btn-qty-plus" onclick="changeWingGrupo('+gi+','+oi+',1)">+</button>'+
                        '</div>'+
                    '</div>';
                });
                h+='</div>';
            });
            h+='<button class="btn-almuerzo-add" id="btn-wings-add" onclick="confirmWingsGrupos()" disabled>🛒 Agregar al pedido</button>'+
                '<button class="btn btn-outline" style="margin-top:8px" onclick="closeModal()">Cancelar</button>'+
            '</div>';
            document.getElementById('modal-content').innerHTML=h;
            document.getElementById('modal-overlay').classList.add('visible');
        }
        function gruposCompletos(p){
            return p.grupos.every(function(g){return g.counts.reduce(function(a,b){return a+b},0)===g.elige;});
        }
        window.changeWingGrupo=function(gi,oi,delta){
            var p=window._wingsPending; if(!p||!p.grupos)return;
            var g=p.grupos[gi]; if(!g)return;
            var total=g.counts.reduce(function(a,b){return a+b},0);
            if(delta>0&&total>=g.elige) return; // no exceder el máximo del grupo
            var nv=g.counts[oi]+delta; if(nv<0)nv=0;
            g.counts[oi]=nv;
            var cEl=document.getElementById('wgc-'+gi+'-'+oi); if(cEl)cEl.textContent=nv;
            var newTotal=g.counts.reduce(function(a,b){return a+b},0);
            var lEl=document.getElementById('wleft-'+gi); if(lEl)lEl.textContent=(g.elige-newTotal);
            var btn=document.getElementById('btn-wings-add'); if(btn)btn.disabled=!gruposCompletos(p);
        };
        window.confirmWingsGrupos=function(){
            var p=window._wingsPending; if(!p||!p.grupos)return;
            var _rc=getRestByName(p.rest); if(_rc&&isRestOpen(_rc.horario)===false){ avisarCerrado(_rc); closeModal(); return; }
            if(!gruposCompletos(p))return;
            var choices=p.grupos.map(function(g){
                var items=[];
                g.opciones.forEach(function(s,i){ if(g.counts[i]>0) items.push({opcion:s,n:g.counts[i]}); });
                return {label:g.label,emoji:g.emoji,items:items};
            });
            window._cart.push({restaurante:p.rest,nombre:p.nombre,precio:p.precio,delivery:p.delivery,qty:1,wingsChoices:choices,foto_url:p.foto||null,moneda:p.moneda});
            saveCart();
            window._wingsPending=null;
            closeModal();
            refreshView();
        };

        // V2: Modal estricto para forzar GPS o dirección antes de pedir
        // FIX: usa #modal-overlay (el contenedor real, igual que Riobamba); #modal-root no existe.
        window.openGPSStrict=function(){
            var modalRoot=document.getElementById('modal-overlay');
            var content=document.getElementById('modal-content');
            if(!modalRoot||!content) return;
            content.innerHTML='<div class="gps-strict">'+
                '<button class="modal-close" onclick="closeModal()" aria-label="Cerrar">✕</button>'+
                '<div class="gps-strict-icon">📍</div>'+
                '<div class="gps-strict-title">¿Dónde llevamos tu pedido?</div>'+
                '<div class="gps-strict-text">Para que tu rider te encuentre al toque necesitamos tu ubicación o una dirección.</div>'+
                '<div class="gps-strict-actions">'+
                    '<button class="btn btn-accent" style="margin:0" onclick="gpsStrictUseLocation()">📍 Usar mi ubicación GPS</button>'+
                    '<button class="btn btn-outline" style="margin:0" onclick="gpsStrictUseAddress()">📝 Escribir mi dirección</button>'+
                '</div>'+
            '</div>';
            modalRoot.classList.add('visible');
        };
        function pulseHint(el){
            if(!el) return;
            el.classList.add('pulse-hint');
            setTimeout(function(){try{el.classList.remove('pulse-hint')}catch(e){}},6000);
        }
        window.gpsStrictUseLocation=function(){
            closeModal();
            setTimeout(function(){
                var gpsBtn=document.getElementById('btn-gps-cart');
                if(gpsBtn){pulseHint(gpsBtn);gpsBtn.scrollIntoView({behavior:'smooth',block:'center'})}
                // Dispara la solicitud de GPS directamente
                if(typeof requestGPSCart==='function'){setTimeout(function(){if(gpsBtn) gpsBtn.click()},300);}
            },150);
        };
        window.gpsStrictUseAddress=function(){
            closeModal();
            setTimeout(function(){
                var addrInput=document.getElementById('loc-addr');
                if(addrInput){
                    addrInput.scrollIntoView({behavior:'smooth',block:'center'});
                    setTimeout(function(){addrInput.focus();pulseHint(addrInput)},320);
                }
            },150);
        };
    })();
    </script>
</body>
