    <script>
    (function(){
        'use strict';
        var SB_URL='https://emmfmcajgskgdtbazbyu.supabase.co';
        var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtbWZtY2FqZ3NrZ2R0YmF6Ynl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMDY1NzAsImV4cCI6MjA5MTg4MjU3MH0.jXArI6rxthXWNLHDUeTnopqC3DLt5e00NKj1cYSkhhk';
        // TODO: cambiar cuando esté el número WhatsApp Venezuela
        var WA='584000000000';
        // Formato moneda Táchira: USD "$9.99" | COP "9.000 COP" | EUR "€9.99" | VES "Bs 9,99"
        function fmtCOP(n){return (Math.round(Number(n)||0)).toLocaleString('es-CO')+' COP'}
        function fmtUSD(n){return '$'+(Number(n)||0).toFixed(2)}
        function fmtEUR(n){return '€'+(Number(n)||0).toFixed(2)}
        function fmtVES(n){return 'Bs '+(Number(n)||0).toFixed(2).replace('.',',')}
        function fmtMoney(n,moneda){
            switch(moneda){
                case 'USD': return fmtUSD(n);
                case 'EUR': return fmtEUR(n);
                case 'VES': return fmtVES(n);
                default: return fmtCOP(n);
            }
        }
        function cartMoneda(){if(!window._cart||!window._cart.length)return 'COP';return window._cart[0].moneda||'COP'}
        function restMonedaByNombre(nombre){try{var arr=(sessionData&&sessionData.resultados)||[];for(var i=0;i<arr.length;i++){if(arr[i].nombre===nombre)return arr[i].moneda||'COP'}}catch(e){}return 'COP'}
        var app=document.getElementById('app');
        var token=new URLSearchParams(window.location.search).get('t');
        // (5) Deep-link de PAUTA (Meta): ?r=<slug-del-local> aterriza directo en ese local (con sus fotos),
        // para que el anuncio NO caiga en la home. Ej: <dominio>?r=happy-pollo
        var AD_REST=new URLSearchParams(window.location.search).get('r')||'';
        var currentSort='precio'; // CAMBIO 1: default "precio" en vez de "distancia"
        var sessionData=null;
        var currentView='home'; // home | rest | cart | search
        var currentRestIdx=null;

        // ── (12) Botón ATRÁS del teléfono: navegar entre vistas internas (home/rest/cart/search)
        //    y cerrar overlays, en vez de salir de la app de una. SPA + History API. ──
        var _popping=false;
        function syncHistory(){
            if(_popping) return;
            var cur=history.state;
            if(!cur||cur.v!==currentView||cur.r!==currentRestIdx){
                try{history.pushState({v:currentView,r:currentRestIdx},'');}catch(e){}
            }
        }
        // ── Carrito bottom-sheet: abrir/cerrar sin cambiar de "página" (el menú queda detrás) ──
        function _cartSheetOpen(){var cs=document.getElementById('cart-sheet');return !!(cs&&cs.classList.contains('open'));}
        function _openCartSheet(){
            var ov=document.getElementById('cart-overlay'),cs=document.getElementById('cart-sheet');
            var wasOpen=!!(cs&&cs.classList.contains('open'));
            if(ov)ov.classList.add('open');
            if(cs){cs.classList.add('open');cs.setAttribute('aria-hidden','false');}
            if(!wasOpen){var sb=document.getElementById('cart-sheet-body'); if(sb)sb.scrollTop=0;} // solo al abrir, no en cada re-render
            document.body.classList.add('sheet-locked');
            var cf=document.getElementById('cart-float'); if(cf)cf.style.display='none';
        }
        function _hideCartSheet(){ // cierre solo-DOM (sin tocar la vista); lo usa la pantalla de éxito
            var ov=document.getElementById('cart-overlay'),cs=document.getElementById('cart-sheet');
            if(ov)ov.classList.remove('open');
            if(cs){cs.classList.remove('open');cs.setAttribute('aria-hidden','true');}
            document.body.classList.remove('sheet-locked');
        }
        window.closeCart=function(){
            _hideCartSheet();
            if(currentView==='cart'){ currentView=(window._prevView||'home'); currentRestIdx=(window._prevView==='rest'?window._prevRest:null); }
            try{updateCartFloat()}catch(e){} // vuelve a mostrar el sticky 🛒 si hay items
        };
        // Cierra, EN ORDEN DE PRIORIDAD, los overlays abiertos. Devuelve true si cerró algo
        // (así el 1er back cierra el overlay y el 2º ya navega).
        function closeAnyOverlay(){
            // 1) Carrito bottom-sheet ABIERTO (prioridad sobre lightbox/modales)
            if(_cartSheetOpen()){ closeCart(); return true; }
            // 2) Lightbox de foto (se monta/desmonta del DOM; sin estado oculto)
            var fz=document.querySelector('.foto-zoom');
            if(fz){ if(window.cerrarZoom){cerrarZoom();}else if(fz.parentNode){fz.parentNode.removeChild(fz);} return true; }
            // 3) Modales que comparten #modal-overlay: WINGS, ALMUERZO y GPS estricto
            var mo=document.getElementById('modal-overlay');
            if(mo&&mo.classList.contains('visible')){ if(window.closeModal){closeModal();}else{mo.classList.remove('visible');} return true; }
            return false;
        }
        try{ if(!history.state) history.replaceState({v:'home',r:null},''); }catch(e){}
        window.addEventListener('popstate',function(e){
            // 1) Si hay un overlay/modal abierto, el back lo CIERRA y no navega (re-apila la vista actual).
            if(closeAnyOverlay()){ try{history.pushState({v:currentView,r:currentRestIdx},'');}catch(e2){} return; }
            // 2) Renderizar la vista del estado destino sin volver a apilar.
            _popping=true;
            var st=e.state||{v:'home',r:null};
            try{
                if(st.v==='rest'&&st.r!=null&&window.openRest){ openRest(st.r); }
                else if(st.v==='cart'&&window.showCart){ showCart(); }
                else if(st.v==='search'&&window.showSearch){ showSearch(''); }
                else { renderHome(); }
            }catch(err){ try{renderHome();}catch(e3){} }
            _popping=false;
        });

        window._cart=[];
        window._clientGPS=null;
        window._clientAddr=''; // CAMBIO 3: dirección de texto
        // (6) Persistir ubicación: la dirección siempre; el GPS solo si es fresco (<2h) para no mandar a una ubicación vieja.
        function guardarUbic(){try{localStorage.setItem('dewan_ubic',JSON.stringify({addr:window._clientAddr||'',gps:window._clientGPS||null,ts:Date.now()}))}catch(e){}}
        function restaurarUbic(){try{var d=JSON.parse(localStorage.getItem('dewan_ubic')||'null');if(!d)return;if(d.addr)window._clientAddr=d.addr;if(d.gps&&d.ts&&(Date.now()-d.ts)<2*60*60*1000)window._clientGPS=d.gps;}catch(e){}}
        restaurarUbic();
        // (4) UUID anónimo persistente del dispositivo. Se vincula al teléfono real cuando el bot recibe el 1er pedido.
        function obtenerUuidCliente(){
            try{
                var u=localStorage.getItem('dewan_cliente_uuid');
                if(u) return u;
                if(window.crypto && crypto.randomUUID) u=crypto.randomUUID();
                else u='c-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,10);
                localStorage.setItem('dewan_cliente_uuid',u);
                return u;
            }catch(_){return 'c-'+Date.now()}
        }
        // V4.6: método de pago — 'efectivo' (default) | 'transferencia'. Persiste en localStorage.
        try{window._payMethod=localStorage.getItem('dewan_pay_method')||'efectivo'}catch(e){window._payMethod='efectivo'}
        window.setPayMethod=function(m){
            window._payMethod=(m==='transferencia'?'transferencia':'efectivo');
            try{localStorage.setItem('dewan_pay_method',window._payMethod)}catch(e){}
            // Update UI sin re-renderizar todo el carrito
            var btnE=document.getElementById('pay-btn-efectivo');
            var btnT=document.getElementById('pay-btn-transferencia');
            var note=document.getElementById('pay-transfer-note');
            if(btnE) btnE.classList.toggle('is-active',window._payMethod==='efectivo');
            if(btnT) btnT.classList.toggle('is-active',window._payMethod==='transferencia');
            if(note) note.style.display=window._payMethod==='transferencia'?'flex':'none';
        };

        // V2: sin token también funciona — es el acceso "directo a la app"
        // Marcar visita (si hay token) y cargar catálogo completo.
        // GPS opcional vía banner discreto en la home.
        try{console.log('%cDEWAN menu-v2.html · build 3.4 · preconnect + nginx cache/gzip · '+new Date().toISOString(),'color:#B8FF00;font-weight:bold')}catch(e){}
        markEtapa('abrio');
        loadSession();

        // GPS Welcome — se mantienen las funciones pero ya no se llaman al inicio
        window.welcomeGPS=function(){
            var st=document.getElementById('welcome-gps-status');
            var btn=document.getElementById('btn-welcome-gps');
            if(st){st.className='gps-status';st.textContent='🔎 Buscando tu ubicación...';}
            if(btn){btn.disabled=true;btn.textContent='🔎 Buscando...';}
            if(!navigator.geolocation){if(st){st.className='gps-status error';st.textContent='Tu navegador no soporta GPS, pero puedes continuar 😊';}if(btn){btn.disabled=false;btn.textContent='📍 Ver restaurantes cerca de ti';}return}
            navigator.geolocation.getCurrentPosition(function(pos){
                window._clientGPS={lat:pos.coords.latitude,lng:pos.coords.longitude};guardarUbic();
                markEtapa('eligio_gps');
                if(st){st.className='gps-status success';st.textContent='✅ ¡Te encontramos!';}
                // Si viene del banner, actualizar la vista
                if(sessionData){
                    currentSort='distancia';
                    renderHome();
                } else {
                    setTimeout(function(){document.getElementById('gps-welcome').style.display='none';app.style.display='block';loadSession()},500);
                }
            },function(err){
                if(st){st.className='gps-status error';st.textContent=err.code===1?'No hay problema, puedes continuar sin ubicación 😊':'No se pudo obtener GPS, pero puedes continuar 😊';}
                if(btn){btn.disabled=false;btn.textContent='📍 Intentar de nuevo';}
            },{enableHighAccuracy:true,timeout:15000});
        };
        window.skipGPS=function(){markEtapa('eligio_sin_gps');document.getElementById('gps-welcome').style.display='none';app.style.display='block';loadSession()};

        // CAMBIO 1: Pedir GPS desde el banner inline
        window.requestGPSFromBanner=function(e){
            e.stopPropagation();
            var banner=document.getElementById('gps-banner');
            if(!banner) return;
            if(!navigator.geolocation){banner.innerHTML='<span style="font-size:0.78rem;color:var(--gris)">Tu navegador no soporta GPS</span>';return}
            banner.innerHTML='<span style="font-size:0.78rem;color:var(--acc)">🔎 Buscando tu ubicación...</span>';
            navigator.geolocation.getCurrentPosition(function(pos){
                window._clientGPS={lat:pos.coords.latitude,lng:pos.coords.longitude};guardarUbic();
                currentSort='distancia';
                renderHome();
            },function(){
                banner.innerHTML='<span style="font-size:0.78rem;color:var(--gris)">No se pudo obtener GPS. Puedes seguir sin ubicación.</span><button class="gps-banner-close" onclick="event.stopPropagation();dismissGPSBanner()">✕</button>';
            },{enableHighAccuracy:true,timeout:15000});
        };
        window.dismissGPSBanner=function(){
            var banner=document.getElementById('gps-banner');
            if(banner) banner.style.display='none';
            try{sessionStorage.setItem('dewan_gps_dismissed','1')}catch(e){}
        };

        // BONUS: tracking por etapa del cliente (abrio, eligio_gps, agrego_carrito, abrio_carrito, confirmo)
        var _etapaEnviada={};
        function markEtapa(etapa){
            _etapaEnviada=_etapaEnviada||{};
            if(_etapaEnviada[etapa]) return;
            _etapaEnviada[etapa]=true;
            if(!token) return; // V2: sin token (acceso directo) no trackeamos etapas
            try{
                var body={etapa_actual:etapa,etapa_at:new Date().toISOString()};
                if(etapa==='abrio'){body.visto=true;body.visto_at=new Date().toISOString();}
                fetch(SB_URL+'/rest/v1/links_sesion?token=eq.'+token,{
                    method:'PATCH',
                    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},
                    body:JSON.stringify(body)
                });
            }catch(e){}
        }

        // V2: Helpers Supabase
        function supaHeaders(){return {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}

        // V2: Normaliza restaurante de la tabla "restaurantes" al shape que el render espera
        function normalizeRest(r){
            return {
                id:r.id, nombre:r.nombre, direccion:r.direccion, telefono:r.telefono,
                horario:r.horario, categoria:r.categoria, activo:r.activo,
                tipo_restaurante:r.tipo_restaurante,
                logo_url:r.logo_url, imagen_url:r.imagen_url, foto_url:r.foto_url,
                moneda:r.moneda||'COP',
                productos:[],
                distancia_km:null, tiempo_estimado_min:null, precio_delivery:null,
                restaurante_lat:r.latitud, restaurante_lng:r.longitud
            };
        }

        // V2: Cargar TODOS los restaurantes activos + (si hay token) la session para tracking/prefill
        function loadSession(){
            var restsReq=fetch(SB_URL+'/rest/v1/restaurantes?select=*&activo=eq.true&order=nombre.asc',{headers:supaHeaders()})
                .then(function(r){return r.json()});
            var almReq=fetch(SB_URL+'/rest/v1/almuerzos_hoy?select=*',{headers:supaHeaders()})
                .then(function(r){return r.json()}).catch(function(){return[]});
            var sessReq=token
                ? fetch(SB_URL+'/rest/v1/links_sesion?token=eq.'+token+'&select=*',{headers:supaHeaders()}).then(function(r){return r.json()}).catch(function(){return []})
                : Promise.resolve([]);
            Promise.all([restsReq,almReq,sessReq]).then(function(arr){
                var raw=arr[0]||[];
                var alm=Array.isArray(arr[1])?arr[1]:[];
                var sess=(arr[2]&&arr[2][0])||null;
                if(!raw.length){showError('Sin datos','No pudimos cargar los restaurantes.');return}
                if(sess&&sess.expira_at&&new Date(sess.expira_at)<new Date()){sess=null}

                // Indexar almuerzos_hoy por restaurante_id para lookup rápido
                window._almuerzosHoy={};
                alm.forEach(function(a){if(a.restaurante_id) window._almuerzosHoy[a.restaurante_id]=a});

                sessionData={
                    resultados:raw.map(normalizeRest),
                    busqueda_texto:(sess&&sess.busqueda_texto)||'',
                    _session:sess,
                    expira_at:sess?sess.expira_at:null
                };
                restoreCart();

                // (5) === Deep-link de PAUTA (Meta): ?r=<slug> abre ese local directamente ===
                // Prioridad sobre el deep-link de WhatsApp. Normaliza nombre->slug y busca match.
                if(AD_REST){
                    var _adSlug=function(s){return removeAccents(String(s||'').toLowerCase()).replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');};
                    var _adTarget=_adSlug(AD_REST);
                    var _adMatch=(sessionData.resultados||[]).find(function(x){return _adSlug(x.nombre)===_adTarget;});
                    if(_adMatch){
                        try{console.log('%cDeep link PAUTA → '+_adMatch.nombre,'color:#B8FF00;font-weight:bold')}catch(e){}
                        openRest(_adMatch.nombre);
                        return;
                    }
                    try{console.warn('Deep link PAUTA: sin match para ?r='+AD_REST)}catch(e){}
                }

                // V4.4: Deep link inteligente desde WhatsApp
                // Tres caminos según la palabra que envía el bot:
                //   1) Palabra GENERICA de categoría ("almuerzos", "pollo", "pizza"...) → activar
                //      la categoría completa con toggleCategoryV2 (ej. 36 restaurantes de almuerzo,
                //      127 de pollo). Solo matchea con `core` (no con keywords accesorias).
                //   2) Palabra ESPECIFICA ("encebollado", "ceviche", "alitas", "chaulafan",
                //      "hot dogs"...) → ejecutar búsqueda automática con showSearch(palabra)
                //      → muestra solo restaurantes que TIENEN ese plato específico.
                //   3) Sin palabra → home normal.
                var deepLinkCat=null;
                var rawBusq=sessionData.busqueda_texto?removeAccents(sessionData.busqueda_texto.toLowerCase().trim()):'';
                if(rawBusq){
                    for(var ck in CAT_MAP_V2){
                        var coreKws=CAT_MAP_V2[ck].core||CAT_MAP_V2[ck].kw;
                        for(var i=0;i<coreKws.length;i++){
                            // Match exacto de palabra (no substring) — evita que "alitas" matchee con "polleria"
                            var coreNorm=removeAccents(coreKws[i].toLowerCase());
                            if(rawBusq===coreNorm||rawBusq===coreNorm+'s'){deepLinkCat=ck;break}
                        }
                        if(deepLinkCat)break;
                    }
                }
                if(deepLinkCat){
                    sessionData.busqueda_texto='';
                    try{console.log('%cDeep link → categoría '+deepLinkCat,'color:#B8FF00')}catch(e){}
                    toggleCategoryV2(deepLinkCat);
                } else if(rawBusq){
                    try{console.log('%cDeep link → búsqueda automática "'+sessionData.busqueda_texto+'"','color:#FF6B35')}catch(e){}
                    var qToSearch=sessionData.busqueda_texto;
                    sessionData.busqueda_texto='';
                    showSearch(qToSearch);
                } else {
                    renderHome();
                }
            }).catch(function(err){
                console.error(err);
                showError('Error de conexion','No pudimos cargar los datos. Revisa tu internet.');
            });
        }

        // V2: Cargar platos de un restaurante (on-demand, cacheado en memoria)

        function _railShuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

        function buildPhotoRail(plates,limit){
            var seen={},seenF={},groups={},order=[];
            (plates||[]).forEach(function(it){
                var p=plateToRailItem(it); if(!p) return;
                var k=p.rest+'|'+p.nombre;
                if(seen[k]||seenF[p.foto_url]) return;       // no repetir plato ni foto
                seen[k]=1; seenF[p.foto_url]=1;
                if(!groups[p.rest]){groups[p.rest]=[];order.push(p.rest);}
                groups[p.rest].push(p);
            });
            // máx 3 por local (muestra aleatoria) + round-robin con locales mezclados → variedad entre locales
            Object.keys(groups).forEach(function(r){groups[r]=_railShuffle(groups[r]).slice(0,3);});
            var localOrder=_railShuffle(order);
            var g={}; localOrder.forEach(function(r){g[r]=groups[r].slice();});
            var pick=[],added=true;
            while(added){ added=false; localOrder.forEach(function(r){ if(g[r].length){pick.push(g[r].shift());added=true;} }); }
            var ab=pick.filter(function(p){return p.abierto!==false}); // abiertos primero
            var ce=pick.filter(function(p){return p.abierto===false}); // cerrados al final
            return ab.concat(ce).slice(0,limit||12);
        }

        // ── Haversine para calcular distancias client-side ──
        function haversine(lat1,lng1,lat2,lng2){
            var R=6371;var dLat=(lat2-lat1)*Math.PI/180;var dLng=(lng2-lng1)*Math.PI/180;
            var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
            return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
        }

        // ── Recalcular distancias con GPS del cliente ──
        function recalcDistances(rests){
            if(!window._clientGPS) return rests;
            var TARIFA_BASE=6000,KM_INCLUIDOS=3,PRECIO_POR_KM=2000,FACTOR_RUTA=1.3;
            // V2.7 FIX: mutar el objeto original en vez de copiar a mano
            // (antes se perdía r.id y otros campos, rompiendo la carga de menu_items)
            rests.forEach(function(r){
                if(r.restaurante_lat&&r.restaurante_lng){
                    var distLineal=haversine(window._clientGPS.lat,window._clientGPS.lng,parseFloat(r.restaurante_lat),parseFloat(r.restaurante_lng));
                    var distRuta=distLineal*FACTOR_RUTA;
                    r.distancia_km=Math.round(distRuta*10)/10;
                    r.tiempo_estimado_min=Math.round(15+distRuta*3);
                    var precio=TARIFA_BASE;
                    if(distRuta>KM_INCLUIDOS) precio=TARIFA_BASE+((distRuta-KM_INCLUIDOS)*PRECIO_POR_KM);
                    r.precio_delivery=Math.round(precio);
                }
            });
            return rests;
        }

        // ── Helpers para matching singular/plural ──
        function normWord(w){
            w=w.toLowerCase().trim();
            if(w.endsWith('es')&&w.length>4) return w.slice(0,-2);
            if(w.endsWith('s')&&w.length>3) return w.slice(0,-1);
            return w;
        }
        function removeAccents(s){
            return s.replace(/á/g,'a').replace(/é/g,'e').replace(/í/g,'i').replace(/ó/g,'o').replace(/ú/g,'u').replace(/ñ/g,'n').replace(/ü/g,'u');
        }
        // V4.5: Generar variantes razonables de una palabra de búsqueda para cubrir
        // tildes (datos con/sin acento) y plurales (chifa↔chifas). Limitado a ~10 variantes
        // para no inflar la query SQL del OR.
        function generateSearchVariants(q){
            var lower=(q||'').toLowerCase().trim();
            if(!lower)return[];
            var set={};
            set[lower]=true;
            // Sin tildes
            var noAcc=removeAccents(lower);
            set[noAcc]=true;
            // Plurales: si termina en 's', sin 's'; si no, +'s'
            function addPlural(w){
                if(w.length<3)return;
                if(w.charAt(w.length-1)==='s') set[w.slice(0,-1)]=true;
                else set[w+'s']=true;
            }
            addPlural(lower); addPlural(noAcc);
            // Si la palabra original no tiene tildes, generar variantes con tilde en cada vocal
            // (cubre el caso "chaulafan" → "chaulafán" cuando los datos tienen tilde).
            // Solo para palabras de hasta 14 chars para mantener la query SQL en tamaño razonable.
            if(lower===noAcc&&lower.length<=14){
                var vmap={a:'á',e:'é',i:'í',o:'ó',u:'ú'};
                for(var i=0;i<noAcc.length;i++){
                    var c=noAcc.charAt(i);
                    if(vmap[c]){
                        var variant=noAcc.slice(0,i)+vmap[c]+noAcc.slice(i+1);
                        set[variant]=true;
                        // y su plural
                        if(variant.charAt(variant.length-1)==='s') set[variant.slice(0,-1)]=true;
                        else set[variant+'s']=true;
                    }
                }
            }
            // Devolver hasta 12 variantes (suficiente para la mayoría)
            return Object.keys(set).slice(0,12);
        }

        // ── (7) Sinónimos de comida (Venezuela / Táchira) ──
        // Cada grupo: t = DISPARADORES (palabras de CATEGORÍA que sí expanden), all = términos a buscar.
        // Buscar un disparador ("parrilla","árabe") expande a sus platos; buscar un PLATO específico
        // ("pepito","mandoca") NO expande -> se busca solo ese plato (más preciso).
        // Solo alimenta la query de PLATOS (menu_items), no la categoría del local.
        var FOOD_SYNONYMS=[
            {t:['hamburguesa','hamburguesas','burger'], all:['hamburguesa','hamburguesas','burger']},
            {t:['perro caliente','perros calientes','hot dog','hotdog','pancho','perro'], all:['perro caliente','perro','hot dog','hotdog','pancho','choripan']},
            {t:['arepa','arepas','arepera'], all:['arepa','arepas','reina pepiada','domino','dominó','pelua','pelúa','catira','rumbera','sifrina']},
            {t:['cachapa','cachapas'], all:['cachapa','cachapas','cachapa con queso','cachapa con cochino']},
            {t:['pabellon','pabellón','comida criolla','criolla'], all:['pabellon','pabellón','pabellon criollo','caraotas','carne mechada','tajada']},
            {t:['tequeños','tequenos','tequeño','tequeno'], all:['tequeño','tequeños','tequenos','dedos de queso','palitos de queso']},
            {t:['pepito','pepitos'], all:['pepito','pepitos']},
            {t:['patacon','patacón','patacones'], all:['patacon','patacón','patacones','tostones']},
            {t:['mandoca','mandocas'], all:['mandoca','mandocas']},
            {t:['empanada','empanadas','empanadita','empanaditas'], all:['empanada','empanadas','empanada de carne','empanada de queso','empanada de pollo','empanada de cazon']},
            {t:['shawarma','shawerma','arabe','árabe','comida arabe','comida árabe'], all:['shawarma','shawerma','arabe','árabe','doner','kebab','falafel']},
            {t:['pasticho','pastichos'], all:['pasticho','pastichos','lasaña','lasagna']},
            {t:['parrilla','parrillada','parrilladas','asadero','churrasco'], all:['parrilla','parrillada','churrasco','pincho','pinchos','chuzo','chuzos','carne asada','a la brasa','costilla','punta trasera']},
            {t:['chuzo','chuzos','pincho','pinchos'], all:['chuzo','chuzos','pincho','pinchos','brocheta']},
            {t:['salchipapa','salchipapas'], all:['salchipapa','salchipapas','papas fritas','papas']},
            {t:['nachos','nacho'], all:['nachos','nacho','tex mex']},
            {t:['pizza','pizzas','pizzeria','pizzería'], all:['pizza','pizzas','pizzeria','pizzería']},
            {t:['chino','china','comida china'], all:['chino','china','comida china','lumpia','lo mein','arroz chino','arroz frito','wantan','chop suey']},
            {t:['pollo','pollos','polleria','pollería','broaster','broster'], all:['pollo','broaster','broster','pollo a la brasa','presa de pollo','pollo frito']},
            {t:['mariscos','marisco','marisqueria','marisquería'], all:['mariscos','ceviche','camaron','camarón','pescado frito','cangrejo']},
            {t:['jugo','jugos','batido','batidos','merengada','merengadas'], all:['jugo','jugos','batido','batidos','merengada','frappe','milkshake','malteada']},
            {t:['postre','postres','dulce','dulces','heladeria','heladería'], all:['postre','postres','helado','torta','quesillo','tres leches','marquesa','golfeado']},
            {t:['desayuno','desayunos'], all:['desayuno','desayunos','arepa','empanada','perico','huevos pericos','cachapa']}
        ];
        // Expande SOLO si la búsqueda toca un DISPARADOR de categoría (no un plato específico).
        function expandSynonyms(q){
            var qn=removeAccents((q||'').toLowerCase()).trim();
            if(qn.length<3) return [];
            var extra={};
            FOOD_SYNONYMS.forEach(function(g){
                var hit=g.t.some(function(term){
                    var tn=removeAccents(term.toLowerCase());
                    return qn===tn||qn.indexOf(tn)!==-1||(qn.length>=4&&tn.indexOf(qn)!==-1);
                });
                if(hit) g.all.forEach(function(term){extra[removeAccents(term.toLowerCase())]=true});
            });
            return Object.keys(extra);
        }
        function simplify(s){
            s=s.toLowerCase().replace(/[^a-záéíóúñü]/g,'');
            var r='';for(var i=0;i<s.length;i++){if(i===0||s[i]!==s[i-1])r+=s[i]}return r;
        }
        function fuzzyMatchStrict(text,query){
            var t=text.toLowerCase(),q=query.toLowerCase();
            if(t.indexOf(q)!==-1) return true;
            var ta=removeAccents(t),qa=removeAccents(q);
            if(ta.indexOf(qa)!==-1) return true;
            var tn=normWord(ta),qn=normWord(qa);
            if(tn.indexOf(qn)!==-1||qn.indexOf(tn)!==-1) return true;
            var words=q.split(' ').filter(function(w){return w.length>2});
            if(words.length===1){
                var wn=removeAccents(normWord(words[0]));
                return ta.indexOf(wn)!==-1||tn.indexOf(wn)!==-1;
            }
            if(words.length>1){
                return words.every(function(w){
                    var wn=removeAccents(normWord(w)),wa=removeAccents(w);
                    return ta.indexOf(wa)!==-1||ta.indexOf(wn)!==-1;
                });
            }
            return false;
        }
        function fuzzyMatchRest(nombre,query){
            var rn=nombre.toLowerCase(),q=query.toLowerCase();
            if(rn.indexOf(q)!==-1||q.indexOf(rn)!==-1) return true;
            var rna=removeAccents(rn),qa=removeAccents(q);
            if(rna.indexOf(qa)!==-1||qa.indexOf(rna)!==-1) return true;
            var sr=simplify(nombre),sb=simplify(query);
            if(sr.indexOf(sb)!==-1||sb.indexOf(sr)!==-1) return true;
            var limpia=q.replace(/\b(pizzeria|pizzería|restaurante|el|la|los|las|de|del|menu|menú)\b/g,'').replace(/\s+/g,' ').trim();
            if(limpia.length>2&&limpia!==q){
                var la=removeAccents(limpia);
                if(rna.indexOf(la)!==-1||la.indexOf(rna)!==-1) return true;
            }
            var words=q.split(' ').filter(function(w){return w.length>2&&!(/^(el|la|los|las|de|del|menu|menú)$/.test(w))});
            if(words.length>=2){
                return words.every(function(w){
                    var wa=removeAccents(w),wn=removeAccents(normWord(w));
                    return rna.indexOf(wa)!==-1||rna.indexOf(wn)!==-1||sr.indexOf(simplify(w))!==-1;
                });
            }
            return false;

        function matchCategoryV2(r,catKey){
            var cm=CAT_MAP_V2[catKey];if(!cm)return false;

            });

        // V2.3: fetch paginado para superar el límite de 1000 filas de PostgREST
        function fetchAllMatchingPlates(orsParam,selectCols){
            var sel=selectCols||'restaurante_id,restaurante_nombre,nombre_item,categoria_menu,descripcion,precio,foto_url';
            var acc=[];
            function page(offset){
                var url=SB_URL+'/rest/v1/menu_items?select='+sel+'&disponible=eq.true&or=('+orsParam+')&order=restaurante_id&limit=1000&offset='+offset;
                return fetch(url,{headers:supaHeaders()}).then(function(r){return r.json()}).then(function(items){
                    items=Array.isArray(items)?items:[];
                    acc=acc.concat(items);
                    if(items.length===1000&&offset<4000) return page(offset+1000);
                    return acc;
                });
            }
            return page(0);
        }

        window.toggleCategoryV2=function(key){

                window._activeCat=null;

                return;
            }
            window._activeCat=key;
            try{window.scrollTo({top:0,behavior:'smooth'})}catch(e){}
            if(window._catRestsCache[key]){
                renderHome();
                return;
            }
            // Query a menu_items con todas las keywords de la categoría (paginada)
            window._catLoading=true;
            renderHome();
            var cm=CAT_MAP_V2[key];
            var ors=cm.kw.map(function(k){
                var kEnc=encodeURIComponent('%'+k+'%');
                return 'nombre_item.ilike.'+kEnc+',descripcion.ilike.'+kEnc+',categoria_menu.ilike.'+kEnc;
            }).join(',');
            fetchAllMatchingPlates(ors)
                .then(function(plates){
                    window._catPlatesCache=window._catPlatesCache||{};
                    window._catPlatesCache[key]=buildPhotoRail(plates,12); // carril de fotos de la categoría
                    var rests=aggregatePlatesByRest(plates);
                    // V2.5 + V2.8: Para 'almuerzo', incluir restaurantes de almuerzos_hoy y boostearlos,
                    // pero SOLO durante horario de almuerzo (12:00–15:00)
                    if(key==='almuerzo'&&window._almuerzosHoy&&isAlmuerzoHour()){
                        var already={};
                        rests.forEach(function(r){if(r.id) already[r.id]=true});
                        Object.keys(window._almuerzosHoy).forEach(function(rid){
                            if(already[rid]) return;
                            var rFull=(sessionData.resultados||[]).find(function(x){return x.id===rid});
                            if(rFull){
                                var enriched=Object.assign({},rFull,{_matchCount:1,_matchItems:[]});
                                rests.push(enriched);
                            }
                        });
                        rests.forEach(function(r){
                            if(window._almuerzosHoy[r.id]) r._hasAlmuerzoHoy=true;
                        });
                    }
                    rankRestsByKeywords(rests,cm.kw);
                    // Boost: los que tienen almuerzo_hoy suben como especialistas reales (solo en horario)
                    if(key==='almuerzo'&&isAlmuerzoHour()){
                        rests.forEach(function(r){
                            if(r._hasAlmuerzoHoy){r._score=(r._score||0)+15000;r._specialist=true}
                        });
                        rests.sort(function(a,b){
                            var sa=isRestOpen(a.horario),sb=isRestOpen(b.horario);
                            var va=sa===true?0:sa===null?1:2;
                            var vb=sb===true?0:sb===null?1:2;
                            if(va!==vb) return va-vb;
                            if(a._score!==b._score) return b._score-a._score;
                            return (a.distancia_km||999)-(b.distancia_km||999);
                        });
                    }
                    window._catRestsCache[key]=rests;
                    window._catLoading=false;
                    if(window._activeCat===key) renderHome();
                }).catch(function(){
                    window._catRestsCache[key]=[];
                    window._catPlatesCache=window._catPlatesCache||{};

                    window._catLoading=false;
                    if(window._activeCat===key) renderHome();

            var tabsWrap=document.querySelector('.cat-tabs-wrap');

        function setupCatScrollSpy(){
            var labels=document.querySelectorAll('[data-cat-slug]');
            var tabs=document.querySelectorAll('.cat-tab');
            if(window._catSpyHandler){window.removeEventListener('scroll',window._catSpyHandler);window._catSpyHandler=null}
            if(!labels.length||!tabs.length)return;
            window._catSpyHandler=function(){
                if(!labels[0]||!labels[0].isConnected){
                    window.removeEventListener('scroll',window._catSpyHandler);
                    window._catSpyHandler=null;
                    return;
                }
                var tabsWrap=document.querySelector('.cat-tabs-wrap');
                var offset=(tabsWrap?tabsWrap.offsetHeight:0)+20;
                var activeSlug=labels[0].getAttribute('data-cat-slug');
                for(var i=0;i<labels.length;i++){
                    if(labels[i].getBoundingClientRect().top<=offset) activeSlug=labels[i].getAttribute('data-cat-slug');
                }
                tabs.forEach(function(t){
                    var isActive=t.getAttribute('data-cat-target')===activeSlug;
                    t.classList.toggle('active',isActive);
                    if(isActive){
                        var tabsBar=document.getElementById('cat-tabs');
                        if(tabsBar){
                            var tabLeft=t.offsetLeft;
                            var tabRight=tabLeft+t.offsetWidth;
                            var barScroll=tabsBar.scrollLeft;
                            var barW=tabsBar.offsetWidth;
                            if(tabLeft<barScroll+8||tabRight>barScroll+barW-8){
                                tabsBar.scrollTo({left:Math.max(0,tabLeft-20),behavior:'smooth'});
                            }
                        }
                    }
                });
            };
            window.addEventListener('scroll',window._catSpyHandler,{passive:true});
            window._catSpyHandler();
        }

        // V2: SEARCH SCREEN — búsqueda dedicada con resultados en vivo
        // ═══════════════════════════════════════════════════════════
        var _searchTimer=null;
        function getRecentSearches(){
            try{var raw=localStorage.getItem('dewan_recent_searches');return raw?JSON.parse(raw).slice(0,6):[]}catch(e){return[]}
        }
        function saveRecentSearch(q){
            q=(q||'').trim();
            if(!q||q.length<2) return;
            var recent=getRecentSearches().filter(function(r){return r.toLowerCase()!==q.toLowerCase()});
            recent.unshift(q);
            recent=recent.slice(0,6);
            try{localStorage.setItem('dewan_recent_searches',JSON.stringify(recent))}catch(e){}
        }
        window.removeRecentSearch=function(q){
            var recent=getRecentSearches().filter(function(r){return r!==q});
            try{localStorage.setItem('dewan_recent_searches',JSON.stringify(recent))}catch(e){}
            renderSearchIdle();
        };

        var SEARCH_SUGGESTIONS=['arepa','pabellón','hamburguesa','parrilla','tequeños','pizza','empanadas','perro caliente','shawarma','cachapa','almuerzo','postres'];

        window.showSearch=function(prefill){
            currentView='search';
            syncHistory();
            var q=(prefill!=null?prefill:(sessionData.busqueda_texto||'')).trim();
            var h='<div class="search-header-v2">'+
                '<button class="btn-back" onclick="renderHome()" aria-label="Volver">←</button>'+
                '<div class="search-input-wrap">'+
                    '<span class="search-input-wrap-icon">🔍</span>'+
                    '<input class="search-input" id="search-input" type="search" placeholder="Platos o restaurantes…" autocomplete="off" />'+
                    '<button class="search-clear" id="search-clear" onclick="clearSearchInput()" aria-label="Limpiar">✕</button>'+
                '</div>'+
            '</div>'+
            '<div id="search-results-area"></div>';
            app.innerHTML=h;
            var input=document.getElementById('search-input');
            input.value=q;
            input.addEventListener('input',handleSearchInput);
            input.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();input.blur()}});
            setTimeout(function(){input.focus()},80);
            if(q){
                document.getElementById('search-clear').classList.add('visible');
                doSearch(q);
            } else {
                renderSearchIdle();
            }
        };

        function handleSearchInput(e){
            var q=e.target.value;
            document.getElementById('search-clear').classList.toggle('visible',!!q);
            clearTimeout(_searchTimer);
            if(!q.trim()){window._searchSeq=(window._searchSeq||0)+1;renderSearchIdle();return}
            // V4.7: 320ms da margen para escribir 1-2 letras más antes de disparar query
            _searchTimer=setTimeout(function(){doSearch(q)},320);
        }

            var area=document.getElementById('search-results-area');

        // V2.1: Agrupa platos por restaurante_id, devuelve array {rest, count, items}
        function aggregatePlatesByRest(plates){
            var byRest={};
            plates.forEach(function(p){
                var key=p.restaurante_id||p.restaurante_nombre;
                if(!key) return;
                if(!byRest[key]) byRest[key]={id:p.restaurante_id,nombre:p.restaurante_nombre,count:0,items:[]};
                byRest[key].count++;
                byRest[key].items.push(p);
            });
            // Mapear a objetos restaurante reales (con horario, distancia, etc.)
            var arr=[];
            Object.keys(byRest).forEach(function(k){
                var rb=byRest[k];
                var r=(sessionData.resultados||[]).find(function(x){return x.id===rb.id||x.nombre===rb.nombre});
                if(r){
                    var enriched=Object.assign({},r,{_matchCount:rb.count,_matchItems:rb.items});
                    arr.push(enriched);
                }
            });
            return arr;
        }

        function sortRestsByMatch(rests){
            rests.sort(function(a,b){
                var sa=isRestOpen(a.horario),sb=isRestOpen(b.horario);
                var va=sa===true?0:sa===null?1:2;
                var vb=sb===true?0:sb===null?1:2;
                if(va!==vb) return va-vb;
                if((a._matchCount||0)!==(b._matchCount||0)) return (b._matchCount||0)-(a._matchCount||0);
                return (a.distancia_km||999)-(b.distancia_km||999);
            });
            return rests;
        }

        // V2.2: Score de relevancia por keywords (nombre > categoría > platos)
        // Devuelve un score para rankear, y flagea al restaurante como especialista o no.
        function scoreRestRelevance(r,keywords){
            var n=removeAccents((r.nombre||'').toLowerCase());
            var c=removeAccents((r.categoria||'').toLowerCase());
            var t=removeAccents((r.tipo_restaurante||'').toLowerCase());
            var nameMatch=false,catMatch=false;
            for(var i=0;i<keywords.length;i++){
                var k=removeAccents((keywords[i]||'').toLowerCase()).trim();
                if(!k||k.length<2) continue;
                if(n.indexOf(k)!==-1) nameMatch=true;
                if(c.indexOf(k)!==-1||t.indexOf(k)!==-1) catMatch=true;
            }
            var score=0;
            if(nameMatch) score+=10000;
            if(catMatch) score+=3000;
            score+=(r._matchCount||0)*20;
            r._score=score;
            r._specialist=score>=3000;
            r._nameMatch=nameMatch;
            r._catMatch=catMatch;
            return score;
        }

        function rankRestsByKeywords(rests,keywords){
            rests.forEach(function(r){scoreRestRelevance(r,keywords)});
            rests.sort(function(a,b){
                var sa=isRestOpen(a.horario),sb=isRestOpen(b.horario);
                var va=sa===true?0:sa===null?1:2;
                var vb=sb===true?0:sb===null?1:2;
                if(va!==vb) return va-vb;
                if(a._score!==b._score) return b._score-a._score;
                return (a.distancia_km||999)-(b.distancia_km||999);
            });
            return rests;
        }

        function partitionRests(rests){
            var specs=[],others=[];
            rests.forEach(function(r){
                if(r._specialist) specs.push(r); else others.push(r);
            });
            return {specs:specs,others:others};
        }

        // V4.7: Contador de secuencia para búsquedas — evita race conditions en mobile
        // donde queries lentas pueden volver desordenadas y sobrescribir resultados nuevos
        // con resultados viejos (ej: query "p" llega después de query "po" y muestra basura).
        window._searchSeq=0;

        function doSearch(query){
            var q=(query||'').trim();
            if(!q){renderSearchIdle();return}
            var mySeq=++window._searchSeq;
            renderSearchSkeletons();

            // 1) Match directo por nombre/categoría del restaurante (client-side, ya normaliza)
            var qNorm=removeAccents(q.toLowerCase());
            var directRests=(sessionData.resultados||[]).filter(function(r){
                var n=removeAccents((r.nombre||'').toLowerCase());
                var c=removeAccents((r.categoria||'').toLowerCase());
                var t=removeAccents((r.tipo_restaurante||'').toLowerCase());
                return n.indexOf(qNorm)!==-1||c.indexOf(qNorm)!==-1||t.indexOf(qNorm)!==-1;
            });

            // 2) V4.5: Generar variantes de la query para cubrir tildes y plurales
            //    "chaulafan" → ["chaulafan","chaulafans","cháulafan","chaúlafan","chaulafán",...]
            //    "chifas" → ["chifas","chifa"]
            //    "café" → ["café","cafe","cafés","cafes"]
            var variants=generateSearchVariants(q);
            // (7) Expandir con sinónimos de comida VE para encontrar platos reales aunque
            //     no contengan la palabra exacta (ej. "parrilla" → chuzo/pincho/churrasco/...).
            expandSynonyms(q).forEach(function(t){if(variants.indexOf(t)===-1)variants.push(t)});
            variants=variants.slice(0,30); // cap para mantener la URL del OR en tamaño razonable
            // Construir OR con cada variante × 3 columnas (nombre_item, descripcion, categoria_menu)
            var orParts=[];
            variants.forEach(function(v){
                var enc=encodeURIComponent('%'+v+'%');
                orParts.push('nombre_item.ilike.'+enc);
                orParts.push('descripcion.ilike.'+enc);
                orParts.push('categoria_menu.ilike.'+enc);
            });
            var ors=orParts.join(',');
            fetchAllMatchingPlates(ors)
                .then(function(plates){
                    // V4.7: descartar si ya hay una búsqueda más reciente (resultado obsoleto)
                    if(mySeq!==window._searchSeq) return;
                    var restsByPlates=aggregatePlatesByRest(plates);

                    // 3) Combinar: dedup y rankear por score de relevancia
                    var seen={};
                    var combined=[];
                    directRests.forEach(function(r){if(!seen[r.id||r.nombre]){seen[r.id||r.nombre]=true;combined.push(r)}});
                    restsByPlates.forEach(function(r){if(!seen[r.id||r.nombre]){seen[r.id||r.nombre]=true;combined.push(r)}});
                    rankRestsByKeywords(combined,[q]);

                    saveRecentSearch(q);
                    renderSearchResults(q,combined,plates);
                }).catch(function(){
                    if(mySeq!==window._searchSeq) return;
                    saveRecentSearch(q);
                    renderSearchResults(q,directRests,[]);
                });
        }

            if(rests.length){
                var parts=partitionRests(rests);

                var hasBoth=hasSpecs&&parts.others.length>0;
                var globalIdx=0;
                // V2.6: si matchea por nombre del restaurante → menú completo;
                //       si es match por plato/categoría → menú filtrado por la query
                function clickCmd(r){

                // V4.5: usar grilla 3-columnas (igual que la home/categorias) en vez de filas compactas
                if(hasSpecs){
                    html+='<div class="search-section-title-v2">'+(hasBoth?'✨ Especialistas en "':'🏪 Restaurantes que venden "')+esc(query)+'"<span class="search-section-count">'+parts.specs.length+'</span></div>';

        // ── CART LOGIC ──
        // V4.2: parser defensivo de precios — soporta "6.50", "6,50", null, undefined → siempre devuelve Number
        function parsePrice(v){
            if(v==null)return 0;
            if(typeof v==='number')return isFinite(v)?v:0;
            var n=parseFloat(String(v).replace(',','.'));
            return isFinite(n)?n:0;
        }

        // V4.2: Particula que vuela del punto (x0,y0) hasta el carrito flotante
        // Da feedback visual de "se agrego" + sensacion de progreso/recompensa.
        function flyFromPoint(x0,y0,emoji){
            try{
                if(x0==null||y0==null)return;
                var cart=document.getElementById('cart-float');
                if(!cart||cart.style.display==='none'){
                    // Cart aun no visible: usar bottom-center como destino aproximado
                    var x1d=window.innerWidth/2,y1d=window.innerHeight-32;
                    return _spawnParticle(x0,y0,x1d,y1d,emoji);
                }
                var ctaEl=cart.querySelector('.cart-float-cta')||cart;
                var dRect=ctaEl.getBoundingClientRect();
                _spawnParticle(x0,y0,dRect.left+dRect.width/2,dRect.top+dRect.height/2,emoji);
            }catch(e){}
        }
        function _spawnParticle(x0,y0,x1,y1,emoji){
            var p=document.createElement('span');
            p.className='fly-particle';
            p.textContent=emoji||'✨';
            p.style.left=(x0-12)+'px';
            p.style.top=(y0-12)+'px';
            p.style.transform='translate(0,0) scale(1)';
            p.style.opacity='1';
            p.style.transition='none';
            document.body.appendChild(p);
            void p.offsetWidth; // reflow para que la transicion arranque
            var dx=x1-x0,dy=y1-y0;
            p.style.transition='transform 620ms cubic-bezier(0.55,0,0.65,1),opacity 620ms ease-in';
            p.style.transform='translate('+dx+'px,'+dy+'px) scale(0.32) rotate(360deg)';
            p.style.opacity='0';
            setTimeout(function(){if(p.parentNode)p.parentNode.removeChild(p)},680);
        }
        // Captura las coordenadas del boton + tocado ANTES del refreshView()
        function captureClickPoint(){
            try{
                var ev=window.event;
                if(ev){
                    var t=ev.changedTouches&&ev.changedTouches[0];
                    if(t)return{x:t.clientX,y:t.clientY};
                    if(ev.clientX!=null)return{x:ev.clientX,y:ev.clientY};
                    var tgt=ev.currentTarget||ev.target;
                    if(tgt&&tgt.getBoundingClientRect){var r=tgt.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2}}
                }
            }catch(e){}
            return null;
        }
        function pickEmojiForFly(nombre){

        }

        window.addCart=function(rest,nombre,precio,delivery,fotoUrl,moneda){
            var _rc=getRestByName(rest); if(_rc&&isRestOpen(_rc.horario)===false){ avisarCerrado(_rc); return; } // no agregar de locales cerrados
            var p=parsePrice(precio),d=parsePrice(delivery);
            var m=moneda||'COP';
            var pt=captureClickPoint();
            var c=findCart(rest,nombre);
            if(c){c.qty++;c.precio=p;c.delivery=d;c.moneda=m;if(fotoUrl)c.foto_url=fotoUrl;}
            else{window._cart.push({restaurante:rest,nombre:nombre,precio:p,delivery:d,qty:1,foto_url:fotoUrl||null,moneda:m})}
            saveCart(); // CAMBIO 2
            markEtapa('agrego_carrito');
            refreshView();
            if(pt)requestAnimationFrame(function(){flyFromPoint(pt.x,pt.y,pickEmojiForFly(nombre))});
        };
        window.removeCart=function(rest,nombre){
            var c=findCart(rest,nombre);
            if(c){c.qty--;if(c.qty<=0)window._cart=window._cart.filter(function(x){return!(x.restaurante===rest&&x.nombre===nombre)})}
            saveCart(); // CAMBIO 2
            refreshView();
        };
        window.updateNota=function(idx,val){
            if(window._cart[idx]) window._cart[idx].nota=val;
            saveCart(); // CAMBIO 2
        };
        function findCart(rest,nombre){
            for(var i=0;i<window._cart.length;i++){if(window._cart[i].restaurante===rest&&window._cart[i].nombre===nombre&&!window._cart[i].almuerzoChoices&&!window._cart[i].wingsChoices)return window._cart[i]}return null;
        }
        function cartTotals(){
            var items=0,sub=0,dels={};
            window._cart.forEach(function(c){
                var q=parsePrice(c.qty),p=parsePrice(c.precio);
                items+=q;sub+=p*q;
                dels[c.restaurante]=parsePrice(c.delivery);
            });
            var del=0;Object.keys(dels).forEach(function(k){del+=dels[k]});
            return{items:items,subtotal:sub,delivery:del,total:sub+del};
        }
        // Animated count-up del total: anima de `from` a `to` con easeOutCubic
        function animateMoney(el,from,to,duration,suffix,moneda){
            if(!el)return;
            from=parsePrice(from);to=parsePrice(to);
            if(duration==null)duration=420;
            suffix=suffix||'';
            var m=moneda||'COP';
            if(!duration||duration<=0||Math.abs(to-from)<0.5){el.textContent=fmtMoney(to,m)+suffix;return}
            var start=null;
            var step=function(ts){
                if(!start)start=ts;
                var p=Math.min((ts-start)/duration,1);
                var e=1-Math.pow(1-p,3);
                var val=from+(to-from)*e;
                el.textContent=fmtMoney(val,m)+suffix;
                if(p<1)requestAnimationFrame(step);
            };
            requestAnimationFrame(step);
        }
        window._cartFloatPrevTotal=0;
        function updateCartFloat(){
            var t=cartTotals();var f=document.getElementById('cart-float');
            if(t.items>0&&currentView!=='cart'){
                var wasVisible=f.style.display==='block';
                f.style.display='block';
                var countEl=document.getElementById('cart-float-count');
                var totalEl=document.getElementById('cart-float-total');
                var subEl=document.getElementById('cart-float-sub');
                var cta=f.querySelector('.cart-float-cta');
                if(countEl.textContent!==String(t.items)&&wasVisible&&cta){
                    cta.classList.remove('cart-float-bump');
                    void cta.offsetWidth;
                    cta.classList.add('cart-float-bump');
                }
                countEl.textContent=t.items;
                if(subEl){
                    var rests=Object.keys(window._cart.reduce(function(a,c){a[c.restaurante]=1;return a},{})).length;
                    var pieces=t.items+' '+(t.items===1?'plato':'platos');
                    subEl.textContent=pieces+(rests>1?' · '+rests+' locales':'');
                }
                var toVal=t.subtotal;
                var suffix=window._clientGPS?' + '+fmtCOP(t.delivery):' + envío';
                animateMoney(totalEl,window._cartFloatPrevTotal,toVal,wasVisible?420:0,suffix,cartMoneda());
                window._cartFloatPrevTotal=toVal;
                document.body.classList.add('has-cart');
            }else{f.style.display='none';document.body.classList.remove('has-cart');window._cartFloatPrevTotal=0}
        }
        function refreshView(){

        // ── GPS desde carrito inline ──
        window.requestGPSCart=function(){
            var st=document.getElementById('gps-status-cart'),btn=document.getElementById('btn-gps-cart');
            if(st){st.className='gps-status checkout-gps-searching';st.textContent='🔍 Buscando tu ubicación...';}
            if(btn){btn.disabled=true;btn.textContent='🔍 Buscando...';}

                window._clientGPS={lat:pos.coords.latitude,lng:pos.coords.longitude};guardarUbic();
                // Recalcular delivery en el carrito con nueva ubicación
                var rests=getFilteredRestaurantes();
                var deliveryByRest={};
                rests.forEach(function(r){deliveryByRest[r.nombre]=r.precio_delivery||0});
                window._cart.forEach(function(c){
                    if(deliveryByRest[c.restaurante]!=null) c.delivery=deliveryByRest[c.restaurante];
                });
                saveCart();
                // Capturar referencia antes de re-renderizar
                var addrInput=document.getElementById('loc-addr');
                if(addrInput) window._clientAddr=addrInput.value;
                // Re-render completo para actualizar totales + sección ubicación
                showCart();
            },function(){
                if(st){st.className='gps-status';st.textContent='No se pudo obtener GPS';}
                if(btn){btn.disabled=false;btn.textContent='📍 Usar mi ubicación GPS';}
                // Mostrar campo de texto automáticamente si falla GPS

        window.toggleAddrField=function(){

        // ── MAPA PARA FIJAR EL PIN DE ENTREGA (Leaflet + OSM, carga perezosa) ──
        // Resuelve coordenadas malas: el cliente arrastra el pin a su casa exacta.
        // Carga perezosa: Leaflet SOLO se inyecta cuando el carrito muestra el mapa.
        var _opLeafletReq=false;
        window._opGpsTimer=null;
        function opLoadLeaflet(cb){
            if(window.L){cb();return;}
            window._opLeafletCbs=window._opLeafletCbs||[];
            window._opLeafletCbs.push(cb);
            if(_opLeafletReq) return; // ya se está inyectando: solo encolar el cb
            _opLeafletReq=true;
            var css=document.createElement('link');
            css.rel='stylesheet';
            css.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
            document.head.appendChild(css);
            var js=document.createElement('script');
            js.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
            js.onload=function(){
                var cbs=window._opLeafletCbs||[];window._opLeafletCbs=[];
                cbs.forEach(function(f){try{f()}catch(e){}});
            };
            document.head.appendChild(js);
        }
        // Se llama tras cada render del carrito (showCart → setTimeout): el innerHTML destruye el mapa,
        // así que SIEMPRE se crea uno nuevo y se restaura el marker (arrastrable) desde _clientGPS.
        function opInitMap(){
            if(!document.getElementById('op-map')) return; // no estamos en el carrito (o carrito vacío)
            opLoadLeaflet(function(){
                var el=document.getElementById('op-map');
                if(!el) return; // el carrito se re-renderizó/cerró mientras cargaba Leaflet
                if(window._opMap){try{window._opMap.remove()}catch(e){} window._opMap=null;}
                window._opMapMarker=null;
                // Centro inicial: San Cristóbal, Táchira (Venezuela).
                var map=L.map(el,{dragging:true,scrollWheelZoom:true}).setView([7.7669,-72.2250],14);
                L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'}).addTo(map);
                if(window._clientGPS){
                    var la=parseFloat(window._clientGPS.lat),lo=parseFloat(window._clientGPS.lng);
                    if(isFinite(la)&&isFinite(lo)){
                        window._opMapMarker=L.marker([la,lo],{draggable:true}).addTo(map);
                        window._opMapMarker.on('dragend',function(){var ll=window._opMapMarker.getLatLng();opMapPick(ll.lat,ll.lng);});
                        map.setView([la,lo],16);
                    }
                }
                map.on('click',function(ev){opMapPick(ev.latlng.lat,ev.latlng.lng)});
                window._opMap=map;
                setTimeout(function(){try{map.invalidateSize()}catch(e){}},120); // por si el contenedor se midió tarde
            });
        }
        // Click/tap o soltar el pin: fija coords de entrega + guardarUbic + recalcula envíos + re-render diferido.
        function opMapPick(lat,lng){
            var la=(+lat).toFixed(6),lo=(+lng).toFixed(6);
            if(window._opMap){ // feedback inmediato (el re-render lo restaura igual desde _clientGPS)
                if(window._opMapMarker) window._opMapMarker.setLatLng([lat,lng]);
                else { window._opMapMarker=L.marker([lat,lng],{draggable:true}).addTo(window._opMap); window._opMapMarker.on('dragend',function(){var ll=window._opMapMarker.getLatLng();opMapPick(ll.lat,ll.lng);}); }
            }
            window._clientGPS={lat:la,lng:lo}; // strings: el mensaje WA los concatena tal cual
            guardarUbic();
            // Recalcular delivery del carrito con la nueva ubicación (mismo patrón que requestGPSCart)
            var rests=getFilteredRestaurantes();
            var deliveryByRest={};
            rests.forEach(function(r){deliveryByRest[r.nombre]=r.precio_delivery||0});
            window._cart.forEach(function(c){ if(deliveryByRest[c.restaurante]!=null) c.delivery=deliveryByRest[c.restaurante]; });
            saveCart();
            var addrInput=document.getElementById('loc-addr');
            if(addrInput) window._clientAddr=addrInput.value;
            // Re-render diferido para actualizar totales (el mapa se recrea con el marker puesto y centrado).
            if(window._opGpsTimer) clearTimeout(window._opGpsTimer);
            window._opGpsTimer=setTimeout(function(){ window._opGpsTimer=null; if(currentView==='cart') showCart(); },150);
        }

        // sendWA — CAMBIO 3: incluir dirección de texto si no hay GPS
        window.sendWA=function(){

            var addrInputCheck=document.getElementById('loc-addr');

                msg+='🏪 *'+rest+'*\n';
                byRest[rest].forEach(function(c){
                    msg+='  - '+c.qty+'x '+c.nombre+' ('+fmtMoney(c.precio*c.qty,c.moneda)+')\n';
                    if(c.almuerzoChoices){

                        catOrder.forEach(function(cat){
                            if(c.almuerzoChoices[cat]) msg+='    ▸ '+(catLabels[cat]||cat)+': '+c.almuerzoChoices[cat]+'\n';
                        });
                    }
                    if(c.wingsChoices){
                        if(c.wingsChoices[0]&&c.wingsChoices[0].items){ // multi-grupo: una línea por grupo
                            c.wingsChoices.forEach(function(g){
                                msg+='    '+(g.emoji||'🌶️')+' '+g.label+': '+g.items.map(function(it){return it.n+'× '+it.opcion}).join(' · ')+'\n';
                            });
                        } else {
                            msg+='    🌶️ Salsas: '+wingsChoicesStr(c.wingsChoices)+'\n';

                    if(c.nota)msg+='    📝 '+c.nota+'\n';
                });
                msg+='\n';
            });
            if(window._clientGPS){
                msg+='💰 *Subtotal: '+fmtMoney(t.subtotal,cartMoneda())+'*\n';
                msg+='🛵 *Delivery: '+fmtCOP(t.delivery)+'*\n\n';
            } else {
                msg+='💰 *Subtotal: '+fmtMoney(t.subtotal,cartMoneda())+'* + envío (se calcula al compartir ubicación)\n\n';
            }
            // Capturar valor actual del campo de dirección/referencia
            var addrInput=document.getElementById('loc-addr');
            if(addrInput) window._clientAddr=addrInput.value;
            if(window._clientGPS){
                msg+='📍 Mi ubicacion:\nhttps://maps.google.com/?q='+window._clientGPS.lat+','+window._clientGPS.lng+'\n';
                if(window._clientAddr&&window._clientAddr.trim()) msg+='📝 Ref: '+window._clientAddr.trim()+'\n';
                msg+='\n';
            } else if(window._clientAddr&&window._clientAddr.trim()){
                msg+='📍 Dirección: '+window._clientAddr.trim()+'\n\n';
            } else {
                msg+='📍 _Enviar ubicacion por este chat_\n\n';
            }
            // V4.6: Método de pago
            if(window._payMethod==='transferencia'){
                msg+='💳 *Pago: Transferencia* 🏦\n_(El motorizado entregará el número de cuenta al llegar)_\n\n';
            } else {
                msg+='💳 *Pago: Efectivo* 💵\n\n';

            msg+='Token: '+token;
            // (4) UUID anónimo del dispositivo — el bot lo vincula al teléfono real al recibir el pedido.
            msg+='\nCliente: '+obtenerUuidCliente();
            var waUrl='https://wa.me/'+WA+'?text='+encodeURIComponent(msg);
            // FIX #4: guardar resumen para pantalla de éxito ANTES de limpiar el carrito
            var resumen={items:t.items,subtotal:t.subtotal,delivery:t.delivery,conGPS:!!window._clientGPS,moneda:cartMoneda()};
            markEtapa('confirmo');
            // (10) Si el navegador bloquea el popup (window.open == null), mostrar link directo que el usuario toca.

        // ── HORARIO / ABIERTO-CERRADO (parser robusto, portado de RI 2026-06-28 · TZ Caracas) ──
        // isRestOpen(horario) -> true=abierto / false=cerrado / null=sin horario o no se pudo leer.
        // Soporta multi-rango por coma y dias de la semana (cierra domingo, etc.). Politica: ante la
        // duda -> null = PERMITIR (no perder ventas); solo se bloquea el pedido cuando esta CONFIRMADO
        // cerrado (isRestOpen===false).
        function _hNorm(s){
            return String(s||'').toLowerCase()
                .replace(/[áàä]/g,'a').replace(/[éèë]/g,'e').replace(/[íìï]/g,'i')
                .replace(/[óòö]/g,'o').replace(/[úùü]/g,'u');
        }
        var _HDOW={domingo:0,dom:0,lunes:1,lun:1,martes:2,mar:2,miercoles:3,mier:3,mie:3,jueves:4,jue:4,viernes:5,vier:5,vie:5,sabado:6,sab:6};
        // Dias permitidos (array 0=Dom..6=Sab) o null si el texto no menciona dias.
        function _hParseDays(sn){
            if(/todos los dias|todos los d|diario|toda la semana|lun(?:es)?\s*[a-]\s*dom/.test(sn)) return [0,1,2,3,4,5,6];
            var re=/(domingo|lunes|martes|miercoles|jueves|viernes|sabado|dom|lun|mar|mie|jue|vie|sab)/g,matches=[],m;
            while((m=re.exec(sn))){ matches.push({idx:_HDOW[m[1]],pos:m.index,end:re.lastIndex}); }
            if(!matches.length) return null;
            var allowed={};
            for(var i=0;i<matches.length;i++){
                if(i>0){
                    var between=sn.slice(matches[i-1].end,matches[i].pos);
                    if(/\b(a|al|hasta)\b|-|–/.test(between)){ // rango de dias (con wrap)
                        for(var d=matches[i-1].idx; d!==matches[i].idx; d=(d+1)%7) allowed[d]=1;
                        allowed[matches[i].idx]=1; continue;
                    }
                }
                allowed[matches[i].idx]=1;
            }
            return Object.keys(allowed).map(Number);
        }
        // Horas (minutos desde 00:00) en un trozo de texto. am/pm solo desplaza si la hora es 1-12.
        function _hTimes(str){
            var re=/(\d{1,2})[:h](\d{2})\s*(a\.?m\.?|p\.?m\.?)?/gi,out=[],m;
            while((m=re.exec(str))){
                var h=+m[1],mn=+m[2],ap=m[3]?m[3].replace(/[.\s]/g,'').toLowerCase():null;
                if(ap==='pm'&&h<12) h+=12;
                if(ap==='am'&&h===12) h=0;
                if(h>23||mn>59) continue;
                out.push(h*60+mn);
            }
            return out;
        }
        // Rangos [abre,cierra] en minutos. Multi-rango por coma; cae al texto completo si no hubo comas con horas.
        function _hRanges(sn){
            var ranges=[];
            sn.split(',').forEach(function(seg){ var t=_hTimes(seg); if(t.length>=2) ranges.push([t[0],t[t.length-1]]); });
            if(!ranges.length){ var t=_hTimes(sn); if(t.length>=2) ranges.push([t[0],t[t.length-1]]); }
            return ranges;
        }
        var _hCache={};
        function _hParse(horario){
            var k=String(horario);
            if(_hCache[k]) return _hCache[k];
            var sn=_hNorm(horario);
            return (_hCache[k]={days:_hParseDays(sn),ranges:_hRanges(sn)});
        }
        // "Ahora" en hora de Venezuela (San Cristóbal / Táchira).
        function _hNowVe(){ return new Date(new Date().toLocaleString('en-US',{timeZone:'America/Caracas'})); }
        function isRestOpen(horario){
            if(!horario||!String(horario).trim()) return null;
            var pr=_hParse(horario),now=_hNowVe(),dow=now.getDay(),nowMin=now.getHours()*60+now.getMinutes();
            if(pr.days&&pr.days.indexOf(dow)===-1) return false; // hoy cerrado por dia de la semana
            if(!pr.ranges.length) return null; // no se pudo leer la hora -> permitir
            for(var i=0;i<pr.ranges.length;i++){
                var o=pr.ranges[i][0],c=pr.ranges[i][1];
                if(c<=o){ if(nowMin>=o||nowMin<c) return true; } // cruza medianoche
                else { if(nowMin>=o&&nowMin<c) return true; }
            }
            return false;
        }
        function openBadge(horario){
            var st=isRestOpen(horario);
            if(st===null) return '';

        }
        // Hora de apertura legible (am/pm). Prefiere el proximo turno de HOY; si no, el 1er rango. null si no hay hora.
        function proximaApertura(horario){
            if(!horario||!String(horario).trim()) return null;
            var ranges=_hParse(horario).ranges;
            if(!ranges.length) return null;
            var now=_hNowVe(),nowMin=now.getHours()*60+now.getMinutes(),next=null,first=null;
            ranges.forEach(function(r){ var o=r[0]; if(first===null||o<first)first=o; if(o>nowMin&&(next===null||o<next))next=o; });
            var pick=next!==null?next:first;
            var h=Math.floor(pick/60),min=pick%60,ap=h<12?'am':'pm',h12=h%12;if(h12===0)h12=12;
            return h12+':'+(min<10?'0'+min:min)+' '+ap;
        }
