server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Compresion ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml+rss
        image/svg+xml;

    # ─── Static assets (js/css/imgs/fuentes): cache largo ──────────
    # Regex gana a prefix, asi que estos se cachean aunque vivan bajo /app/
    location ~* \.(?:js|css|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # ─── HTML: siempre fresh ───────────────────────────────────────
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ─── SPA fallbacks (sirven index.html) — tambien no-cache ──────
    location /app/ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri $uri/ /app/index.html;
    }

    location /admin/ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri $uri/ /admin/index.html;
    }

    location / {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
