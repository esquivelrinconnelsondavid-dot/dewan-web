<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEWAN Delivery</title>
    <meta name="theme-color" content="#0E0E10">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23FFDD57'/><text x='50' y='70' font-family='Arial' font-size='55' font-weight='bold' fill='%23111' text-anchor='middle'>D</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#0E0E10;--card:#1A1A1E;--card2:#222226;--border:#2A2A30;
            --acc:#FFDD57;--texto:#F0EFE9;--gris:#6B6B75;--green:#25D366;
            --radius:16px;
        }
        body{font-family:'Nunito',system-ui,sans-serif;background:var(--bg);color:var(--texto);min-height:100vh;-webkit-font-smoothing:antialiased;max-width:430px;margin:0 auto}

        /* GPS Welcome */
        .gps-welcome{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center}
        .gps-welcome-icon{width:80px;height:80px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin-bottom:24px;box-shadow:0 8px 30px rgba(255,221,87,0.25)}
        .gps-welcome h2{font-size:1.4rem;font-weight:900;margin-bottom:8px;color:var(--texto)}
        .gps-welcome p{font-size:0.9rem;color:var(--gris);line-height:1.6;margin-bottom:28px;max-width:300px}
        .gps-status{text-align:center;font-size:0.82rem;color:var(--gris);margin-bottom:10px;min-height:20px}
        .gps-status.success{color:var(--green);font-weight:700}
        .gps-status.error{color:#e53e3e}

        .btn{border:none;border-radius:14px;padding:14px 20px;font-weight:800;font-size:0.95rem;cursor:pointer;font-family:inherit;width:100%;max-width:320px;transition:all 0.2s;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
        .btn:active{transform:scale(0.97)}
        .btn-accent{background:var(--acc);color:#111}
        .btn-accent:disabled{opacity:0.5;cursor:not-allowed}
        .btn-outline{background:transparent;color:var(--gris);border:1.5px solid var(--border)}
        .btn-green{background:var(--green);color:white}

        /* Header sticky */
        .header-sticky{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:20px 16px 16px}
        .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
        .header-loc{display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--gris);font-weight:700}
        .header-title{font-size:1.35rem;font-weight:900;letter-spacing:-0.03em;margin-top:4px}
        .btn-cart{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:9px 16px;cursor:pointer;color:var(--gris);font-weight:800;font-size:0.82rem;font-family:inherit;display:flex;align-items:center;gap:8px;transition:all 0.2s}
        .btn-cart.has-items{background:var(--acc);color:#111;border-color:var(--acc)}

        /* Sort pills */
        .sort-bar{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:12px 16px}
        .sort-bar::-webkit-scrollbar{display:none}
        .pill{flex-shrink:0;padding:8px 16px;border-radius:100px;border:1.5px solid var(--border);background:transparent;color:var(--gris);font-weight:800;font-size:0.75rem;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.2s}
        .pill.active{background:var(--acc);color:#111;border-color:var(--acc)}

        /* Restaurant Card */
        .rest-card{background:var(--card);border:1px solid var(--border);border-radius:20px;margin:0 14px 12px;overflow:hidden}
        .rest-color-bar{height:5px}
        .rest-body{padding:14px}
        .rest-top{display:flex;gap:12px;align-items:flex-start}
        .rest-avatar{width:56px;height:56px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0}
        .rest-info{flex:1;min-width:0}
        .rest-name{font-weight:900;font-size:1rem}
        .rest-desc{color:var(--gris);font-size:0.75rem;margin-top:2px}
        .rest-meta{display:flex;gap:12px;margin-top:6px;font-size:0.75rem;flex-wrap:wrap}
        .rest-meta span{color:var(--gris)}

        /* Info strip */
        .info-strip{display:flex;gap:6px;margin-top:12px}
        .info-box{flex:1;background:var(--card2);border-radius:12px;padding:8px 4px;text-align:center;border:1px solid var(--border)}
        .info-box-icon{font-size:0.85rem}
        .info-box-val{font-weight:900;font-size:0.72rem;color:var(--acc);margin-top:2px}
        .info-box-label{font-size:0.55rem;color:var(--gris);font-weight:700;text-transform:uppercase;letter-spacing:0.04em;margin-top:1px}

        /* Category label */
        .cat-label{font-size:0.7rem;font-weight:800;color:var(--acc);text-transform:uppercase;letter-spacing:0.1em;padding:12px 0 6px}

        /* Product card */
        .prod-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px;margin-bottom:8px;transition:border-color 0.2s}
        .prod-card.in-cart{border-color:rgba(255,221,87,0.4)}
        .prod-top{display:flex;gap:12px;align-items:flex-start}
        .prod-emoji{width:52px;height:52px;border-radius:14px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0;border:1px solid var(--border)}
        .prod-info{flex:1;min-width:0}
        .prod-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
        .badge{font-size:0.6rem;font-weight:800;padding:2px 7px;border-radius:20px;letter-spacing:0.04em}
        .badge-popular{background:rgba(255,107,53,0.2);color:#FF6B35}
        .badge-cart{background:rgba(255,221,87,0.15);color:var(--acc)}
        .prod-name{font-weight:800;font-size:0.92rem}
        .prod-desc{color:var(--gris);font-size:0.75rem;margin-top:3px;line-height:1.4}
        .prod-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
        .prod-price{font-weight:900;font-size:1.15rem;color:var(--acc)}
        .btn-agregar{background:#FF6B35;color:white;border:none;border-radius:12px;padding:9px 18px;font-weight:800;font-size:0.8rem;cursor:pointer;font-family:inherit}
        .btn-agregar:active{transform:scale(0.95)}

        /* Qty controls */
        .qty-ctrl{display:flex;align-items:center;gap:10px}
        .btn-qty{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.1rem;cursor:pointer;font-family:inherit;transition:all 0.15s}
        .btn-qty:active{transform:scale(0.9)}
        .btn-qty-minus{border:1.5px solid var(--border);background:var(--card2);color:var(--texto)}
        .btn-qty-plus{border:none;background:var(--acc);color:#111}
        .qty-num{font-weight:900;font-size:1rem;min-width:22px;text-align:center;color:var(--acc)}

        /* Menu section inside restaurant */
        .menu-section{padding:0 14px 14px}
        .menu-count{color:var(--gris);font-size:0.68rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:12px;padding:0 14px}

        /* Cart floating */
        .cart-float{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);width:92%;max-width:398px;z-index:60}
        .cart-float-btn{width:100%;background:var(--acc);color:#111;border:none;border-radius:14px;padding:14px 20px;font-weight:900;font-size:0.95rem;cursor:pointer;font-family:inherit;display:flex;justify-content:space-between;align-items:center;box-shadow:0 8px 32px rgba(255,221,87,0.3)}
        .cart-float-badge{background:rgba(0,0,0,0.18);border-radius:8px;padding:3px 10px;font-weight:900}

        /* Cart page */
        .cart-header{padding:24px 16px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:50}
        .btn-back{background:var(--card2);border:1px solid var(--border);border-radius:12px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;color:var(--texto)}
        .cart-item{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:center}
        .cart-item-emoji{width:50px;height:50px;border-radius:12px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0}
        .cart-summary-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin:8px 0 12px}
        .cart-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:0.82rem}
        .cart-row-label{color:var(--gris)}
        .cart-row-val{font-weight:700}
        .cart-total-row{display:flex;justify-content:space-between;padding-top:12px;margin-top:4px}
        .cart-total-label{font-weight:900;font-size:1.05rem}
        .cart-total-val{font-weight:900;font-size:1.3rem;color:var(--acc)}

        /* Modal */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
        .modal-overlay.visible{opacity:1;pointer-events:auto}
        .modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:430px;transform:translateY(100%);transition:transform 0.3s ease}
        .modal-overlay.visible .modal{transform:translateY(0)}
        .modal-title{font-size:1.15rem;font-weight:900;margin-bottom:6px}
        .modal-text{font-size:0.85rem;color:var(--gris);margin-bottom:20px;line-height:1.5}
        .modal-items{background:var(--card2);border-radius:12px;padding:12px 14px;margin-bottom:20px;max-height:200px;overflow-y:auto}
        .modal-rest-label{font-weight:800;font-size:0.78rem;color:var(--acc);padding:6px 0 2px}
        .modal-item{display:flex;justify-content:space-between;padding:6px 0;font-size:0.82rem}
        .modal-item+.modal-item{border-top:1px solid var(--border)}
        .modal-item-name{font-weight:600}
        .modal-item-price{font-weight:800;color:var(--acc)}
        .modal-total{display:flex;justify-content:space-between;padding:10px 0 0;border-top:2px solid var(--border);font-weight:900;font-size:0.92rem;margin-top:4px}

        /* States */
        .state-container{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:20px}
        .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .state-title{font-size:1.1rem;font-weight:800;margin-bottom:8px}
        .state-text{font-size:0.88rem;color:var(--gris)}
        .empty-icon{font-size:3rem;margin-bottom:16px}

        .app-footer{text-align:center;padding:20px 20px 80px;font-size:0.7rem;color:var(--gris)}
        body.has-cart{padding-bottom:80px}
    </style>
</head>
<body>
    <div class="gps-welcome" id="gps-welcome">
        <div class="gps-welcome-icon">📍</div>
        <h2>Comparte tu ubicacion</h2>
        <p>Para mostrarte los restaurantes mas cercanos y calcular el delivery.</p>
        <div class="gps-status" id="welcome-gps-status"></div>
        <button class="btn btn-accent" id="btn-welcome-gps" onclick="welcomeGPS()">📍 Compartir ubicacion</button>
        <button class="btn btn-outline" onclick="skipGPS()">Continuar sin ubicacion</button>
    </div>

    <div id="app" style="display:none">
        <div class="state-container">
            <div class="spinner"></div>
            <div class="state-title">Buscando opciones...</div>
            <div class="state-text">Encontrando los mejores restaurantes para ti</div>
        </div>
    </div>

    <div class="cart-float" id="cart-float" style="display:none">
        <button class="cart-float-btn" onclick="showCart()">
            <span class="cart-float-badge" id="cart-float-count">0</span>
            <span>Ver mi pedido</span>
            <span id="cart-float-total">$0.00</span>
        </button>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal-content"></div>
    </div>

    <script>
    (function(){
        'use strict';
        var SB_URL='https://wfpdtjmmrhhfuxayvpzu.supabase.co';
        var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmcGR0am1tcmhoZnV4YXl2cHp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzE1NDksImV4cCI6MjA4ODY0NzU0OX0.Iyeogfs5AIiVrM5agXuMZsgFrud460OYvn0zkYgJH0s';
        var WA='593986777146';
        var app=document.getElementById('app');
        var token=new URLSearchParams(window.location.search).get('t');
        var currentSort='distancia';
        var sessionData=null;
        var currentView='home'; // home | rest | cart
        var currentRestIdx=null;
        window._cart=[];
        window._clientGPS=null;

        if(!token){
            document.getElementById('gps-welcome').style.display='none';
            app.style.display='block';
            showError('Link invalido','Este enlace no es valido. Solicita uno nuevo por WhatsApp.');
            return;
        }

        // GPS Welcome
        window.welcomeGPS=function(){
            var st=document.getElementById('welcome-gps-status');
            var btn=document.getElementById('btn-welcome-gps');
            st.className='gps-status';st.textContent='Obteniendo ubicacion...';
            btn.disabled=true;btn.textContent='📍 Obteniendo...';
            if(!navigator.geolocation){st.className='gps-status error';st.textContent='Tu navegador no soporta GPS.';btn.disabled=false;btn.textContent='📍 Compartir ubicacion';return}
            navigator.geolocation.getCurrentPosition(function(pos){
                window._clientGPS={lat:pos.coords.latitude,lng:pos.coords.longitude};
                st.className='gps-status success';st.textContent='Ubicacion obtenida';
                setTimeout(function(){document.getElementById('gps-welcome').style.display='none';app.style.display='block';loadSession()},500);
            },function(err){
                st.className='gps-status error';st.textContent=err.code===1?'Permiso denegado.':'No se pudo obtener GPS.';
                btn.disabled=false;btn.textContent='📍 Intentar de nuevo';
            },{enableHighAccuracy:true,timeout:15000});
        };
        window.skipGPS=function(){document.getElementById('gps-welcome').style.display='none';app.style.display='block';loadSession()};

        function loadSession(){
            fetch(SB_URL+'/rest/v1/links_sesion?token=eq.'+token+'&select=*',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}})
            .then(function(r){return r.json()})
            .then(function(data){
                if(!data||!data.length){showError('Enlace no encontrado','Este enlace no existe o ha expirado.');return}
                var s=data[0];
                if(s.expira_at&&new Date(s.expira_at)<new Date()){showError('Enlace expirado','Este enlace ha expirado. Solicita uno nuevo.');return}
                sessionData=s;
                fetch(SB_URL+'/rest/v1/links_sesion?token=eq.'+token,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({visto:true,visto_at:new Date().toISOString()})});
                renderHome();
            }).catch(function(){showError('Error de conexion','No pudimos cargar los datos.')});
        }

        // ── Haversine para calcular distancias client-side ──
        function haversine(lat1,lng1,lat2,lng2){
            var R=6371;var dLat=(lat2-lat1)*Math.PI/180;var dLng=(lng2-lng1)*Math.PI/180;
            var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
            return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
        }

        // ── Recalcular distancias con GPS del cliente ──
        function recalcDistances(rests){
            if(!window._clientGPS) return rests;
            var TARIFA_BASE=1.50,PRECIO_KM=0.60;
            return rests.map(function(r){
                var copy={nombre:r.nombre,productos:r.productos,distancia_km:r.distancia_km,tiempo_estimado_min:r.tiempo_estimado_min,precio_delivery:r.precio_delivery,restaurante_lat:r.restaurante_lat,restaurante_lng:r.restaurante_lng};
                if(r.restaurante_lat&&r.restaurante_lng){
                    var dist=haversine(window._clientGPS.lat,window._clientGPS.lng,parseFloat(r.restaurante_lat),parseFloat(r.restaurante_lng));
                    copy.distancia_km=Math.round(dist*10)/10;
                    copy.tiempo_estimado_min=Math.ceil(10+dist*3);
                    copy.precio_delivery=Math.round((TARIFA_BASE+Math.max(0,dist-0.5)*PRECIO_KM)*100)/100;
                }
                return copy;
            });
        }

        // ── Helpers para matching singular/plural ──
        function normWord(w){
            w=w.toLowerCase().trim();
            if(w.endsWith('es')&&w.length>4) return w.slice(0,-2);
            if(w.endsWith('s')&&w.length>3) return w.slice(0,-1);
            return w;
        }
        function fuzzyMatch(text,query){
            var t=text.toLowerCase();
            var q=query.toLowerCase();
            if(t.indexOf(q)!==-1||q.indexOf(t)!==-1) return true;
            var tn=normWord(t), qn=normWord(q);
            if(tn.indexOf(qn)!==-1||qn.indexOf(tn)!==-1) return true;
            var words=q.split(' ').filter(function(w){return w.length>2});
            return words.some(function(w){
                var wn=normWord(w);
                return t.indexOf(w)!==-1||t.indexOf(wn)!==-1||tn.indexOf(wn)!==-1;
            });
        }

        // ── Filtrar productos por búsqueda (inteligente) ──
        function getFilteredRestaurantes(){
            var rests=sessionData.resultados||[];
            rests=recalcDistances(rests);
            var busqRaw=(sessionData.busqueda_texto||'').toLowerCase().trim();
            if(!busqRaw||busqRaw==='comida'||busqRaw==='menu'||busqRaw==='todo') return rests;

            // Limpiar prefijos como "menu del", "que tiene", "recomiendame"
            var busq=busqRaw;
            var prefijos=['menu de ','menu del ','menú de ','menú del ','que tiene ','que tiene el ','platos de ','platos del ','carta de ','carta del ','recomiendame ','recomiéndame '];
            prefijos.forEach(function(p){if(busq.startsWith(p))busq=busq.substring(p.length).trim()});

            // Quitar "normal/normales" suelto para evitar ruido
            busq=busq.replace(/\s+normales?\b/g,'').replace(/\bnormales?\s+/g,'').trim();

            // Verificar si la búsqueda coincide con un restaurante
            var restMatch=rests.filter(function(r){
                return fuzzyMatch(r.nombre||'',busq);
            });

            // Si coincide con restaurante → mostrar SOLO ese(s) restaurante(s) con TODOS sus platos
            if(restMatch.length>0) return restMatch;

            // Filtrar por CATEGORÍA del producto (ej: "encebollados" matchea categoría "Encebollados")
            var catFiltered=rests.map(function(r){
                var prods=(r.productos||[]).filter(function(p){
                    return fuzzyMatch(p.categoria||'',busq);
                });
                if(prods.length===0) return null;
                return {nombre:r.nombre,distancia_km:r.distancia_km,tiempo_estimado_min:r.tiempo_estimado_min,precio_delivery:r.precio_delivery,restaurante_lat:r.restaurante_lat,restaurante_lng:r.restaurante_lng,productos:prods};
            }).filter(Boolean);
            if(catFiltered.length>0) return catFiltered;

            // Si busca un plato → filtrar productos que coincidan por nombre o descripcion
            var filtered=rests.map(function(r){
                var prods=(r.productos||[]).filter(function(p){
                    return fuzzyMatch(p.nombre||'',busq)||fuzzyMatch(p.descripcion||'',busq);
                });
                if(prods.length===0) return null;
                return {nombre:r.nombre,distancia_km:r.distancia_km,tiempo_estimado_min:r.tiempo_estimado_min,precio_delivery:r.precio_delivery,restaurante_lat:r.restaurante_lat,restaurante_lng:r.restaurante_lng,productos:prods};
            }).filter(Boolean);
            return filtered.length?filtered:rests;
        }

        function sortRests(list,key){
            var s=list.slice();
            if(key==='distancia') s.sort(function(a,b){return(a.distancia_km||999)-(b.distancia_km||999)});
            else if(key==='precio') s.sort(function(a,b){var pa=a.productos&&a.productos[0]?a.productos[0].precio:999;var pb=b.productos&&b.productos[0]?b.productos[0].precio:999;return pa-pb});
            else if(key==='delivery') s.sort(function(a,b){return(a.precio_delivery||999)-(b.precio_delivery||999)});
            return s;
        }

        // ── HOME VIEW ──
        window.renderHome=function(){
            currentView='home';
            var rests=sortRests(getFilteredRestaurantes(),currentSort);
            var busq=sessionData.busqueda_texto||'Comida';
            var h='<div class="header-sticky">'+
                '<div class="header-top">'+
                    '<div><div class="header-loc">📍 Riobamba, Ecuador</div>'+
                    '<div class="header-title">'+esc(busq)+' 🍽️</div></div>'+
                    '<button class="btn-cart'+(window._cart.length?' has-items':'')+'" onclick="showCart()">🛒 '+(window._cart.length?cartTotals().items+' items':'Vacio')+'</button>'+
                '</div>'+
                '<div class="sort-bar">'+
                    pillBtn('distancia','📍 Mas cerca')+pillBtn('precio','💰 Menor precio')+pillBtn('delivery','🚚 Menor delivery')+
                '</div>'+
            '</div>';

            h+='<div style="padding:14px 0">';
            rests.forEach(function(r,idx){
                var init=(r.nombre||'R')[0].toUpperCase();
                var color=getColor(idx);
                var previewProds=(r.productos||[]).slice(0,3);

                h+='<div class="rest-card" onclick="openRest('+idx+')">'+
                    '<div class="rest-color-bar" style="background:linear-gradient(90deg,'+color+','+color+'66)"></div>'+
                    '<div class="rest-body">'+
                        '<div class="rest-top">'+
                            '<div class="rest-avatar" style="background:'+color+'20;border:2px solid '+color+'40">'+getEmoji(r.nombre)+'</div>'+
                            '<div class="rest-info">'+
                                '<div class="rest-name">'+esc(r.nombre)+'</div>'+
                                '<div class="rest-meta">'+
                                    (r.distancia_km?'<span>📍 '+r.distancia_km+' km</span>':'')+
                                    (r.tiempo_estimado_min?'<span>⏱ ~'+r.tiempo_estimado_min+' min</span>':'')+
                                    '<span>🚗 $'+(r.precio_delivery||0).toFixed(2)+'</span>'+
                                '</div>'+
                            '</div>'+
                        '</div>'+
                        // Info strip
                        '<div class="info-strip">'+
                            infoBox('⏱','~'+(r.tiempo_estimado_min||25)+' min','Entrega')+
                            infoBox('📍',(r.distancia_km||'?')+' km','Distancia')+
                            infoBox('🚗','$'+(r.precio_delivery||0).toFixed(2),'Delivery')+
                            infoBox('🍽',r.productos?r.productos.length:0,'Platos')+
                        '</div>'+
                        // Preview platos
                        '<div style="display:flex;gap:6px;margin-top:10px;overflow-x:auto;scrollbar-width:none">'+
                            previewProds.map(function(p){
                                return '<div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:5px 10px;font-size:0.7rem;font-weight:700;color:var(--gris);white-space:nowrap;flex-shrink:0">'+
                                    esc(p.nombre)+' <span style="color:var(--acc)">$'+Number(p.precio).toFixed(2)+'</span></div>';
                            }).join('')+
                            ((r.productos||[]).length>3?'<div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:5px 10px;font-size:0.7rem;font-weight:800;color:var(--acc);white-space:nowrap;flex-shrink:0">+'+(r.productos.length-3)+' mas →</div>':'')+
                        '</div>'+
                    '</div>'+
                '</div>';
            });
            h+='</div>';
            h+='<div class="app-footer">DEWAN Delivery · Riobamba, Ecuador<br>dewansas.com</div>';
            app.innerHTML=h;
            bindSortEvents();
            updateCartFloat();
        }

        // ── RESTAURANT VIEW ──
        window.openRest=function(idx){
            currentView='rest';
            currentRestIdx=idx;
            var rests=sortRests(getFilteredRestaurantes(),currentSort);
            var r=rests[idx];if(!r)return;
            var color=getColor(idx);
            var prods=r.productos||[];

            var h='<div style="background:linear-gradient(180deg,'+color+'25 0%,var(--bg) 100%);padding:20px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50">'+
                '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
                    '<button class="btn-back" onclick="renderHome()">←</button>'+
                    '<button class="btn-cart'+(window._cart.length?' has-items':'')+'" onclick="showCart()">🛒 '+(window._cart.length?cartTotals().items+' · $'+cartTotals().subtotal.toFixed(2):'Vacio')+'</button>'+
                '</div>'+
                '<div style="display:flex;gap:14px;align-items:flex-start">'+
                    '<div style="width:68px;height:68px;border-radius:18px;background:'+color+'25;border:2px solid '+color+'50;display:flex;align-items:center;justify-content:center;font-size:2.2rem;flex-shrink:0">'+getEmoji(r.nombre)+'</div>'+
                    '<div style="flex:1"><div style="font-weight:900;font-size:1.25rem">'+esc(r.nombre)+'</div>'+
                        '<div class="rest-meta" style="margin-top:6px">'+
                            (r.distancia_km?'<span>📍 '+r.distancia_km+' km</span>':'')+
                            (r.tiempo_estimado_min?'<span>⏱ ~'+r.tiempo_estimado_min+' min</span>':'')+
                            '<span>🚗 $'+(r.precio_delivery||0).toFixed(2)+'</span>'+
                        '</div>'+
                    '</div>'+
                '</div>'+
                '<div class="info-strip">'+
                    infoBox('⏱','~'+(r.tiempo_estimado_min||25)+' min','Entrega')+
                    infoBox('📍',(r.distancia_km||'?')+' km','Distancia')+
                    infoBox('🚗','$'+(r.precio_delivery||0).toFixed(2),'Delivery')+
                    infoBox('🍽',prods.length,'Platos')+
                '</div>'+
            '</div>';

            h+='<div class="menu-count">MENU · '+prods.length+' PLATOS</div>';
            h+='<div class="menu-section">';

            // Group by category
            var catMap={};
            prods.forEach(function(p){var c=p.categoria||'General';if(!catMap[c])catMap[c]=[];catMap[c].push(p)});
            var cats=Object.keys(catMap);
            var showCat=cats.length>1||(cats.length===1&&cats[0]!=='General');

            cats.forEach(function(cat){
                if(showCat) h+='<div class="cat-label">'+esc(cat)+'</div>';
                catMap[cat].forEach(function(p){
                    var ci=findCart(r.nombre,p.nombre);
                    var qty=ci?ci.qty:0;
                    h+='<div class="prod-card'+(qty?' in-cart':'')+'">'+
                        '<div class="prod-top">'+
                            '<div class="prod-emoji">'+getEmojiPlato(p.nombre)+'</div>'+
                            '<div class="prod-info">'+
                                '<div class="prod-badges">'+
                                    (qty?'<span class="badge badge-cart">EN CARRITO x'+qty+'</span>':'')+
                                '</div>'+
                                '<div class="prod-name">'+esc(p.nombre)+'</div>'+
                                (p.descripcion?'<div class="prod-desc">'+esc(p.descripcion)+'</div>':'')+
                                '<div class="prod-bottom">'+
                                    '<span class="prod-price">$'+Number(p.precio).toFixed(2)+'</span>'+
                                    (qty>0?
                                        '<div class="qty-ctrl">'+
                                            '<button class="btn-qty btn-qty-minus" onclick="event.stopPropagation();removeCart(\''+jsEsc(r.nombre)+'\',\''+jsEsc(p.nombre)+'\')">-</button>'+
                                            '<span class="qty-num">'+qty+'</span>'+
                                            '<button class="btn-qty btn-qty-plus" onclick="event.stopPropagation();addCart(\''+jsEsc(r.nombre)+'\',\''+jsEsc(p.nombre)+'\','+p.precio+','+(r.precio_delivery||0)+')">+</button>'+
                                        '</div>'
                                        :'<button class="btn-agregar" onclick="event.stopPropagation();addCart(\''+jsEsc(r.nombre)+'\',\''+jsEsc(p.nombre)+'\','+p.precio+','+(r.precio_delivery||0)+')">+ Agregar</button>'
                                    )+
                                '</div>'+
                            '</div>'+
                        '</div>'+
                    '</div>';
                });
            });
            h+='</div>';
            app.innerHTML=h;
            updateCartFloat();
        };

        // ── CART VIEW ──
        window.showCart=function(){
            currentView='cart';
            var t=cartTotals();
            if(!window._cart.length){
                app.innerHTML='<div class="cart-header"><button class="btn-back" onclick="renderHome()">←</button><span style="font-weight:900;font-size:1.2rem">Mi pedido</span></div>'+
                    '<div class="state-container"><div class="empty-icon">🛒</div><div class="state-title">Tu carrito esta vacio</div><button class="btn btn-accent" style="margin-top:20px;width:auto;padding:12px 28px" onclick="renderHome()">Ver restaurantes</button></div>';
                document.getElementById('cart-float').style.display='none';
                return;
            }
            var byRest={};
            window._cart.forEach(function(c){if(!byRest[c.restaurante])byRest[c.restaurante]=[];byRest[c.restaurante].push(c)});

            var h='<div class="cart-header"><button class="btn-back" onclick="'+(currentRestIdx!==null?'openRest('+currentRestIdx+')':'renderHome()')+'">←</button><span style="font-weight:900;font-size:1.2rem">Mi pedido</span><span style="margin-left:auto;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:0.75rem;color:var(--gris);font-weight:700">'+t.items+' items</span></div>';
            h+='<div style="padding:16px;padding-bottom:100px">';

            Object.keys(byRest).forEach(function(rest){
                h+='<div style="font-weight:800;font-size:0.8rem;color:var(--acc);padding:8px 0 4px">'+esc(rest)+'</div>';
                byRest[rest].forEach(function(c){
                    h+='<div class="cart-item">'+
                        '<div class="cart-item-emoji">'+getEmojiPlato(c.nombre)+'</div>'+
                        '<div style="flex:1"><div style="font-weight:800;font-size:0.88rem">'+esc(c.nombre)+'</div>'+
                            '<div style="color:var(--gris);font-size:0.72rem;margin-top:2px">$'+c.precio.toFixed(2)+' c/u</div>'+
                            '<div style="color:var(--acc);font-weight:900;font-size:1rem;margin-top:2px">$'+(c.precio*c.qty).toFixed(2)+'</div>'+
                        '</div>'+
                        '<div class="qty-ctrl">'+
                            '<button class="btn-qty btn-qty-minus" onclick="removeCart(\''+jsEsc(c.restaurante)+'\',\''+jsEsc(c.nombre)+'\')">-</button>'+
                            '<span class="qty-num">'+c.qty+'</span>'+
                            '<button class="btn-qty btn-qty-plus" onclick="addCart(\''+jsEsc(c.restaurante)+'\',\''+jsEsc(c.nombre)+'\','+c.precio+','+c.delivery+')">+</button>'+
                        '</div>'+
                    '</div>';
                });
            });

            h+='<div class="cart-summary-box">'+
                '<div style="font-weight:800;font-size:0.78rem;color:var(--gris);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px">Resumen</div>'+
                '<div class="cart-row"><span class="cart-row-label">Subtotal</span><span class="cart-row-val">$'+t.subtotal.toFixed(2)+'</span></div>'+
                '<div class="cart-row"><span class="cart-row-label">Delivery</span><span class="cart-row-val">$'+t.delivery.toFixed(2)+'</span></div>'+
                '<div class="cart-total-row"><span class="cart-total-label">Total a pagar</span><span class="cart-total-val">$'+t.total.toFixed(2)+'</span></div>'+
            '</div>';

            h+='<button class="btn btn-accent" style="max-width:100%;box-shadow:0 8px 28px rgba(255,221,87,0.25);display:flex;justify-content:space-between" onclick="openCheckout()">'+
                '<span>Enviar pedido</span><span>$'+t.total.toFixed(2)+'</span></button>';
            h+='<div style="text-align:center;margin-top:10px;font-size:0.7rem;color:var(--gris)">📲 Se enviara por WhatsApp</div>';
            h+='</div>';
            app.innerHTML=h;
            document.getElementById('cart-float').style.display='none';
        };

        // ── CART LOGIC ──
        window.addCart=function(rest,nombre,precio,delivery){
            var c=findCart(rest,nombre);
            if(c){c.qty++}else{window._cart.push({restaurante:rest,nombre:nombre,precio:precio,delivery:delivery,qty:1})}
            refreshView();
        };
        window.removeCart=function(rest,nombre){
            var c=findCart(rest,nombre);
            if(c){c.qty--;if(c.qty<=0)window._cart=window._cart.filter(function(x){return!(x.restaurante===rest&&x.nombre===nombre)})}
            refreshView();
        };
        function findCart(rest,nombre){
            for(var i=0;i<window._cart.length;i++){if(window._cart[i].restaurante===rest&&window._cart[i].nombre===nombre)return window._cart[i]}return null;
        }
        function cartTotals(){
            var items=0,sub=0,dels={};
            window._cart.forEach(function(c){items+=c.qty;sub+=c.precio*c.qty;dels[c.restaurante]=c.delivery||0});
            var del=0;Object.keys(dels).forEach(function(k){del+=dels[k]});
            return{items:items,subtotal:sub,delivery:del,total:sub+del};
        }
        function updateCartFloat(){
            var t=cartTotals();var f=document.getElementById('cart-float');
            if(t.items>0&&currentView!=='cart'){
                f.style.display='block';
                document.getElementById('cart-float-count').textContent=t.items;
                document.getElementById('cart-float-total').textContent='$'+t.total.toFixed(2);
                document.body.classList.add('has-cart');
            }else{f.style.display='none';document.body.classList.remove('has-cart')}
        }
        function refreshView(){
            if(currentView==='home')renderHome();
            else if(currentView==='rest'&&currentRestIdx!==null)openRest(currentRestIdx);
            else if(currentView==='cart')showCart();
        }

        // ── CHECKOUT ──
        window.openCheckout=function(){
            var t=cartTotals();if(!t.items)return;
            var byRest={};window._cart.forEach(function(c){if(!byRest[c.restaurante])byRest[c.restaurante]=[];byRest[c.restaurante].push(c)});
            var itemsH='';
            Object.keys(byRest).forEach(function(rest){
                itemsH+='<div class="modal-rest-label">'+esc(rest)+'</div>';
                byRest[rest].forEach(function(c){itemsH+='<div class="modal-item"><span class="modal-item-name">'+c.qty+'x '+esc(c.nombre)+'</span><span class="modal-item-price">$'+(c.precio*c.qty).toFixed(2)+'</span></div>'});
            });
            itemsH+='<div class="modal-total"><span>Delivery</span><span>$'+t.delivery.toFixed(2)+'</span></div>';
            itemsH+='<div class="modal-total"><span>Total</span><span style="color:var(--acc)">$'+t.total.toFixed(2)+'</span></div>';

            document.getElementById('modal-content').innerHTML=
                '<div class="modal-title">Tu pedido</div>'+
                '<div class="modal-text">Confirma y comparte tu ubicacion para el delivery.</div>'+
                '<div class="modal-items">'+itemsH+'</div>'+
                '<div class="gps-status" id="gps-status"></div>'+
                (window._clientGPS?'':'<button class="btn btn-accent" id="btn-get-gps" onclick="requestGPS()">📍 Compartir ubicacion</button>')+
                '<button class="btn btn-green" id="btn-send-wa" style="'+(window._clientGPS?'':'display:none')+'" onclick="sendWA()">Enviar por WhatsApp</button>'+
                '<button class="btn btn-outline" onclick="closeModal()">Cancelar</button>';
            if(window._clientGPS){var gs=document.getElementById('gps-status');if(gs){gs.className='gps-status success';gs.textContent='Ubicacion ya compartida'}}
            document.getElementById('modal-overlay').classList.add('visible');
        };
        window.requestGPS=function(){
            var st=document.getElementById('gps-status'),btn=document.getElementById('btn-get-gps');
            st.className='gps-status';st.textContent='Obteniendo...';btn.disabled=true;
            navigator.geolocation.getCurrentPosition(function(pos){
                window._clientGPS={lat:pos.coords.latitude,lng:pos.coords.longitude};
                st.className='gps-status success';st.textContent='Ubicacion obtenida';
                btn.style.display='none';document.getElementById('btn-send-wa').style.display='flex';
            },function(){
                st.className='gps-status error';st.textContent='No se pudo obtener GPS.';btn.disabled=false;btn.textContent='📍 Intentar de nuevo';
                document.getElementById('btn-send-wa').style.display='flex';
            },{enableHighAccuracy:true,timeout:15000});
        };
        window.sendWA=function(){
            var byRest={};window._cart.forEach(function(c){if(!byRest[c.restaurante])byRest[c.restaurante]=[];byRest[c.restaurante].push(c)});
            var t=cartTotals();
            var msg='Hola! Quiero pedir:\n\n';
            Object.keys(byRest).forEach(function(rest){
                msg+='🏪 *'+rest+'*\n';
                byRest[rest].forEach(function(c){msg+='  - '+c.qty+'x '+c.nombre+' ($'+(c.precio*c.qty).toFixed(2)+')\n'});
                msg+='\n';
            });
            msg+='💰 *Total: $'+t.total.toFixed(2)+'* (incluye delivery)\n\n';
            if(window._clientGPS) msg+='📍 Mi ubicacion:\nhttps://maps.google.com/?q='+window._clientGPS.lat+','+window._clientGPS.lng+'\n\n';
            else msg+='📍 _Enviar ubicacion por este chat_\n\n';
            msg+='Token: '+token;
            window.open('https://wa.me/'+WA+'?text='+encodeURIComponent(msg),'_blank');
            closeModal();
        };
        window.closeModal=function(){document.getElementById('modal-overlay').classList.remove('visible')};
        document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal()});

        // ── SORT ──
        function bindSortEvents(){
            document.querySelectorAll('.pill').forEach(function(b){
                b.addEventListener('click',function(){currentSort=this.getAttribute('data-sort');renderHome()});
            });
        }
        function pillBtn(key,label){return '<button class="pill'+(currentSort===key?' active':'')+'" data-sort="'+key+'">'+label+'</button>'}

        // ── HELPERS ──
        function showError(t,txt){app.innerHTML='<div class="state-container"><div class="empty-icon">😕</div><div class="state-title">'+t+'</div><div class="state-text">'+txt+'</div></div>'}
        function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
        function jsEsc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
        function infoBox(icon,val,label){return '<div class="info-box"><div class="info-box-icon">'+icon+'</div><div class="info-box-val">'+val+'</div><div class="info-box-label">'+label+'</div></div>'}
        function getColor(i){var c=['#FF6B35','#C0392B','#2C3E50','#E67E22','#27AE60','#8E44AD','#2980B9','#D35400','#16A085','#F39C12'];return c[i%c.length]}
        function getEmoji(name){
            var n=(name||'').toLowerCase();
            if(n.indexOf('pollo')!==-1||n.indexOf('broster')!==-1)return'🍗';
            if(n.indexOf('pizza')!==-1)return'🍕';if(n.indexOf('burger')!==-1||n.indexOf('hambur')!==-1)return'🍔';
            if(n.indexOf('sushi')!==-1)return'🍱';if(n.indexOf('taco')!==-1||n.indexOf('mexic')!==-1)return'🌮';
            if(n.indexOf('encebollado')!==-1||n.indexOf('mar')!==-1||n.indexOf('pesc')!==-1)return'🐟';
            if(n.indexOf('cafe')!==-1||n.indexOf('café')!==-1)return'☕';if(n.indexOf('helad')!==-1)return'🍦';
            if(n.indexOf('panaderi')!==-1||n.indexOf('pan ')!==-1)return'🥖';
            return'🍽';
        }
        function getEmojiPlato(name){
            var n=(name||'').toLowerCase();
            if(n.indexOf('pollo')!==-1||n.indexOf('broster')!==-1||n.indexOf('ala')!==-1)return'🍗';
            if(n.indexOf('encebollado')!==-1||n.indexOf('ceviche')!==-1||n.indexOf('pescado')!==-1||n.indexOf('camaron')!==-1)return'🐟';
            if(n.indexOf('pizza')!==-1)return'🍕';if(n.indexOf('burger')!==-1||n.indexOf('hambur')!==-1)return'🍔';
            if(n.indexOf('sushi')!==-1||n.indexOf('roll')!==-1)return'🍱';if(n.indexOf('taco')!==-1)return'🌮';
            if(n.indexOf('arroz')!==-1)return'🍚';if(n.indexOf('sopa')!==-1||n.indexOf('caldo')!==-1)return'🍲';
            if(n.indexOf('jugo')!==-1||n.indexOf('batido')!==-1||n.indexOf('refresco')!==-1)return'🥤';
            if(n.indexOf('cafe')!==-1||n.indexOf('café')!==-1)return'☕';
            if(n.indexOf('ensalad')!==-1)return'🥗';if(n.indexOf('papa')!==-1||n.indexOf('salchipapa')!==-1)return'🍟';
            if(n.indexOf('postre')!==-1||n.indexOf('torta')!==-1||n.indexOf('pastel')!==-1)return'🍰';
            if(n.indexOf('helad')!==-1)return'🍦';if(n.indexOf('agua')!==-1)return'💧';
            return'🍽';
        }
    })();
    </script>
</body>
</html>
