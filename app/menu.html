        window.toggleCategoryV2=function(key){
            window._showSilenciosos=false; // reset al cambiar de categoría
            if(window._activeCat===key){
                window._activeCat=null;
                renderHome();
                try{window.scrollTo({top:0,behavior:'smooth'})}catch(e){}
                return;
            }
            window._activeCat=key;
            try{window.scrollTo({top:0,behavior:'smooth'})}catch(e){}
            if(window._catRestsCache[key]){
                renderHome();
                return;
            }
            var cm=CAT_MAP_V2[key];
            // UNIFICADO (2026-05-27): TODAS las categorías usan kw-match en menu_items
            // — igual que la búsqueda. El restaurante aparece SOLO si vende algún plato
            // que matchee las keywords de la categoría. Aliados van al top.
            window._catLoading=true;
            renderHome();
            var ors=cm.kw.map(function(k){
                var kEnc=encodeURIComponent('%'+k+'%');
                return 'nombre_item.ilike.'+kEnc+',descripcion.ilike.'+kEnc+',categoria_menu.ilike.'+kEnc;
            }).join(',');
            fetchAllMatchingPlates(ors)
                .then(function(plates){
                    var rests=aggregatePlatesByRest(plates);
                    if(key==='almuerzo'&&window._almuerzosHoy){
                        var already={};
                        rests.forEach(function(r){if(r.id) already[r.id]=true});
                        Object.keys(window._almuerzosHoy).forEach(function(rid){
                            if(already[rid]) return;
                            var rFull=(sessionData.resultados||[]).find(function(x){return x.id===rid});
                            if(rFull){
                                var enriched=Object.assign({},rFull,{_matchCount:1,_matchItems:[]});
                                rests.push(enriched);
                            }
                        });
                        rests.forEach(function(r){
                            if(window._almuerzosHoy[r.id]) r._hasAlmuerzoHoy=true;
                        });
                    }
                    rankRestsByKeywords(rests,cm.kw);
                    // Boost aliados al top: primero aliado, luego cliente_paga, luego silencioso
                    rests.sort(function(a,b){
                        var sa=isRestOpen(a.horario),sb=isRestOpen(b.horario);
                        var va=sa===true?0:sa===null?1:2;
                        var vb=sb===true?0:sb===null?1:2;
                        if(va!==vb) return va-vb;
                        var ta={aliado:0,cliente_paga:1,silencioso:2}[a.tipo_acuerdo]||2;
                        var tb={aliado:0,cliente_paga:1,silencioso:2}[b.tipo_acuerdo]||2;
                        if(ta!==tb) return ta-tb;
                        if((a._score||0)!==(b._score||0)) return (b._score||0)-(a._score||0);
                        return (a.distancia_km||999)-(b.distancia_km||999);
                    });
                    window._catRestsCache[key]=rests;
                    window._catLoading=false;
                    if(window._activeCat===key) renderHome();
                }).catch(function(){
                    window._catRestsCache[key]=[];
                    window._catLoading=false;
                    if(window._activeCat===key) renderHome();
                });
        };

        window.scrollToCat=function(slug){
            var el=document.getElementById('cat-'+slug);

            var tabsWrap=document.querySelector('.cat-tabs-wrap');

        function setupCatScrollSpy(){
            var labels=document.querySelectorAll('[data-cat-slug]');
            var tabs=document.querySelectorAll('.cat-tab');
            if(window._catSpyHandler){window.removeEventListener('scroll',window._catSpyHandler);window._catSpyHandler=null}
            if(!labels.length||!tabs.length)return;
            window._catSpyHandler=function(){
                if(!labels[0]||!labels[0].isConnected){
                    window.removeEventListener('scroll',window._catSpyHandler);
                    window._catSpyHandler=null;
                    return;
                }
                var tabsWrap=document.querySelector('.cat-tabs-wrap');
                var offset=(tabsWrap?tabsWrap.offsetHeight:0)+20;
                var activeSlug=labels[0].getAttribute('data-cat-slug');
                for(var i=0;i<labels.length;i++){
                    if(labels[i].getBoundingClientRect().top<=offset) activeSlug=labels[i].getAttribute('data-cat-slug');
                }
                tabs.forEach(function(t){
                    var isActive=t.getAttribute('data-cat-target')===activeSlug;
                    t.classList.toggle('active',isActive);
                    if(isActive){
                        var tabsBar=document.getElementById('cat-tabs');
                        if(tabsBar){
                            var tabLeft=t.offsetLeft;
                            var tabRight=tabLeft+t.offsetWidth;
                            var barScroll=tabsBar.scrollLeft;
                            var barW=tabsBar.offsetWidth;
                            if(tabLeft<barScroll+8||tabRight>barScroll+barW-8){
                                tabsBar.scrollTo({left:Math.max(0,tabLeft-20),behavior:'smooth'});
                            }
                        }
                    }
                });
            };
            window.addEventListener('scroll',window._catSpyHandler,{passive:true});
            window._catSpyHandler();
        }

        var _searchTimer=null;
        function getRecentSearches(){
            try{var raw=localStorage.getItem('dewan_recent_searches');return raw?JSON.parse(raw).slice(0,6):[]}catch(e){return[]}
        }
        function saveRecentSearch(q){
            q=(q||'').trim();
            if(!q||q.length<2) return;
            var recent=getRecentSearches().filter(function(r){return r.toLowerCase()!==q.toLowerCase()});
            recent.unshift(q);
            recent=recent.slice(0,6);
            try{localStorage.setItem('dewan_recent_searches',JSON.stringify(recent))}catch(e){}
        }
        window.removeRecentSearch=function(q){
            var recent=getRecentSearches().filter(function(r){return r!==q});
            try{localStorage.setItem('dewan_recent_searches',JSON.stringify(recent))}catch(e){}
            renderSearchIdle();
        };

        var SEARCH_SUGGESTIONS=['bolón','encebollado','almuerzo','pollo broster','pizza','hamburguesa','chaulafan','ceviche','desayuno','café','postres','alitas'];

        window.showSearch=function(prefill){
            currentView='search';
            var q=(prefill!=null?prefill:(sessionData.busqueda_texto||'')).trim();
            var h='<div class="search-header-v2">'+
                '<button class="btn-back" onclick="renderHome()" aria-label="Volver">←</button>'+
                '<div class="search-input-wrap">'+
                    '<span class="search-input-wrap-icon">🔍</span>'+

                    '<button class="search-clear" id="search-clear" onclick="clearSearchInput()" aria-label="Limpiar">✕</button>'+
                '</div>'+
            '</div>'+
            '<div id="search-results-area"></div>';
            app.innerHTML=h;
            var input=document.getElementById('search-input');
            input.value=q;
            input.addEventListener('input',handleSearchInput);
            input.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();input.blur()}});
            setTimeout(function(){input.focus()},80);
            if(q){
                document.getElementById('search-clear').classList.add('visible');
                doSearch(q);
            } else {
                renderSearchIdle();
            }
        };

        function handleSearchInput(e){
            var q=e.target.value;
            document.getElementById('search-clear').classList.toggle('visible',!!q);

            if(!q.trim()){window._searchSeq=(window._searchSeq||0)+1;renderSearchIdle();return}
            // V4.7: 320ms da margen para escribir 1-2 letras más antes de disparar query
            _searchTimer=setTimeout(function(){doSearch(q)},320);
        }

            var input=document.getElementById('search-input');
            input.value='';

        // V2.1: Agrupa platos por restaurante_id, devuelve array {rest, count, items}
        function aggregatePlatesByRest(plates){
            var byRest={};
            plates.forEach(function(p){
                var key=p.restaurante_id||p.restaurante_nombre;
                if(!key) return;
                if(!byRest[key]) byRest[key]={id:p.restaurante_id,nombre:p.restaurante_nombre,count:0,items:[]};
                byRest[key].count++;
                byRest[key].items.push(p);
            });
            // Mapear a objetos restaurante reales (con horario, distancia, etc.)
            var arr=[];
            Object.keys(byRest).forEach(function(k){
                var rb=byRest[k];
                var r=(sessionData.resultados||[]).find(function(x){return x.id===rb.id||x.nombre===rb.nombre});
                if(r){
                    var enriched=Object.assign({},r,{_matchCount:rb.count,_matchItems:rb.items});
                    arr.push(enriched);
                }
            });
            return arr;
        }

        function sortRestsByMatch(rests){
            rests.sort(function(a,b){
                var sa=isRestOpen(a.horario),sb=isRestOpen(b.horario);
                var va=sa===true?0:sa===null?1:2;
                var vb=sb===true?0:sb===null?1:2;
                if(va!==vb) return va-vb;
                if((a._matchCount||0)!==(b._matchCount||0)) return (b._matchCount||0)-(a._matchCount||0);
                return (a.distancia_km||999)-(b.distancia_km||999);
            });
            return rests;
        }

        // V2.2: Score de relevancia por keywords (nombre > categoría > platos)
        // Devuelve un score para rankear, y flagea al restaurante como especialista o no.
        function scoreRestRelevance(r,keywords){
            var n=removeAccents((r.nombre||'').toLowerCase());
            var c=removeAccents((r.categoria||'').toLowerCase());
            var t=removeAccents((r.tipo_restaurante||'').toLowerCase());
            var nameMatch=false,catMatch=false;
            for(var i=0;i<keywords.length;i++){
                var k=removeAccents((keywords[i]||'').toLowerCase()).trim();
                if(!k||k.length<2) continue;
                if(n.indexOf(k)!==-1) nameMatch=true;
                if(c.indexOf(k)!==-1||t.indexOf(k)!==-1) catMatch=true;
            }
            var score=0;
            if(nameMatch) score+=10000;
            if(catMatch) score+=3000;
            score+=(r._matchCount||0)*20;
            r._score=score;
            r._specialist=score>=3000;
            r._nameMatch=nameMatch;
            r._catMatch=catMatch;
            return score;
        }

        function rankRestsByKeywords(rests,keywords){
            rests.forEach(function(r){scoreRestRelevance(r,keywords)});
            rests.sort(function(a,b){
                var sa=isRestOpen(a.horario),sb=isRestOpen(b.horario);
                var va=sa===true?0:sa===null?1:2;
                var vb=sb===true?0:sb===null?1:2;
                if(va!==vb) return va-vb;
                if(a._score!==b._score) return b._score-a._score;
                return (a.distancia_km||999)-(b.distancia_km||999);
            });
            return rests;
        }

        function partitionRests(rests){
            var specs=[],others=[];
            rests.forEach(function(r){
                if(r._specialist) specs.push(r); else others.push(r);
            });
            return {specs:specs,others:others};
        }

        // Separa por tipo comercial: socios (aliado + cliente_paga) van arriba.
        // Silenciosos se ocultan detrás de "Ver otros restaurantes".
        function partitionBySocio(rests){
            var socios=[],silenciosos=[];
            // FALLBACK: si la API no devuelve tipo_acuerdo (PostgREST schema cache,
            // columna no propagada) → tratar todos como socios para no romper la app.
            var anyHasField=rests.some(function(r){return typeof r.tipo_acuerdo==='string'});
            if(!anyHasField){
                return {socios:rests.slice(),silenciosos:[]};
            }
            rests.forEach(function(r){
                var t=r.tipo_acuerdo;
                if(t==='aliado'||t==='cliente_paga') socios.push(r);
                else silenciosos.push(r);
            });
            return {socios:socios,silenciosos:silenciosos};
        }
        // Estado global: el cliente toca "Ver otros" → revela silenciosos en la vista actual.
        // Se resetea al cambiar de categoría / al volver al home / al buscar.
        window._showSilenciosos=false;
        window.toggleSilenciosos=function(){
            window._showSilenciosos=!window._showSilenciosos;

                var ls=window._lastSearchData;
                renderSearchResults(ls.query,ls.rests,ls.plates);
            } else {
                refreshView();

            // Scroll suave hacia los silenciosos recién mostrados
            if(window._showSilenciosos){
                setTimeout(function(){

        // V4.7: Contador de secuencia para búsquedas — evita race conditions en mobile
        // donde queries lentas pueden volver desordenadas y sobrescribir resultados nuevos
        // con resultados viejos (ej: query "p" llega después de query "po" y muestra basura).
        window._searchSeq=0;

        function doSearch(query){
            var q=(query||'').trim();
            if(!q){renderSearchIdle();return}
            window._showSilenciosos=false; // reset al iniciar nueva búsqueda
            var mySeq=++window._searchSeq;
            renderSearchSkeletons();

            // 1) Match directo por nombre/categoría del restaurante (client-side, ya normaliza)
            var qNorm=removeAccents(q.toLowerCase());
            var directRests=(sessionData.resultados||[]).filter(function(r){
                var n=removeAccents((r.nombre||'').toLowerCase());
                var c=removeAccents((r.categoria||'').toLowerCase());
                var t=removeAccents((r.tipo_restaurante||'').toLowerCase());
                return n.indexOf(qNorm)!==-1||c.indexOf(qNorm)!==-1||t.indexOf(qNorm)!==-1;
            });

            // 2) V4.5: Generar variantes de la query para cubrir tildes y plurales
            //    "chaulafan" → ["chaulafan","chaulafans","cháulafan","chaúlafan","chaulafán",...]
            //    "chifas" → ["chifas","chifa"]
            //    "café" → ["café","cafe","cafés","cafes"]
            var variants=generateSearchVariants(q);
            // Construir OR con cada variante × 3 columnas (nombre_item, descripcion, categoria_menu)
            var orParts=[];
            variants.forEach(function(v){
                var enc=encodeURIComponent('%'+v+'%');
                orParts.push('nombre_item.ilike.'+enc);
                orParts.push('descripcion.ilike.'+enc);
                orParts.push('categoria_menu.ilike.'+enc);
            });
            var ors=orParts.join(',');
            fetchAllMatchingPlates(ors)
                .then(function(plates){
                    // V4.7: descartar si ya hay una búsqueda más reciente (resultado obsoleto)
                    if(mySeq!==window._searchSeq) return;
                    var restsByPlates=aggregatePlatesByRest(plates);

                    // 3) Combinar: dedup y rankear por score de relevancia
                    var seen={};
                    var combined=[];
                    directRests.forEach(function(r){if(!seen[r.id||r.nombre]){seen[r.id||r.nombre]=true;combined.push(r)}});
                    restsByPlates.forEach(function(r){if(!seen[r.id||r.nombre]){seen[r.id||r.nombre]=true;combined.push(r)}});
                    rankRestsByKeywords(combined,[q]);

                    saveRecentSearch(q);
                    renderSearchResults(q,combined,plates);
                }).catch(function(){
                    if(mySeq!==window._searchSeq) return;
                    saveRecentSearch(q);
                    renderSearchResults(q,directRests,[]);
                });
        }

        // Listener delegado en CAPTURE phase — corre ANTES del onclick del card padre.
        // Es bulletproof contra el inline onclick que no funciona consistentemente en mobile.
        function _handleServiceFeeTap(e){
            var t=e.target;
            while(t&&t!==document.body){
                if(t.getAttribute&&t.getAttribute('data-service-fee')==='1'){
                    try{console.log('[badge tap]',e.type,'target=',t.className)}catch(_){}
                    e.stopPropagation();
                    if(e.stopImmediatePropagation) e.stopImmediatePropagation();
                    if(e.cancelable) e.preventDefault();
                    var now=Date.now();
                    if(window._lastServiceFeeTap&&now-window._lastServiceFeeTap<500) return false;
                    window._lastServiceFeeTap=now;
                    // setTimeout 0: deferir apertura del modal al siguiente tick.
                    // El click event actual termina ANTES de que el modal exista,
                    // así nada puede cerrarlo accidentalmente.
                    setTimeout(function(){openServiceFeeInfo()},0);
                    return false;
                }
                t=t.parentNode;
            }
        }
        // SOLO click — escuchar mousedown/pointerup hace que el modal se abra
        // antes que click resuelva, y el click cae sobre el overlay del modal
        // recién insertado → dispara closeServiceFeeInfo → modal se cierra solo.
        document.addEventListener('click',_handleServiceFeeTap,true);

        // Modal explicación de tarifa de servicio: PRE-RENDERIZADO en DOM.
        // No se inserta on-demand → cero race conditions con el click event.
        // Se inserta una vez al cargar y solo se muestra/oculta con CSS.
        function ensureServiceFeeModal(){
            if(document.getElementById('service-fee-modal')) return;
            var html='<div id="service-fee-modal" class="sf-modal-overlay" style="display:none">'+
                '<div class="sf-modal-card">'+
                    '<div class="sf-modal-header"><span>ℹ️ Tarifa de servicio</span><button class="sf-modal-close" type="button">×</button></div>'+
                    '<div class="sf-modal-body">'+
                        '<p>Este restaurante aún no es <strong>⭐ Aliado DEWAN</strong>.</p>'+
                        '<p>Agregamos una <strong>tarifa de servicio fija de $0.10</strong> que nos permite mantener la logística, la app y el delivery funcionando para ti.</p>'+
                        '<p>Los restaurantes <strong>⭐ Aliados</strong> no tienen este recargo — pagas exactamente lo mismo que en el local.</p>'+
                        '<button class="sf-modal-ok" type="button">Entendido</button>'+
                    '</div>'+
                '</div>'+
            '</div>';
            document.body.insertAdjacentHTML('beforeend',html);
            var modal=document.getElementById('service-fee-modal');
            if(!modal) return;
            modal.addEventListener('click',function(e){
                if(e.target===modal && Date.now()-window._modalOpenedAt>250) closeServiceFeeInfo();
            });
            var x=modal.querySelector('.sf-modal-close');
            if(x) x.addEventListener('click',function(e){e.stopPropagation();closeServiceFeeInfo()});
            var ok=modal.querySelector('.sf-modal-ok');
            if(ok) ok.addEventListener('click',function(e){e.stopPropagation();closeServiceFeeInfo()});
        }
        // Insertar tan pronto el DOM esté listo
        if(document.readyState==='loading'){
            document.addEventListener('DOMContentLoaded',ensureServiceFeeModal);
        } else {
            ensureServiceFeeModal();
        }
        window.openServiceFeeInfo=function(){
            ensureServiceFeeModal();
            var m=document.getElementById('service-fee-modal');
            if(!m) return;
            window._modalOpenedAt=Date.now();
            m.style.display='flex';
        };

        function renderSearchResults(query,rests,plates){
            // Cachear última búsqueda para que toggleSilenciosos pueda re-renderizar
            window._lastSearchData={query:query,rests:rests,plates:plates};
            var area=document.getElementById('search-results-area');
            if(!area) return;
            if(!rests.length&&!plates.length){
                area.innerHTML='<div class="search-empty-state-v2">'+
                    '<div class="search-empty-icon">🔎</div>'+
                    '<div class="search-empty-title">No encontramos "'+esc(query)+'"</div>'+
                    '<div class="search-empty-text">Prueba con otro término o explora una categoría desde el home.</div>'+
                '</div>';
                return;
            }
            var html='';
            if(rests.length){
                var parts=partitionRests(rests);
                var hasSpecs=parts.specs.length>0;
                var hasBoth=hasSpecs&&parts.others.length>0;
                var globalIdx=0;
                // V2.6: si matchea por nombre del restaurante → menú completo;
                //       si es match por plato/categoría → menú filtrado por la query
                function clickCmd(r){
                    if(r._nameMatch) return 'openRest(\''+jsEsc(r.nombre)+'\')';
                    return 'openRestFiltered(\''+jsEsc(r.nombre)+'\',\''+jsEsc(query)+'\')';
                }

                // V4.5: usar grilla 3-columnas (igual que la home/categorias) en vez de filas compactas
                // Dentro de specs y others, separar socios de silenciosos
                var specsBy=partitionBySocio(parts.specs);
                var othersBy=partitionBySocio(parts.others);
                var hasSpecsSoc=specsBy.socios.length>0;
                var hasOthersSoc=othersBy.socios.length>0;
                var totalSilenciosos=specsBy.silenciosos.length+othersBy.silenciosos.length;

                if(hasSpecsSoc){
                    html+='<div class="search-section-title-v2">'+(hasSpecsSoc&&hasOthersSoc?'✨ Especialistas en "':'🏪 Restaurantes que venden "')+esc(query)+'"<span class="search-section-count">'+specsBy.socios.length+'</span></div>';
                    html+='<div class="grid3-wrap">';
                    specsBy.socios.forEach(function(r){html+=renderRestCardGrid(r,globalIdx++,clickCmd(r))});
                    html+='</div>';
                }
                if(hasOthersSoc){
                    html+='<div class="search-section-title-v2">'+(hasSpecsSoc?'🏪 También ofrecen "'+esc(query)+'"':'🏪 Restaurantes que venden "'+esc(query)+'"')+'<span class="search-section-count">'+othersBy.socios.length+'</span></div>';
                    html+='<div class="grid3-wrap">';
                    othersBy.socios.forEach(function(r){html+=renderRestCardGrid(r,globalIdx++,clickCmd(r))});
                    html+='</div>';
                }
                // Botón Ver otros restaurantes + silenciosos
                html+=renderSilenciososBtn(totalSilenciosos);
                if(window._showSilenciosos&&totalSilenciosos>0){
                    html+='<div id="silenciosos-section">';
                    html+='<div class="search-section-title-v2">🏪 Otros restaurantes<span class="search-section-count">'+totalSilenciosos+'</span></div>';
                    html+='<div class="grid3-wrap">';
                    specsBy.silenciosos.forEach(function(r){html+=renderRestCardGrid(r,globalIdx++,clickCmd(r))});
                    othersBy.silenciosos.forEach(function(r){html+=renderRestCardGrid(r,globalIdx++,clickCmd(r))});
                    html+='</div>';
                    html+=renderOcultarSilenciososBtn();
                    html+='</div>';
                }
            }
            // SECCIÓN SECUNDARIA: platos individuales (los más relevantes)
            if(plates.length){
                var topPlates=plates.slice(0,8);
                html+='<div class="search-section-title-v2">🍽 Platos populares<span class="search-section-count">'+topPlates.length+(plates.length>8?'+':'')+'</span></div>';
                topPlates.forEach(function(p){
                    html+='<div class="plate-card" onclick="openRestFiltered(\''+jsEsc(p.restaurante_nombre||'')+'\',\''+jsEsc(query)+'\')">'+
                        '<div class="plate-emoji">'+getEmojiPlato(p.nombre_item)+'</div>'+
                        '<div class="plate-info">'+
                            '<div class="plate-name">'+esc(p.nombre_item)+'</div>'+
                            '<div class="plate-rest">🏪 '+esc(p.restaurante_nombre||'—')+'</div>'+
                        '</div>'+
                        '<div class="plate-price">$'+Number(p.precio||0).toFixed(2)+'</div>'+
                    '</div>';
                });
            }
            area.innerHTML=html;
        }

        // ── CART LOGIC ──
        // V4.2: parser defensivo de precios — soporta "6.50", "6,50", null, undefined → siempre devuelve Number
        function parsePrice(v){
            if(v==null)return 0;
            if(typeof v==='number')return isFinite(v)?v:0;
            var n=parseFloat(String(v).replace(',','.'));
            return isFinite(n)?n:0;
        }

        // V4.2: Particula que vuela del punto (x0,y0) hasta el carrito flotante
        // Da feedback visual de "se agrego" + sensacion de progreso/recompensa.
        function flyFromPoint(x0,y0,emoji){
            try{
                if(x0==null||y0==null)return;
                var cart=document.getElementById('cart-float');
                if(!cart||cart.style.display==='none'){
                    // Cart aun no visible: usar bottom-center como destino aproximado
                    var x1d=window.innerWidth/2,y1d=window.innerHeight-32;
                    return _spawnParticle(x0,y0,x1d,y1d,emoji);
                }
                var ctaEl=cart.querySelector('.cart-float-cta')||cart;
                var dRect=ctaEl.getBoundingClientRect();
                _spawnParticle(x0,y0,dRect.left+dRect.width/2,dRect.top+dRect.height/2,emoji);
            }catch(e){}
        }
        function _spawnParticle(x0,y0,x1,y1,emoji){
            var p=document.createElement('span');
            p.className='fly-particle';
            p.textContent=emoji||'✨';
            p.style.left=(x0-12)+'px';
            p.style.top=(y0-12)+'px';
            p.style.transform='translate(0,0) scale(1)';
            p.style.opacity='1';
            p.style.transition='none';
            document.body.appendChild(p);
            void p.offsetWidth; // reflow para que la transicion arranque
            var dx=x1-x0,dy=y1-y0;
            p.style.transition='transform 620ms cubic-bezier(0.55,0,0.65,1),opacity 620ms ease-in';
            p.style.transform='translate('+dx+'px,'+dy+'px) scale(0.32) rotate(360deg)';
            p.style.opacity='0';
            setTimeout(function(){if(p.parentNode)p.parentNode.removeChild(p)},680);
        }
        // Captura las coordenadas del boton + tocado ANTES del refreshView()
        function captureClickPoint(){
            try{
                var ev=window.event;
                if(ev){
                    var t=ev.changedTouches&&ev.changedTouches[0];
                    if(t)return{x:t.clientX,y:t.clientY};
                    if(ev.clientX!=null)return{x:ev.clientX,y:ev.clientY};
                    var tgt=ev.currentTarget||ev.target;
                    if(tgt&&tgt.getBoundingClientRect){var r=tgt.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2}}
                }
            }catch(e){}
            return null;
        }
        function pickEmojiForFly(nombre){
            try{return getEmojiPlato(nombre)||'✨'}catch(e){return '✨'}
        }

        window.addCart=function(rest,nombre,precio,delivery,fotoUrl,cargoEnvase,precioRegular){
            var p=parsePrice(precio),d=parsePrice(delivery),e=parsePrice(cargoEnvase);
            var pr=(precioRegular!=null&&precioRegular!==''&&Number(precioRegular)>0)?parsePrice(precioRegular):null;
            var pt=captureClickPoint();
            var c=findCart(rest,nombre);
            if(c){c.qty++;c.precio=p;c.delivery=d;if(cargoEnvase!=null)c.cargo_envase=e;if(fotoUrl)c.foto_url=fotoUrl;c.precio_regular=pr;}
            else{window._cart.push({restaurante:rest,nombre:nombre,precio:p,delivery:d,qty:1,foto_url:fotoUrl||null,cargo_envase:e,precio_regular:pr})}
            saveCart(); // CAMBIO 2
            markEtapa('agrego_carrito');
            refreshView();
            if(pt)requestAnimationFrame(function(){flyFromPoint(pt.x,pt.y,pickEmojiForFly(nombre))});
        };
        window.removeCart=function(rest,nombre){
            var c=findCart(rest,nombre);
            if(c){c.qty--;if(c.qty<=0)window._cart=window._cart.filter(function(x){return!(x.restaurante===rest&&x.nombre===nombre)})}
            saveCart(); // CAMBIO 2
            refreshView();
        };
        window.updateNota=function(idx,val){
            if(window._cart[idx]) window._cart[idx].nota=val;
            saveCart(); // CAMBIO 2
        };
        function findCart(rest,nombre){
            for(var i=0;i<window._cart.length;i++){if(window._cart[i].restaurante===rest&&window._cart[i].nombre===nombre&&!window._cart[i].almuerzoChoices)return window._cart[i]}return null;
        }
        // Tarifa de servicio fija $0.10 (solo para restaurantes NO aliados)
        function calcServiceFee(sub){
            if(sub<=0) return 0;
            return 0.10;
        }
        function getRestByName(name){
            var found=null;
            (sessionData.resultados||[]).forEach(function(r){if(r.nombre===name) found=r});
            return found;
        }
        function isAliadoRest(name){
            var r=getRestByName(name);
            return !!(r && r.tipo_acuerdo==='aliado');
        }
        // Pricing v2: solo silenciosos pagan tarifa de servicio
        function isSilenciosoRest(name){
            var r=getRestByName(name);
            return !!(r && r.tipo_acuerdo==='silencioso');
        }

        function cartTotals(){
            var items=0,sub=0,subReg=0,dels={},subsByRest={},envases=0,subBase=0;
            window._cart.forEach(function(c){
                var q=parsePrice(c.qty),p=parsePrice(c.precio),e=parsePrice(c.cargo_envase);
                var pr=(c.precio_regular!=null&&parsePrice(c.precio_regular)>p)?parsePrice(c.precio_regular):p;
                items+=q;sub+=p*q;subReg+=pr*q;
                var pb=(c.precio_base!=null&&parsePrice(c.precio_base)>0)?parsePrice(c.precio_base):p;subBase+=pb*q;
                envases+=e*q;
                dels[c.restaurante]=parsePrice(c.delivery);
                subsByRest[c.restaurante]=(subsByRest[c.restaurante]||0)+p*q;
            });
            subReg=Math.round(subReg*100)/100;
            envases=Math.round(envases*100)/100;
            var del=0;Object.keys(dels).forEach(function(k){del+=dels[k]});
            // Pricing v2: solo silenciosos pagan tarifa de servicio.
            // Aliados y cliente_paga ya tienen markup en el precio, no se les cobra extra.
            var serviceFee=0;
            Object.keys(subsByRest).forEach(function(rest){
                if(isSilenciosoRest(rest)){
                    serviceFee+=calcServiceFee(subsByRest[rest]);
                }
            });
            serviceFee=Math.round(serviceFee*100)/100;
            return{items:items,subtotal:sub,subtotalRegular:subReg,envases:envases,delivery:del,serviceFee:serviceFee,subtotalBase:Math.round(subBase*100)/100,total:sub+del+serviceFee+envases};
        }
        // Animated count-up del total: anima de `from` a `to` con easeOutCubic
        function animateMoney(el,from,to,duration,suffix){
            if(!el)return;
            from=parsePrice(from);to=parsePrice(to);
            if(duration==null)duration=420;
            suffix=suffix||'';
            if(!duration||duration<=0||Math.abs(to-from)<0.005){el.textContent='$'+to.toFixed(2)+suffix;return}
            var start=null;
            var step=function(ts){
                if(!start)start=ts;
                var p=Math.min((ts-start)/duration,1);
                var e=1-Math.pow(1-p,3);
                var val=from+(to-from)*e;
                el.textContent='$'+val.toFixed(2)+suffix;
                if(p<1)requestAnimationFrame(step);
            };
            requestAnimationFrame(step);
        }
        window._cartFloatPrevTotal=0;
        function updateCartFloat(){
            var t=cartTotals();var f=document.getElementById('cart-float');
            if(t.items>0&&currentView!=='cart'){
                var wasVisible=f.style.display==='block';
                f.style.display='block';
                var countEl=document.getElementById('cart-float-count');
                var totalEl=document.getElementById('cart-float-total');
                var subEl=document.getElementById('cart-float-sub');
                var cta=f.querySelector('.cart-float-cta');
                if(countEl.textContent!==String(t.items)&&wasVisible&&cta){
                    cta.classList.remove('cart-float-bump');
                    void cta.offsetWidth;
                    cta.classList.add('cart-float-bump');
                }
                countEl.textContent=t.items;
                if(subEl){
                    var rests=Object.keys(window._cart.reduce(function(a,c){a[c.restaurante]=1;return a},{})).length;
                    var pieces=t.items+' '+(t.items===1?'plato':'platos');
                    var cup=(typeof yaPidio==='function'&&!yaPidio()&&t.subtotal>=4)?' · 🎁 -$0.50 1er pedido':'';
                    subEl.textContent=pieces+(rests>1?' · '+rests+' locales':'')+cup;
                }
                var toVal=window._clientGPS?t.total:(t.subtotal+t.serviceFee+t.envases);
                var suffix=window._clientGPS?'':' + envío desde $2';
                animateMoney(totalEl,window._cartFloatPrevTotal,toVal,wasVisible?420:0,suffix);
                window._cartFloatPrevTotal=toVal;
                document.body.classList.add('has-cart');
            }else{f.style.display='none';document.body.classList.remove('has-cart');window._cartFloatPrevTotal=0}
        }
        function refreshView(){
            if(currentView==='home')renderHome();
            else if(currentView==='rest'&&currentRestIdx!==null)openRest(currentRestIdx);
            else if(currentView==='cart')showCart();
        }

        // ── GPS desde carrito inline ──
        window.requestGPSCart=function(){
            var st=document.getElementById('gps-status-cart'),btn=document.getElementById('btn-gps-cart');
            if(st){st.className='gps-status checkout-gps-searching';st.textContent='🔍 Buscando tu ubicación...';}
            if(btn){btn.disabled=true;btn.textContent='🔍 Buscando...';}
            navigator.geolocation.getCurrentPosition(function(pos){
                window._clientGPS={lat:pos.coords.latitude,lng:pos.coords.longitude};
                // Recalcular delivery en el carrito con nueva ubicación
                var rests=getFilteredRestaurantes();
                var deliveryByRest={};
                rests.forEach(function(r){deliveryByRest[r.nombre]=r.precio_delivery||0});
                window._cart.forEach(function(c){
                    if(deliveryByRest[c.restaurante]!=null) c.delivery=deliveryByRest[c.restaurante];
                });
                saveCart();
                // Capturar referencia antes de re-renderizar
                var addrInput=document.getElementById('loc-addr');
                if(addrInput) window._clientAddr=addrInput.value;
                // Re-render completo para actualizar totales + sección ubicación
                showCart();
            },function(){
                if(st){st.className='gps-status';st.textContent='No se pudo obtener GPS';}
                if(btn){btn.disabled=false;btn.textContent='📍 Usar mi ubicación GPS';}
                // Mostrar campo de texto automáticamente si falla GPS
                var wrap=document.getElementById('loc-addr-wrap');
                if(wrap) wrap.classList.add('visible');
            },{enableHighAccuracy:true,timeout:15000});
        };
        window.toggleAddrField=function(){
            var wrap=document.getElementById('loc-addr-wrap');
            if(wrap) wrap.classList.toggle('visible');
            var input=document.getElementById('loc-addr');
            if(input&&wrap.classList.contains('visible')) input.focus();
        };

        // sendWA — CAMBIO 3: incluir dirección de texto si no hay GPS
        window.sendWA=function(){
            // V2.3: Enforce GPS o dirección manual antes de enviar
            var addrInputCheck=document.getElementById('loc-addr');
            var addrVal=addrInputCheck?addrInputCheck.value.trim():(window._clientAddr||'').trim();
            if(!window._clientGPS&&(!addrVal||addrVal.length<6)){
                // Scroll + pulso visual hacia la sección de ubicación
                var locSection=document.getElementById('loc-section');
                if(locSection){
                    locSection.scrollIntoView({behavior:'smooth',block:'start'});
                    setTimeout(function(){
                        pulseHint(locSection);
                        var gpsBtn=document.getElementById('btn-gps-cart');
                        var addrInput=document.getElementById('loc-addr');
                        if(gpsBtn) pulseHint(gpsBtn);
                        if(addrInput) pulseHint(addrInput);
                    },220);
                } else {
                    openGPSStrict();
                }
                return;
            }
            var byRest={};window._cart.forEach(function(c){if(!byRest[c.restaurante])byRest[c.restaurante]=[];byRest[c.restaurante].push(c)});
            var t=cartTotals();
            var msg='Hola! Quiero pedir:\n\n';
            Object.keys(byRest).forEach(function(rest){
                msg+='🏪 *'+rest+'*\n';
                byRest[rest].forEach(function(c){
                    // FIX 2026-05-28: mostrar precio UNITARIO con sufijo c/u si qty>1.
                    // Antes mostraba (c.precio*c.qty) pero el parser n8n lo trataba como
                    // unitario y multiplicaba otra vez por qty -> subtotal inflado.
                    var precioStr=c.qty>1 ? '$'+c.precio.toFixed(2)+' c/u' : '$'+c.precio.toFixed(2);
                    msg+='  - '+c.qty+'x '+c.nombre+' ('+precioStr+')\n';
                    if(c.almuerzoChoices){
                        var catOrder=['entrada','sopa','segundo','guarnicion','jugo','postre'];
                        var catLabels={entrada:'Entrada',sopa:'Sopa',segundo:'Segundo',guarnicion:'Guarnición',jugo:'Jugo',postre:'Postre'};
                        catOrder.forEach(function(cat){
                            if(c.almuerzoChoices[cat]) msg+='    ▸ '+(catLabels[cat]||cat)+': '+c.almuerzoChoices[cat]+'\n';
                        });
                    }
                    if(c.nota)msg+='    📝 '+c.nota+'\n';
                });
                msg+='\n';
            });
            // FIX 2026-05-28: SIEMPRE incluir Subtotal como red de seguridad para el parser.
            msg+='💰 *Subtotal: $'+t.subtotal.toFixed(2)+'*\n';
            if(t.subtotalBase>0&&t.subtotalBase<t.subtotal) msg+='Base local: $'+t.subtotalBase.toFixed(2)+'\n';
            if(t.envases>0) msg+='📦 Envases: $'+t.envases.toFixed(2)+'\n';
            if(t.serviceFee>0) msg+='ℹ️ Tarifa de servicio: $'+t.serviceFee.toFixed(2)+'\n';
            if(window._clientGPS){
                msg+='🛵 Envío: $'+(t.delivery||0).toFixed(2)+'\n';
                msg+='💰 *Total: $'+t.total.toFixed(2)+'*\n\n';
            } else {
                msg+='💰 *Total parcial: $'+(t.subtotal+t.serviceFee+t.envases).toFixed(2)+'* + envío (se calcula al compartir ubicación)\n\n';
            }
            // Capturar valor actual del campo de dirección/referencia
            var addrInput=document.getElementById('loc-addr');
            if(addrInput) window._clientAddr=addrInput.value;
            if(window._clientGPS){
                msg+='📍 Mi ubicacion:\nhttps://maps.google.com/?q='+window._clientGPS.lat+','+window._clientGPS.lng+'\n';
                if(window._clientAddr&&window._clientAddr.trim()) msg+='📝 Ref: '+window._clientAddr.trim()+'\n';
                msg+='\n';
            } else if(window._clientAddr&&window._clientAddr.trim()){
                msg+='📍 Dirección: '+window._clientAddr.trim()+'\n\n';
            } else {
                msg+='📍 _Enviar ubicacion por este chat_\n\n';
            }
            // V4.6: Método de pago
            if(window._payMethod==='transferencia'){
                msg+='💳 *Pago: Transferencia* 🏦\n_(El motorizado entregará el número de cuenta al llegar)_\n\n';
            } else {
                msg+='💳 *Pago: Efectivo* 💵\n\n';
            }
            msg+='Token: '+token+'\n';
            // UUID anónimo del dispositivo - el bot lo vincula al teléfono real al recibir pedido
            msg+='Cliente: '+obtenerUuidCliente();
            window.open('https://wa.me/'+WA+'?text='+encodeURIComponent(msg),'_blank');
            // Marcar que ya intentó enviar 1er pedido — visitas siguientes consultan cupón en BD por uuid
            marcarYaPidio();
            // Invalidar cache de cupones para que próxima visita consulte BD fresca
            window._cuponActivoCache=null;
            // FIX #4: guardar resumen para pantalla de éxito ANTES de limpiar el carrito
            var resumen={items:t.items,total:window._clientGPS?t.total:(t.subtotal+t.serviceFee+t.envases),conGPS:!!window._clientGPS};
            markEtapa('confirmo');
            closeModal();
            showSuccessScreen(resumen);
        };

        function showError(t,txt){app.innerHTML='<div class="state-container"><div class="empty-icon">😕</div><div class="state-title">'+t+'</div><div class="state-text">'+txt+'</div></div>'}
        function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
        function jsEsc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
        function infoBox(icon,val,label){return '<div class="info-box"><div class="info-box-icon">'+icon+'</div><div class="info-box-val">'+val+'</div><div class="info-box-label">'+label+'</div></div>'}
        function isRestOpen(horario){
            if(!horario||!horario.trim()) return null;
            var now=new Date(new Date().toLocaleString('en-US',{timeZone:'America/Guayaquil'}));
            var nowMin=now.getHours()*60+now.getMinutes();
            var clean=horario.replace(/\s*(am|pm)\s*/gi,function(m,p){return ' '+p.toLowerCase()+' '}).trim();
            var parts=clean.split(/\s*[-–]\s*/);
            if(parts.length<2) return null;
            function parseTime(s){
                s=s.trim();
                var m=s.match(/(\d{1,2}):(\d{2})\s*(am|pm)?/i);
                if(!m) return null;
                var h=parseInt(m[1],10),min=parseInt(m[2],10),ampm=m[3]?m[3].toLowerCase():null;
                if(ampm==='pm'&&h<12) h+=12;
                if(ampm==='am'&&h===12) h=0;
                return h*60+min;
            }
            var open=parseTime(parts[0]),close=parseTime(parts[1]);
            if(open===null||close===null) return null;
            if(close<=open) return nowMin>=open||nowMin<close;
            return nowMin>=open&&nowMin<close;
        }
        function openBadge(horario){
            var st=isRestOpen(horario);
            if(st===null) return '';
            return st?'<span class="badge-open">🟢 Abierto</span>':'<span class="badge-closed">🔴 Cerrado</span>';
        }
        function getColor(i){var c=['#FF6B35','#FF3B5C','#8B5CF6','#00C2D1','#00D26A','#FFB800'];return c[i%c.length]}
        function getEmoji(name){
            var n=(name||'').toLowerCase();
            if(n.indexOf('pollo')!==-1||n.indexOf('broster')!==-1)return'🍗';
            if(n.indexOf('pizza')!==-1)return'🍕';if(n.indexOf('burger')!==-1||n.indexOf('hambur')!==-1)return'🍔';
            if(n.indexOf('sushi')!==-1)return'🍱';if(n.indexOf('taco')!==-1||n.indexOf('mexic')!==-1)return'🌮';
            if(n.indexOf('encebollado')!==-1||n.indexOf('mar')!==-1||n.indexOf('pesc')!==-1)return'🐟';
            if(n.indexOf('cafe')!==-1||n.indexOf('café')!==-1)return'☕';if(n.indexOf('helad')!==-1)return'🍦';
            if(n.indexOf('panaderi')!==-1||n.indexOf('pan ')!==-1)return'🥖';
            return'🍽';
        }
        function getEmojiPlato(name){
            var n=(name||'').toLowerCase();
            if(n.indexOf('pollo')!==-1||n.indexOf('broster')!==-1||n.indexOf('ala')!==-1)return'🍗';
            if(n.indexOf('encebollado')!==-1||n.indexOf('ceviche')!==-1||n.indexOf('pescado')!==-1||n.indexOf('camaron')!==-1)return'🐟';
            if(n.indexOf('pizza')!==-1)return'🍕';if(n.indexOf('burger')!==-1||n.indexOf('hambur')!==-1)return'🍔';
            if(n.indexOf('sushi')!==-1||n.indexOf('roll')!==-1)return'🍱';if(n.indexOf('taco')!==-1)return'🌮';
            if(n.indexOf('arroz')!==-1)return'🍚';if(n.indexOf('sopa')!==-1||n.indexOf('caldo')!==-1)return'🍲';
            if(n.indexOf('jugo')!==-1||n.indexOf('batido')!==-1||n.indexOf('refresco')!==-1)return'🥤';
            if(n.indexOf('cafe')!==-1||n.indexOf('café')!==-1)return'☕';
            if(n.indexOf('ensalad')!==-1)return'🥗';if(n.indexOf('papa')!==-1||n.indexOf('salchipapa')!==-1)return'🍟';
            if(n.indexOf('postre')!==-1||n.indexOf('torta')!==-1||n.indexOf('pastel')!==-1)return'🍰';
            if(n.indexOf('helad')!==-1)return'🍦';if(n.indexOf('agua')!==-1)return'💧';

        }

        // ── ALMUERZO HELPERS ──
        function parseAlmuerzo(desc){
            if(!desc||typeof desc!=='string') return null;
            if(desc.indexOf('ALMUERZO_OPTS:')!==0) return null;
            try{return JSON.parse(desc.substring(14))}catch(e){return null}
        }
        var almCatIcons={entrada:'🧆',sopa:'🍲',segundo:'🍽️',guarnicion:'🥗',jugo:'🥤',postre:'🍰'};
        var almCatOrder=['entrada','sopa','segundo','guarnicion','jugo','postre'];
        function buildAlmuerzoDesc(data){
            var grouped={};
            (data.opciones||[]).forEach(function(o){
                var c=o.categoria||'otro';
                if(!grouped[c])grouped[c]=[];
                grouped[c].push(o.nombre);
            });
            var parts=[];
            almCatOrder.forEach(function(cat){
                if(grouped[cat]){
                    parts.push((almCatIcons[cat]||'')+' '+cat.charAt(0).toUpperCase()+cat.slice(1)+': '+grouped[cat].join(' / '));
                }
            });
            return parts.join(' | ');
        }
        function countAlmuerzoCart(rest,nombre){
            var count=0;
            window._cart.forEach(function(c){if(c.restaurante===rest&&c.nombre===nombre&&c.almuerzoChoices)count++});
            return count;
        }
        window.removeAlmuerzoCart=function(idx){
            if(idx>=0&&idx<window._cart.length) window._cart.splice(idx,1);
            saveCart(); // CAMBIO 2
            refreshView();
        };
        window.openAlmuerzoModal=function(rest,nombre,almIdx,delivery){
            var descRaw=window._almMenuData[almIdx].desc;
            var data=parseAlmuerzo(descRaw);
            if(!data)return;
            var precio=data.precio||0;
            var grouped={};
            (data.opciones||[]).forEach(function(o){
                var c=o.categoria||'otro';
                if(!grouped[c])grouped[c]=[];
                grouped[c].push(o);
            });

            var h='<div class="almuerzo-modal">'+
                '<div class="almuerzo-header">'+
                    '<div class="almuerzo-header-icon">🍱</div>'+
                    '<div class="almuerzo-header-title">'+esc(nombre)+'</div>'+
                    '<div class="almuerzo-header-rest">'+esc(rest)+'</div>'+
                    (precio?'<div class="almuerzo-header-price">$'+Number(precio).toFixed(2)+'</div>':'<div class="almuerzo-header-price" style="color:var(--gris)">Consultar</div>')+
                '</div>';

            var needsSelection=[];
            almCatOrder.forEach(function(cat){
                if(!grouped[cat])return;
                var opts=grouped[cat];
                var isSingle=opts.length===1;
                h+='<div class="almuerzo-cat">'+
                    '<div class="almuerzo-cat-title">'+(almCatIcons[cat]||'')+' '+cat.charAt(0).toUpperCase()+cat.slice(1)+
                    (isSingle?' <span class="almuerzo-cat-badge incluido">Incluido</span>':' <span class="almuerzo-cat-badge elige">ELIGE UNA</span>')+
                    '</div>';
                opts.forEach(function(o){
                    if(isSingle){
                        h+='<div class="almuerzo-opt single" data-cat="'+cat+'" data-val="'+esc(o.nombre)+'">'+
                            '<div class="almuerzo-radio"></div>'+
                            '<div class="almuerzo-opt-name">'+esc(o.nombre)+'</div>'+
                        '</div>';
                    }else{
                        h+='<div class="almuerzo-opt" data-cat="'+cat+'" data-val="'+esc(o.nombre)+'" onclick="selectAlmOpt(this)">'+
                            '<div class="almuerzo-radio"></div>'+
                            '<div class="almuerzo-opt-name">'+esc(o.nombre)+'</div>'+
                        '</div>';
                    }
                });
                if(!isSingle) needsSelection.push(cat);
                h+='</div>';
            });

            h+='<button class="btn-almuerzo-add" id="btn-alm-add" onclick="confirmAlmuerzo()" '+(needsSelection.length?'disabled':'')+'>🍱 Agregar al pedido</button>'+
                '<button class="btn btn-outline" style="margin-top:8px" onclick="closeModal()">Cancelar</button>'+
            '</div>';

            window._almPending={rest:rest,nombre:nombre,precio:precio,delivery:delivery,needsSelection:needsSelection};

            document.getElementById('modal-content').innerHTML=h;

            var singles=document.querySelectorAll('.almuerzo-opt.single');
            singles.forEach(function(el){el.classList.add('selected')});

            document.getElementById('modal-overlay').classList.add('visible');
        };
        window.selectAlmOpt=function(el){
            var cat=el.getAttribute('data-cat');
            var siblings=document.querySelectorAll('.almuerzo-opt[data-cat="'+cat+'"]');
            siblings.forEach(function(s){s.classList.remove('selected')});
            el.classList.add('selected');
            checkAlmReady();
        };
        function checkAlmReady(){
            if(!window._almPending)return;
            var ready=true;
            window._almPending.needsSelection.forEach(function(cat){
                var sel=document.querySelector('.almuerzo-opt.selected[data-cat="'+cat+'"]');
                if(!sel) ready=false;
            });
            var btn=document.getElementById('btn-alm-add');
            if(btn) btn.disabled=!ready;
        }
        window.confirmAlmuerzo=function(){
            if(!window._almPending)return;
            var p=window._almPending;
            var choices={};
            var selected=document.querySelectorAll('.almuerzo-opt.selected');
            selected.forEach(function(el){
                choices[el.getAttribute('data-cat')]=el.getAttribute('data-val');
            });
            window._cart.push({
                restaurante:p.rest,
                nombre:p.nombre,
                precio:p.precio,
                delivery:p.delivery,
                qty:1,
                almuerzoChoices:choices
            });
            saveCart(); // CAMBIO 2
            window._almPending=null;
            closeModal();
            refreshView();
        };

        // V2: Modal estricto para forzar GPS o dirección antes de pedir
        window.openGPSStrict=function(){
            var modalRoot=document.getElementById('modal-overlay');
            var content=document.getElementById('modal-content');
            if(!modalRoot||!content) return;
            content.innerHTML='<div class="gps-strict">'+
                '<button class="modal-close" onclick="closeModal()" aria-label="Cerrar">✕</button>'+
                '<div class="gps-strict-icon">📍</div>'+
                '<div class="gps-strict-title">¿Dónde llevamos tu pedido?</div>'+
                '<div class="gps-strict-text">Para que tu rider te encuentre al toque necesitamos tu ubicación o una dirección.</div>'+
                '<div class="gps-strict-actions">'+
                    '<button class="btn btn-accent" style="margin:0" onclick="gpsStrictUseLocation()">📍 Usar mi ubicación GPS</button>'+
                    '<button class="btn btn-outline" style="margin:0" onclick="gpsStrictUseAddress()">📝 Escribir mi dirección</button>'+
                '</div>'+
            '</div>';
            modalRoot.classList.add('visible');
        };
        function pulseHint(el){
            if(!el) return;
            el.classList.add('pulse-hint');
            setTimeout(function(){try{el.classList.remove('pulse-hint')}catch(e){}},6000);
        }
        window.gpsStrictUseLocation=function(){
            closeModal();
            setTimeout(function(){
                var gpsBtn=document.getElementById('btn-gps-cart');
                if(gpsBtn){pulseHint(gpsBtn);gpsBtn.scrollIntoView({behavior:'smooth',block:'center'})}
                // Dispara la solicitud de GPS directamente
                if(typeof requestGPSCart==='function'){setTimeout(function(){if(gpsBtn) gpsBtn.click()},300);}
            },150);
        };
        window.gpsStrictUseAddress=function(){
            closeModal();
            setTimeout(function(){
                var addrInput=document.getElementById('loc-addr');
                if(addrInput){
                    addrInput.scrollIntoView({behavior:'smooth',block:'center'});
                    setTimeout(function(){addrInput.focus();pulseHint(addrInput)},320);
                }
            },150);
        };
    })();
    </script>
