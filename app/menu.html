        /* ===== CARRITO BOTTOM-SHEET (sube desde abajo, el menú queda detrás) ===== */
        .sheet-overlay{position:fixed;inset:0;background:rgba(20,8,2,.5);opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;z-index:95;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
        .sheet-overlay.open{opacity:1;visibility:visible}
        .cart-sheet{position:fixed;left:0;right:0;bottom:0;height:92vh;max-height:92vh;background:var(--bg);z-index:100;transform:translateY(100%);transition:transform .34s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;border-radius:20px 20px 0 0;box-shadow:0 -14px 44px rgba(0,0,0,.34);overflow:hidden}
        .cart-sheet.open{transform:translateY(0)}
        .cart-sheet-handle{flex-shrink:0;display:flex;justify-content:center;align-items:center;padding:9px 0 5px;cursor:pointer}

            if(ta==='aliado'){
                if(mk<=0) return precioBase;                         // aliado sin markup = precio del local EXACTO (no redondear)
                return redondear5(precioBase*(1+mk/100));            // aliado con markup = +mk% redondeado a $0.05 (todos los dias)
            }
            if(mk<=0) return precioBase;
            return redondear5(precioBase*(1+mk/100));                // cliente_paga: +mk% redondeado a $0.05
        }
        // Precio "regular" tachado (SOLO aliados, no bebidas): el .49/.99. Siempre arriba del
        // precio cobrado para que el cliente vea el descuento. NUNCA se cobra. null = no mostrar.
        var REGULAR_PCT=0; // [honestidad] sin tachado fabricado; el sello -X% (descuentoPctRest) queda en 0
        function precioRegular(precioBase,rest,categoria){
            // [honestidad 14-jun] tachado "antes $X" DESACTIVADO: era un ancla falsa (+5% que nunca se cobro,
            // ilegal en EC + riesgo reputacional en ciudad chica). Solo reactivar si se carga un descuento REAL en BD.
            return null;
        }
        // % de descuento que se muestra en la tarjeta del restaurante (solo aliados).
        function descuentoPctRest(rest){
            if(!rest||rest.tipo_acuerdo!=='aliado') return 0;
            var cobrado=esFinde()?(Number(rest.markup_pct)||0):0;
            var d=Math.round((REGULAR_PCT-cobrado)/(100+REGULAR_PCT)*100);
            return d>0?d:0;
        }
        function getRestById(restId){
            var found=null;
            (sessionData.resultados||[]).forEach(function(r){if(r.id===restId) found=r});

        // ¿El restaurante tiene "menú del día" hoy? (registro en almuerzos_hoy).
        function tieneMenuDelDia(r){

        }
        // Exento de tarifa de servicio: tiene menú del día Y es horario de almuerzo (12-15h).
        // Fuera de ese horario es un restaurante normal y paga servicio como cualquier silencioso.
        function exentoServicioAlmuerzo(r){
            return tieneMenuDelDia(r) && isAlmuerzoHour();

        // V2: Cargar TODOS los restaurantes activos + (si hay token) la session para tracking/prefill
        function loadSession(){
            var restsReq=fetch(SB_URL+'/rest/v1/restaurantes?select=*&activo=eq.true&order=nombre.asc',{headers:supaHeaders()})
                .then(function(r){return r.json()});

                : Promise.resolve([]);
            Promise.all([restsReq,almReq,sessReq]).then(function(arr){
                var raw=arr[0]||[];

                // Diagnóstico: tipo_acuerdo en consola para verificar API
                try{

                    sessionData.resultados.forEach(function(r){
                        var k=r.tipo_acuerdo;
                        if(k==='aliado'||k==='cliente_paga'||k==='silencioso') counts[k]++;

                    console.log('%c[DEWAN tipo_acuerdo]','color:#E8431A;font-weight:bold',counts);
                    var aliados=sessionData.resultados.filter(function(r){return r.tipo_acuerdo==='aliado'}).map(function(r){return r.nombre});
                    console.log('%c[Aliados ('+aliados.length+')]','color:#FFD700;font-weight:bold',aliados);
                }catch(e){console.warn('Diagnóstico tipo_acuerdo falló:',e)}
                restoreCart();

                // === Deep-link de PAUTA (Meta): ?r=<slug> abre ese local con sus fotos ===
                // Prioridad sobre el deep-link de WhatsApp. Evita aterrizar en la home sin fotos.
                if(AD_REST){
                    var _adSlug=function(s){return removeAccents(String(s||'').toLowerCase()).replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');};
                    var _adTarget=_adSlug(AD_REST);
                    var _adMatch=(sessionData.resultados||[]).find(function(x){return _adSlug(x.nombre)===_adTarget;});
                    if(_adMatch){
                        try{console.log('%cDeep link PAUTA → '+_adMatch.nombre,'color:#1F9D55;font-weight:bold')}catch(e){}
                        openRest(_adMatch.nombre);
                        return;
                    }
                    try{console.warn('Deep link PAUTA: sin match para ?r='+AD_REST)}catch(e){}
                }

                // V4.4: Deep link inteligente desde WhatsApp
                // Tres caminos según la palabra que envía el bot:
                //   1) Palabra GENERICA de categoría ("almuerzos", "pollo", "pizza"...) → activar
                //      la categoría completa con toggleCategoryV2 (ej. 36 restaurantes de almuerzo,
                //      127 de pollo). Solo matchea con `core` (no con keywords accesorias).
                //   2) Palabra ESPECIFICA ("encebollado", "ceviche", "alitas", "chaulafan",
                //      "hot dogs"...) → ejecutar búsqueda automática con showSearch(palabra)
                //      → muestra solo restaurantes que TIENEN ese plato específico.
                //   3) Sin palabra → home normal.
                var deepLinkCat=null;
                var rawBusq=sessionData.busqueda_texto?removeAccents(sessionData.busqueda_texto.toLowerCase().trim()):'';
                if(rawBusq){
                    for(var ck in CAT_MAP_V2){

                        var coreKws=CAT_MAP_V2[ck].core||CAT_MAP_V2[ck].kw;
                        for(var i=0;i<coreKws.length;i++){
                            // Match exacto de palabra (no substring) — evita que "alitas" matchee con "polleria"
                            var coreNorm=removeAccents(coreKws[i].toLowerCase());
                            if(rawBusq===coreNorm||rawBusq===coreNorm+'s'){deepLinkCat=ck;break}
                        }
                        if(deepLinkCat)break;
                    }
                }
                if(deepLinkCat){
                    sessionData.busqueda_texto='';
                    try{console.log('%cDeep link → categoría '+deepLinkCat,'color:#E8431A')}catch(e){}
                    toggleCategoryV2(deepLinkCat);
                } else if(rawBusq){
                    try{console.log('%cDeep link → búsqueda automática "'+sessionData.busqueda_texto+'"','color:#FF6B35')}catch(e){}
                    var qToSearch=sessionData.busqueda_texto;
                    sessionData.busqueda_texto='';
                    showSearch(qToSearch);
                } else {
                    renderHome();
                }
            }).catch(function(err){
                console.error(err);
                showError('Error de conexion','No pudimos cargar los datos. Revisa tu internet.');
            });
        }

        // V2: Cargar platos de un restaurante (on-demand, cacheado en memoria)

        // ── Home food rail: platos con FOTO de aliados (cross-restaurant) ──
        // Muestra COMIDA real apenas entra el cliente (no solo logos). window._destHome:
        // undefined=no cargado · []=cargó vacío/falló · [..]=platos. Se inyecta por id sin re-render global.
        function loadDestacadosHome(){
            if(window._destHome!==undefined||window._destHomeLoading) return;
            if(!(sessionData&&sessionData.resultados&&sessionData.resultados.length)) return; // catálogo aún no listo
            window._destHomeLoading=true;
            var url=SB_URL+'/rest/v1/menu_items?select=id,nombre_item,precio,categoria_menu,descripcion,foto_url,cargo_envase,restaurante_id&disponible=eq.true&foto_url=not.is.null&limit=1000';
            fetch(url,{headers:supaHeaders()})
                .then(function(r){return r.json()})
                .then(function(items){
                    var out=[];
                    (items||[]).forEach(function(it){
                        if(!it.foto_url||!String(it.foto_url).trim()) return;
                        if(esAdicional(it.categoria_menu,it.nombre_item)) return; // adicionales/porciones/proteínas sueltas tampoco
                        var rest=getRestById(it.restaurante_id);
                        if(!rest) return;                              // rest no está en la sesión
                        if(rest.tipo_acuerdo!=='aliado'&&rest.tipo_acuerdo!=='cliente_paga') return; // aliados + cliente_paga (excluye silenciosos como Rodri Pollos)
                        // Bebidas NO van en el carril de comida... EXCEPTO en locales de bebidas (frappería/cafetería/
                        // juguería) donde el frappé/jugo ES el producto estrella, ej. Buuba Té (sus fotos son frapps).
                        if(esBebida(it.categoria_menu)&&!esLocalBebidas(rest)) return;
                        var _abierto=isRestOpen(rest.horario); // true / false / null(sin horario). Los CERRADOS sí se muestran (grisados), para variedad de noche.
                        var alm=parseAlmuerzo(it.descripcion);
                        var win=alm?null:parseWings(it.descripcion);
                        if(win&&win.dia!=null&&new Date().getDay()!==win.dia) return; // promo de otro día: ocultar
                        var especial=!!(alm||win);
                        var cat=it.categoria_menu||'General';
                        // Configurables (almuerzo/wings): el precio REAL vive en el JSON, no en la columna.
                        var base=especial
                            ? (Number(alm?alm.precio:(win.porUnidad?win.precioUnidad:win.precio))||Number(it.precio)||0)
                            : (Number(it.precio)||0);
                        if(base<=0) return;
                        out.push({
                            rest:rest.nombre,
                            nombre:it.nombre_item,
                            precio:(win&&win._promo)?base:applyTierPricing(base,rest,cat), // promo: precio del flyer es FINAL (sin recargo de finde)
                            precio_regular:especial?null:precioRegular(base,rest,cat),
                            precio_base:base,
                            delivery:Number(rest.precio_delivery)||0,
                            foto_url:it.foto_url,
                            cargo_envase:Number(it.cargo_envase)||0,
                            especial:especial,
                            porUnidad:!!(win&&win.porUnidad),
                            abierto:_abierto,
                            apertura:(_abierto===false?proximaApertura(rest.horario):null),
                            logo:(rest.logo_url||rest.imagen_url||rest.foto_url||null)
                        });
                    });
                    // Cada local aporta una MUESTRA ALEATORIA de sus platos con foto (máx 3), sin repetir
                    // plato/foto. Tanto el orden de locales como QUÉ platos salen se MEZCLAN en CADA carga →
                    // el carril rota en cada apertura (los locales fotografían sus mejores platos = estrella).
                    function _rand(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
                    var seen={},seenFoto={},groups={},order=[];
                    out.forEach(function(p){
                        var k=p.rest+'|'+p.nombre;
                        if(seen[k]||seenFoto[p.foto_url]) return;       // no repetir plato ni foto
                        seen[k]=1;seenFoto[p.foto_url]=1;
                        if(!groups[p.rest]){groups[p.rest]=[];order.push(p.rest);}
                        groups[p.rest].push(p);
                    });
                    Object.keys(groups).forEach(function(r){
                        groups[r]=_rand(groups[r]).slice(0,3);   // muestra ALEATORIA de hasta 3 por local (rota en cada carga)
                    });
                    var localOrder=_rand(order);            // qué local abre el carril cambia en cada carga
                    var g={};localOrder.forEach(function(r){g[r]=groups[r].slice();});
                    var pick=[],added=true;
                    while(added){ added=false; localOrder.forEach(function(r){ if(g[r].length){pick.push(g[r].shift());added=true;} }); }
                    // ABIERTOS primero SIEMPRE; los CERRADOS van estrictamente al FINAL (relleno, nunca encabezan).
                    // Ej.: Papazota (abre 3pm) al mediodía nunca lidera el carril; aparece al final solo si queda lugar.
                    var _ab=pick.filter(function(p){return p.abierto!==false});
                    var _ce=pick.filter(function(p){return p.abierto===false});
                    window._destHome=_ab.concat(_ce).slice(0,16);
                    window._destHomeLoading=false;
                    try{var el=document.getElementById('home-food-rail');if(el)el.innerHTML=homeFoodRailInner();}catch(e){}
                })
                .catch(function(){window._destHomeLoading=false;window._destHome=[];try{var el=document.getElementById('home-food-rail');if(el)el.innerHTML='';}catch(e){}}); // []=colapsa, no reintenta ni deja skeleton
        }
        function homeFoodRailInner(){
            var _hr=new Date(new Date().toLocaleString('en-US',{timeZone:'America/Guayaquil'})).getHours();
            var _sub=_hr<11?'🥐 Para el desayuno':(_hr<15?'🍽 Para el almuerzo':(_hr<19?'😋 Antojo de la tarde':'🌙 Para la cena'));

                return sk+'</div>';

            if(!window._destHome.length) return '';
            // Carril MEZCLADO (un solo scroll): variedad en un swipe. Cada tarjeta = foto del plato + logo del local.
            if(window._destHome.every(function(p){return p.abierto===false})) _sub='🌙 Abren temprano · agenda tu antojo';
            var h='<div class="destacados-head"><span class="destacados-title">🔥 Para ti</span><span class="destacados-sub">'+_sub+'</span></div><div class="destacados-scroll">';

                    '<span class="dest-price">'+(p.porUnidad?'$'+Number(p.precio).toFixed(2)+'/u':'$'+Number(p.precio).toFixed(2))+'</span>'+
                    (cerrado?'<span class="dest-plus" aria-label="Ver carta">›</span>':(qty?'<span class="dest-qty-mini">×'+qty+'</span>':(p.especial?'<span class="dest-plus" aria-label="Ver">›</span>':'<span class="dest-plus" aria-label="Agregar">+</span>')))+

        function renderHomeFoodRail(){
            if(window._destHome===undefined) loadDestacadosHome();
            return '<section class="destacados" id="home-food-rail">'+homeFoodRailInner()+'</section>';
        }
        // ── Carril de fotos por CONTEXTO (categoría / búsqueda) ──
        // Mismas tarjetas que "Para ti", pero alimentado por los platos que matchean la categoría
        // o la búsqueda. Solo aliados/cliente_paga CON foto. Reusa _railCard con ctx='ctx' →
        // zoomFoto lee window._railCtxItems. plateToRailItem comparte filtros/precio con el rail de la home.
        function _railShuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
        function plateToRailItem(it){
            if(!it||!it.foto_url||!String(it.foto_url).trim()) return null;
            if(esAdicional(it.categoria_menu,it.nombre_item)) return null;          // adicionales/porciones fuera
            var rest=getRestById(it.restaurante_id);
            if(!rest) return null;                                                   // no está en la sesión
            if(rest.tipo_acuerdo!=='aliado'&&rest.tipo_acuerdo!=='cliente_paga') return null; // solo socios
            if(esBebida(it.categoria_menu)&&!esLocalBebidas(rest)) return null;      // bebidas solo en locales de bebidas
            var alm=parseAlmuerzo(it.descripcion);
            var win=alm?null:parseWings(it.descripcion);
            if(win&&win.dia!=null&&new Date().getDay()!==win.dia) return null;       // promo de otro día
            var especial=!!(alm||win);
            var cat=it.categoria_menu||'General';
            var base=especial
                ? (Number(alm?alm.precio:(win.porUnidad?win.precioUnidad:win.precio))||Number(it.precio)||0)
                : (Number(it.precio)||0);
            if(base<=0) return null;
            var _abierto=isRestOpen(rest.horario);
            return {
                rest:rest.nombre, nombre:it.nombre_item,
                precio:(win&&win._promo)?base:applyTierPricing(base,rest,cat),
                precio_regular:especial?null:precioRegular(base,rest,cat),
                precio_base:base, delivery:Number(rest.precio_delivery)||0,
                foto_url:it.foto_url, cargo_envase:Number(it.cargo_envase)||0,
                especial:especial, porUnidad:!!(win&&win.porUnidad),
                abierto:_abierto, apertura:(_abierto===false?proximaApertura(rest.horario):null),
                logo:(rest.logo_url||rest.imagen_url||rest.foto_url||null)
            };
        }
        function buildPhotoRail(plates,limit){
            var seen={},seenF={},groups={},order=[];
            (plates||[]).forEach(function(it){
                var p=plateToRailItem(it); if(!p) return;
                var k=p.rest+'|'+p.nombre;
                if(seen[k]||seenF[p.foto_url]) return;       // no repetir plato ni foto
                seen[k]=1; seenF[p.foto_url]=1;
                if(!groups[p.rest]){groups[p.rest]=[];order.push(p.rest);}
                groups[p.rest].push(p);
            });
            // máx 3 por local (muestra aleatoria) + round-robin con locales mezclados → variedad entre aliados
            // (evita que un local con muchas fotos, ej. una cevichería, inunde el carril).
            Object.keys(groups).forEach(function(r){groups[r]=_railShuffle(groups[r]).slice(0,3);});
            var localOrder=_railShuffle(order);
            var g={}; localOrder.forEach(function(r){g[r]=groups[r].slice();});
            var pick=[],added=true;
            while(added){ added=false; localOrder.forEach(function(r){ if(g[r].length){pick.push(g[r].shift());added=true;} }); }
            var ab=pick.filter(function(p){return p.abierto!==false}); // abiertos primero
            var ce=pick.filter(function(p){return p.abierto===false}); // cerrados al final
            return ab.concat(ce).slice(0,limit||12);
        }
        function renderCtxPhotoRail(items,titulo,sub){

        // ── Haversine para calcular distancias client-side ──
        // Rotación diaria determinística (mismo orden todo el día, cambia cada día)
        function dailyShuffle(arr){
            if(!arr||arr.length<2) return arr;
            var d=new Date();
            var seed=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
            var a=arr.slice();
            for(var i=a.length-1;i>0;i--){
                seed=(seed*9301+49297)%233280;
                var j=Math.floor((seed/233280)*(i+1));
                var tmp=a[i];a[i]=a[j];a[j]=tmp;
            }
            return a;
        }
        function haversine(lat1,lng1,lat2,lng2){
            var R=6371;var dLat=(lat2-lat1)*Math.PI/180;var dLng=(lng2-lng1)*Math.PI/180;
            var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
            return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
        }

        // ── Recalcular distancias con GPS del cliente ──
        function recalcDistances(rests){
            if(!window._clientGPS) return rests;
            var TARIFA_BASE=2.00,KM_INCLUIDOS=3,PRECIO_POR_KM=0.50,FACTOR_RUTA=1.3;
            // V2.7 FIX: mutar el objeto original en vez de copiar a mano
            // (antes se perdía r.id y otros campos, rompiendo la carga de menu_items)
            rests.forEach(function(r){
                if(r.restaurante_lat&&r.restaurante_lng){
                    var distLineal=haversine(window._clientGPS.lat,window._clientGPS.lng,parseFloat(r.restaurante_lat),parseFloat(r.restaurante_lng));
                    var distRuta=distLineal*FACTOR_RUTA;
                    r.distancia_km=Math.round(distRuta*10)/10;
                    r.tiempo_estimado_min=Math.round(15+distRuta*3);
                    var precio=TARIFA_BASE;
                    if(distRuta>KM_INCLUIDOS) precio=TARIFA_BASE+((distRuta-KM_INCLUIDOS)*PRECIO_POR_KM);
                    r.precio_delivery=Math.round(precio*100)/100;
                    // [8-jul] La cotización REAL (webhook Google, ver cotizarEnvioReal) manda sobre este
                    // estimado. Sin esto, cada llamada (render home, re-sync de sendWA, etc.) PISABA la
                    // cotización real y el mensaje de WhatsApp salía con el estimado (dif ±$0.30 en carreras).
                    var _e=window._envioReal&&window._envioReal[r.nombre];
                    if(_e&&!_e.pending&&Number(_e.precio)>0&&(Date.now()-_e.ts)<10*60*1000&&
                       _e.gpsKey===r.nombre+'|'+Number(window._clientGPS.lat).toFixed(4)+','+Number(window._clientGPS.lng).toFixed(4)){
                        r.precio_delivery=Number(_e.precio);
                        if(_e.km)r.distancia_km=Math.round(Number(_e.km)*10)/10;
                    }
                }
            });
            return rests;
        }

        // ── Helpers para matching singular/plural ──
        function normWord(w){
            w=w.toLowerCase().trim();
            if(w.endsWith('es')&&w.length>4) return w.slice(0,-2);
            if(w.endsWith('s')&&w.length>3) return w.slice(0,-1);
            return w;
        }
        function removeAccents(s){
            return s.replace(/á/g,'a').replace(/é/g,'e').replace(/í/g,'i').replace(/ó/g,'o').replace(/ú/g,'u').replace(/ñ/g,'n').replace(/ü/g,'u');
        }
        // V4.5: Generar variantes razonables de una palabra de búsqueda para cubrir
        // tildes (datos con/sin acento) y plurales (chifa↔chifas). Limitado a ~10 variantes
        // para no inflar la query SQL del OR.
        function generateSearchVariants(q){
            var lower=(q||'').toLowerCase().trim();
            if(!lower)return[];
            var set={};
            set[lower]=true;
            // Sin tildes
            var noAcc=removeAccents(lower);
            set[noAcc]=true;
            // Plurales: si termina en 's', sin 's'; si no, +'s'
            function addPlural(w){
                if(w.length<3)return;
                if(w.charAt(w.length-1)==='s') set[w.slice(0,-1)]=true;
                else set[w+'s']=true;
            }
            addPlural(lower); addPlural(noAcc);
            // Si la palabra original no tiene tildes, generar variantes con tilde en cada vocal
            // (cubre el caso "chaulafan" → "chaulafán" cuando los datos tienen tilde).
            // Solo para palabras de hasta 14 chars para mantener la query SQL en tamaño razonable.
            if(lower===noAcc&&lower.length<=14){
                var vmap={a:'á',e:'é',i:'í',o:'ó',u:'ú'};
                for(var i=0;i<noAcc.length;i++){
                    var c=noAcc.charAt(i);
                    if(vmap[c]){
                        var variant=noAcc.slice(0,i)+vmap[c]+noAcc.slice(i+1);
                        set[variant]=true;
                        // y su plural
                        if(variant.charAt(variant.length-1)==='s') set[variant.slice(0,-1)]=true;
                        else set[variant+'s']=true;
                    }
                }
            }
            // Devolver hasta 12 variantes (suficiente para la mayoría)
            return Object.keys(set).slice(0,12);
        }

        // ── Sinónimos de comida (Riobamba/Ecuador) ──
        // Cada grupo es un set de términos equivalentes. Si la búsqueda toca uno,
        // expandimos a TODO el grupo para encontrar platos reales aunque no contengan
        // la palabra exacta (ej. "chifa" → chaulafán, tallarín, arroz chaufa, wantán).
        // OJO: solo alimenta la query de PLATOS (menu_items), no la categoría del local,
        // para no reintroducir falsos positivos.
        // Cada grupo: t = DISPARADORES (palabras de CATEGORÍA que sí expanden), all = términos a buscar.
        // Buscar un disparador ("mariscos","chifa") expande a sus platos. Buscar un PLATO específico
        // ("encebollado","ceviche","lomo") NO expande -> se busca solo ese plato (más preciso).
        var FOOD_SYNONYMS=[
            {t:['chifa','chifas','comida china'], all:['chifa','chaulafan','tallarin','arroz chaufa','chaufa','wantan','comida china','lumpia']},
            {t:['pollo','pollos','polleria','broaster'], all:['pollo','broaster','brosterizado','presa de pollo']},
            {t:['alitas','wings'], all:['alitas','wings','alitas bbq']},

            {t:['mariscos','marisco','marisqueria'], all:['mariscos','ceviche','cebiche','encebollado','camaron','corviche','pescado frito']},
            {t:['parrilla','parrillada','parrilladas','asadero'], all:['parrilla','asado','churrasco','carne asada','a la brasa','lomo']},
            {t:['sushi','japonesa','japones'], all:['sushi','maki','makis','nigiri','sushi rolls']},
            {t:['mexicana','mexicano','comida mexicana'], all:['mexicana','taco','tacos','burrito','quesadilla','nachos']},
            {t:['almuerzo','almuerzos','menu del dia'], all:['almuerzo','menu del dia','menu ejecutivo','seco','sopa del dia']},
            {t:['salchipapa','salchipapas'], all:['salchipapa','salchipapas','papas fritas']},
            {t:['jugo','jugos','batido','batidos'], all:['jugo','batido','frappe','milkshake','malteada','smoothie']},
            {t:['postre','postres','heladeria'], all:['postre','helado','torta','pastel','cheesecake','brownie']},
            {t:['hot dog','hotdog','perro caliente'], all:['hot dog','hotdog','perro caliente','choripan']},
            {t:['shawarma','shawerma'], all:['shawarma','shawerma','doner','kebab']},

        ];
        // Expande SOLO si la búsqueda toca un DISPARADOR de categoría (no un plato específico).
        function expandSynonyms(q){
            var qn=removeAccents((q||'').toLowerCase()).trim();
            if(qn.length<3) return [];
            var extra={};
            FOOD_SYNONYMS.forEach(function(g){
                var hit=g.t.some(function(term){
                    var tn=removeAccents(term.toLowerCase());
                    return qn===tn||qn.indexOf(tn)!==-1||(qn.length>=4&&tn.indexOf(qn)!==-1);
                });
                if(hit) g.all.forEach(function(term){extra[removeAccents(term.toLowerCase())]=true});
            });
            return Object.keys(extra);
        }
        function simplify(s){
            s=s.toLowerCase().replace(/[^a-záéíóúñü]/g,'');
            var r='';for(var i=0;i<s.length;i++){if(i===0||s[i]!==s[i-1])r+=s[i]}return r;
        }
        function fuzzyMatchStrict(text,query){
            var t=text.toLowerCase(),q=query.toLowerCase();
            if(t.indexOf(q)!==-1) return true;
            var ta=removeAccents(t),qa=removeAccents(q);
            if(ta.indexOf(qa)!==-1) return true;
            var tn=normWord(ta),qn=normWord(qa);
            if(tn.indexOf(qn)!==-1||qn.indexOf(tn)!==-1) return true;
            var words=q.split(' ').filter(function(w){return w.length>2});
            if(words.length===1){
                var wn=removeAccents(normWord(words[0]));
                return ta.indexOf(wn)!==-1||tn.indexOf(wn)!==-1;
            }
            if(words.length>1){
                return words.every(function(w){
                    var wn=removeAccents(normWord(w)),wa=removeAccents(w);
                    return ta.indexOf(wa)!==-1||ta.indexOf(wn)!==-1;
                });
            }
            return false;
        }
        function fuzzyMatchRest(nombre,query){
            var rn=nombre.toLowerCase(),q=query.toLowerCase();
            if(rn.indexOf(q)!==-1||q.indexOf(rn)!==-1) return true;
            var rna=removeAccents(rn),qa=removeAccents(q);
            if(rna.indexOf(qa)!==-1||qa.indexOf(rna)!==-1) return true;
            var sr=simplify(nombre),sb=simplify(query);
            if(sr.indexOf(sb)!==-1||sb.indexOf(sr)!==-1) return true;
            var limpia=q.replace(/\b(pizzeria|pizzería|restaurante|el|la|los|las|de|del|menu|menú)\b/g,'').replace(/\s+/g,' ').trim();
            if(limpia.length>2&&limpia!==q){
                var la=removeAccents(limpia);
                if(rna.indexOf(la)!==-1||la.indexOf(rna)!==-1) return true;
            }
            var words=q.split(' ').filter(function(w){return w.length>2&&!(/^(el|la|los|las|de|del|menu|menú)$/.test(w))});
            if(words.length>=2){
                return words.every(function(w){
                    var wa=removeAccents(w),wn=removeAccents(normWord(w));
                    return rna.indexOf(wa)!==-1||rna.indexOf(wn)!==-1||sr.indexOf(simplify(w))!==-1;
                });
            }
            return false;
        }

        function sortRests(list,key){

            // (Antes el home interleaveaba los cerrados -ej. Papazota, abre 3pm- entre los abiertos por precio.)
            function ab(r){var o=isRestOpen(r.horario);return o===true?0:o===null?1:2;}
            var cmp;
            if(key==='distancia') cmp=function(a,b){return(a.distancia_km||999)-(b.distancia_km||999)};
            else if(key==='delivery') cmp=function(a,b){return(a.precio_delivery||999)-(b.precio_delivery||999)};
            else cmp=function(a,b){var pa=a.productos&&a.productos[0]?a.productos[0].precio:999;var pb=b.productos&&b.productos[0]?b.productos[0].precio:999;return pa-pb};
            s.sort(function(a,b){var d=ab(a)-ab(b);return d!==0?d:cmp(a,b);});
            return s;
        }

        function obtenerUuidCliente(){

        // V2.3: fetch paginado para superar el límite de 1000 filas de PostgREST
        function fetchAllMatchingPlates(orsParam,selectCols){
            var sel=selectCols||'id,restaurante_id,restaurante_nombre,nombre_item,categoria_menu,descripcion,precio,foto_url,cargo_envase';
            var acc=[];
            function page(offset){
                var url=SB_URL+'/rest/v1/menu_items?select='+sel+'&disponible=eq.true&or=('+orsParam+')&order=restaurante_id&limit=1000&offset='+offset;
                return fetch(url,{headers:supaHeaders()}).then(function(r){return r.json()}).then(function(items){
                    items=Array.isArray(items)?items:[];
                    acc=acc.concat(items);
                    if(items.length===1000&&offset<4000) return page(offset+1000);

                });

            if(window._activeCat===key){

            window._activeCat=key;
            try{window.scrollTo({top:0,behavior:'smooth'})}catch(e){}
            if(window._catRestsCache[key]){
                renderHome();
                return;
            }
            var cm=CAT_MAP_V2[key];
            // UNIFICADO (2026-05-27): TODAS las categorías usan kw-match en menu_items
            // — igual que la búsqueda. El restaurante aparece SOLO si vende algún plato
            // que matchee las keywords de la categoría. Aliados van al top.
            window._catLoading=true;
            renderHome();
            // PRECISIÓN: las categorías matchean por NOMBRE y CATEGORÍA del plato, NO por la
            // descripción (que lista ingredientes y arrastra locales equivocados, ej. un marisquería
            // con "alitas BBQ" en la descripción caía en Pollo). La búsqueda libre (doSearch) SÍ
            // mantiene la descripción, donde el recall importa más.
            var ors;
            if(key==='promohoy'){
                // Promos válidas HOY: con "dia" de hoy (getDay 0-6) O permanentes (PROMO_OPTS sin "dia").
                ors='descripcion.ilike.'+encodeURIComponent('%"dia":'+new Date().getDay()+'%')+
                    ',and(descripcion.ilike.'+encodeURIComponent('%PROMO_OPTS%')+',descripcion.not.ilike.'+encodeURIComponent('%"dia":%')+')';
            } else {
                ors=cm.kw.map(function(k){
                    var kEnc=encodeURIComponent('%'+k+'%');
                    return 'nombre_item.ilike.'+kEnc+',categoria_menu.ilike.'+kEnc;
                }).join(',');
            }
            fetchAllMatchingPlates(ors)
                .then(function(plates){
                    var rests=aggregatePlatesByRest(plates);

                        var already={};
                        rests.forEach(function(r){if(r.id) already[r.id]=true});
                        Object.keys(window._almuerzosHoy).forEach(function(rid){
                            if(already[rid]) return;
                            var rFull=(sessionData.resultados||[]).find(function(x){return x.id===rid});
                            if(rFull){
                                var enriched=Object.assign({},rFull,{_matchCount:1,_matchItems:[]});
                                rests.push(enriched);
                            }
                        });
                        rests.forEach(function(r){
                            if(window._almuerzosHoy[r.id]) r._hasAlmuerzoHoy=true;
                        });
                    }
                    // Desayunos: además de los que matchean por keyword, sumar las CAFETERÍAS
                    // (categoria_canonica "Cafetería / Desayunos", ej. Buuba Té) — sirven desayuno.
                    if(key==='desayunos'){
                        var yaDes={};
                        rests.forEach(function(r){if(r.id) yaDes[r.id]=true});
                        (sessionData.resultados||[]).forEach(function(rFull){
                            if(!rFull.id||yaDes[rFull.id]) return;
                            if((rFull.categoria_canonica||'').toLowerCase().indexOf('cafeter')===-1) return;
                            rests.push(Object.assign({},rFull,{_matchCount:1,_matchItems:[]}));
                        });
                    }
                    rankRestsByKeywords(rests,cm.kw);
                    // Boost aliados al top: primero aliado, luego cliente_paga, luego silencioso
                    rests.sort(function(a,b){
                        var sa=isRestOpen(a.horario),sb=isRestOpen(b.horario);
                        var va=sa===true?0:sa===null?1:2;
                        var vb=sb===true?0:sb===null?1:2;
                        if(va!==vb) return va-vb;
                        var ta={aliado:0,cliente_paga:1,silencioso:2}[a.tipo_acuerdo]||2;
                        var tb={aliado:0,cliente_paga:1,silencioso:2}[b.tipo_acuerdo]||2;
                        if(ta!==tb) return ta-tb;
                        if((a._score||0)!==(b._score||0)) return (b._score||0)-(a._score||0);
                        return (a.distancia_km||999)-(b.distancia_km||999);
                    });
                    window._catRestsCache[key]=rests;
                    window._catPlatesCache[key]=buildPhotoRail(plates,12); // carril de fotos de aliados arriba
                    window._catLoading=false;
                    if(window._activeCat===key) renderHome();
                }).catch(function(){
                    window._catRestsCache[key]=[];
                    window._catPlatesCache[key]=[];
                    window._catLoading=false;
                    if(window._activeCat===key) renderHome();
                });
        };

            var el=document.getElementById('cat-'+slug);
            if(!el)return;
            var tabsWrap=document.querySelector('.cat-tabs-wrap');

            var y=el.getBoundingClientRect().top+window.pageYOffset-offset-8;

        function setupCatScrollSpy(){
            var labels=document.querySelectorAll('[data-cat-slug]');
            var tabs=document.querySelectorAll('.cat-tab');
            if(window._catSpyHandler){window.removeEventListener('scroll',window._catSpyHandler);window._catSpyHandler=null}
            if(!labels.length||!tabs.length)return;
            window._catSpyHandler=function(){
                if(!labels[0]||!labels[0].isConnected){
                    window.removeEventListener('scroll',window._catSpyHandler);
                    window._catSpyHandler=null;
                    return;
                }
                var tabsWrap=document.querySelector('.cat-tabs-wrap');
                var offset=(tabsWrap?tabsWrap.offsetHeight:0)+20;
                var activeSlug=labels[0].getAttribute('data-cat-slug');
                for(var i=0;i<labels.length;i++){
                    if(labels[i].getBoundingClientRect().top<=offset) activeSlug=labels[i].getAttribute('data-cat-slug');
                }
                tabs.forEach(function(t){
                    var isActive=t.getAttribute('data-cat-target')===activeSlug;
                    t.classList.toggle('active',isActive);
                    if(isActive){
                        var tabsBar=document.getElementById('cat-tabs');
                        if(tabsBar){
                            var tabLeft=t.offsetLeft;
                            var tabRight=tabLeft+t.offsetWidth;
                            var barScroll=tabsBar.scrollLeft;
                            var barW=tabsBar.offsetWidth;
                            if(tabLeft<barScroll+8||tabRight>barScroll+barW-8){
                                tabsBar.scrollTo({left:Math.max(0,tabLeft-20),behavior:'smooth'});
                            }
                        }
                    }
                });
            };
            window.addEventListener('scroll',window._catSpyHandler,{passive:true});
            window._catSpyHandler();
        }

        var _searchTimer=null;

        function handleSearchInput(e){

        // V2.1: Agrupa platos por restaurante_id, devuelve array {rest, count, items}
        function aggregatePlatesByRest(plates){
            var byRest={};
            plates.forEach(function(p){
                var key=p.restaurante_id||p.restaurante_nombre;
                if(!key) return;
                if(!byRest[key]) byRest[key]={id:p.restaurante_id,nombre:p.restaurante_nombre,count:0,items:[]};
                byRest[key].count++;
                byRest[key].items.push(p);
            });
            // Mapear a objetos restaurante reales (con horario, distancia, etc.)
            var arr=[];
            Object.keys(byRest).forEach(function(k){
                var rb=byRest[k];
                var r=(sessionData.resultados||[]).find(function(x){return x.id===rb.id||x.nombre===rb.nombre});
                if(r){
                    var enriched=Object.assign({},r,{_matchCount:rb.count,_matchItems:rb.items});
                    arr.push(enriched);
                }
            });
            return arr;
        }

        function sortRestsByMatch(rests){
            rests.sort(function(a,b){
                var sa=isRestOpen(a.horario),sb=isRestOpen(b.horario);
                var va=sa===true?0:sa===null?1:2;
                var vb=sb===true?0:sb===null?1:2;
                if(va!==vb) return va-vb;
                if((a._matchCount||0)!==(b._matchCount||0)) return (b._matchCount||0)-(a._matchCount||0);
                return (a.distancia_km||999)-(b.distancia_km||999);
            });
            return rests;
        }

        // V2.2: Score de relevancia por keywords (nombre > categoría > platos)
        // Devuelve un score para rankear, y flagea al restaurante como especialista o no.
        function scoreRestRelevance(r,keywords){
            var n=removeAccents((r.nombre||'').toLowerCase());
            var c=removeAccents((r.categoria||'').toLowerCase());
            var t=removeAccents((r.tipo_restaurante||'').toLowerCase());
            var nameMatch=false,catMatch=false;
            for(var i=0;i<keywords.length;i++){
                var k=removeAccents((keywords[i]||'').toLowerCase()).trim();
                if(!k||k.length<2) continue;
                if(n.indexOf(k)!==-1) nameMatch=true;
                if(c.indexOf(k)!==-1||t.indexOf(k)!==-1) catMatch=true;
            }
            var score=0;
            if(nameMatch) score+=10000;
            if(catMatch) score+=3000;
            score+=(r._matchCount||0)*20;
            r._score=score;
            r._specialist=score>=3000;
            r._nameMatch=nameMatch;
            r._catMatch=catMatch;
            return score;
        }

        function rankRestsByKeywords(rests,keywords){
            rests.forEach(function(r){scoreRestRelevance(r,keywords)});
            rests.sort(function(a,b){
                var sa=isRestOpen(a.horario),sb=isRestOpen(b.horario);
                var va=sa===true?0:sa===null?1:2;
                var vb=sb===true?0:sb===null?1:2;
                if(va!==vb) return va-vb;
                if(a._score!==b._score) return b._score-a._score;
                return (a.distancia_km||999)-(b.distancia_km||999);
            });
            return rests;
        }

        function partitionRests(rests){
            var specs=[],others=[];
            rests.forEach(function(r){
                if(r._specialist) specs.push(r); else others.push(r);
            });
            return {specs:specs,others:others};
        }

        // Separa por tipo comercial: socios (aliado + cliente_paga) van arriba.
        // Silenciosos se ocultan detrás de "Ver otros restaurantes".
        function partitionBySocio(rests){
            var socios=[],silenciosos=[];
            // FALLBACK: si la API no devuelve tipo_acuerdo (PostgREST schema cache,
            // columna no propagada) → tratar todos como socios para no romper la app.
            var anyHasField=rests.some(function(r){return typeof r.tipo_acuerdo==='string'});
            if(!anyHasField){
                return {socios:rests.slice(),silenciosos:[]};
            }
            rests.forEach(function(r){
                var t=r.tipo_acuerdo;
                if(t==='aliado'||t==='cliente_paga') socios.push(r);
                else silenciosos.push(r);
            });
            return {socios:socios,silenciosos:silenciosos};

        // V4.7: Contador de secuencia para búsquedas — evita race conditions en mobile
        // donde queries lentas pueden volver desordenadas y sobrescribir resultados nuevos
        // con resultados viejos (ej: query "p" llega después de query "po" y muestra basura).
        window._searchSeq=0;

        function doSearch(query){
            var q=(query||'').trim();
            if(!q){renderSearchIdle();return}
            window._showSilenciosos=false; // reset al iniciar nueva búsqueda
            var mySeq=++window._searchSeq;
            renderSearchSkeletons();

            // 1) Match directo SOLO por NOMBRE del restaurante (señal fuerte e inequívoca, ej. "Chifa X").
            //    NO matcheamos por la categoría/tipo del restaurante: esa etiqueta (puesta a mano)
            //    era la fuente de falsos positivos (locales tagueados con algo que en realidad no venden).
            //    Lo que decide si un local aparece es lo que REALMENTE vende → sus platos (restsByPlates).
            var qNorm=removeAccents(q.toLowerCase());
            var directRests=(sessionData.resultados||[]).filter(function(r){
                var n=removeAccents((r.nombre||'').toLowerCase());
                return n.indexOf(qNorm)!==-1;
            });

            // 2) V4.5: Generar variantes de la query para cubrir tildes y plurales
            //    "chaulafan" → ["chaulafan","chaulafans","cháulafan","chaúlafan","chaulafán",...]
            //    "chifas" → ["chifas","chifa"]
            //    "café" → ["café","cafe","cafés","cafes"]
            var variants=generateSearchVariants(q);
            // V5: expandir con sinónimos de comida para encontrar platos reales aunque
            // no contengan la palabra exacta (ej. "chifa" → chaulafán/tallarín/...).
            expandSynonyms(q).forEach(function(t){if(variants.indexOf(t)===-1)variants.push(t)});
            variants=variants.slice(0,30); // cap para mantener la URL del OR en tamaño razonable
            // Construir OR con cada variante × 3 columnas (nombre_item, descripcion, categoria_menu)
            var orParts=[];
            variants.forEach(function(v){
                var enc=encodeURIComponent('%'+v+'%');
                orParts.push('nombre_item.ilike.'+enc);
                orParts.push('descripcion.ilike.'+enc);
                orParts.push('categoria_menu.ilike.'+enc);
            });
            var ors=orParts.join(',');
            fetchAllMatchingPlates(ors)
                .then(function(plates){
                    // V4.7: descartar si ya hay una búsqueda más reciente (resultado obsoleto)
                    if(mySeq!==window._searchSeq) return;
                    var restsByPlates=aggregatePlatesByRest(plates);

                    // 3) Combinar: dedup y rankear por score de relevancia
                    var seen={};
                    var combined=[];
                    directRests.forEach(function(r){if(!seen[r.id||r.nombre]){seen[r.id||r.nombre]=true;combined.push(r)}});
                    restsByPlates.forEach(function(r){if(!seen[r.id||r.nombre]){seen[r.id||r.nombre]=true;combined.push(r)}});
                    rankRestsByKeywords(combined,[q]);

                    saveRecentSearch(q);
                    renderSearchResults(q,combined,plates);
                }).catch(function(){
                    if(mySeq!==window._searchSeq) return;
                    saveRecentSearch(q);
                    renderSearchResults(q,directRests,[]);
                });
        }

        // Listener delegado en CAPTURE phase — corre ANTES del onclick del card padre.
        // Es bulletproof contra el inline onclick que no funciona consistentemente en mobile.
        function _handleServiceFeeTap(e){
            var t=e.target;
            while(t&&t!==document.body){
                if(t.getAttribute&&t.getAttribute('data-service-fee')==='1'){
                    try{console.log('[badge tap]',e.type,'target=',t.className)}catch(_){}
                    e.stopPropagation();
                    if(e.stopImmediatePropagation) e.stopImmediatePropagation();
                    if(e.cancelable) e.preventDefault();
                    var now=Date.now();
                    if(window._lastServiceFeeTap&&now-window._lastServiceFeeTap<500) return false;
                    window._lastServiceFeeTap=now;
                    // setTimeout 0: deferir apertura del modal al siguiente tick.
                    // El click event actual termina ANTES de que el modal exista,
                    // así nada puede cerrarlo accidentalmente.
                    setTimeout(function(){openServiceFeeInfo()},0);
                    return false;
                }
                t=t.parentNode;
            }
        }
        // SOLO click — escuchar mousedown/pointerup hace que el modal se abra
        // antes que click resuelva, y el click cae sobre el overlay del modal

        document.addEventListener('click',_handleServiceFeeTap,true);

        // No se inserta on-demand → cero race conditions con el click event.
        // Se inserta una vez al cargar y solo se muestra/oculta con CSS.
        function ensureServiceFeeModal(){
            if(document.getElementById('service-fee-modal')) return;
            var html='<div id="service-fee-modal" class="sf-modal-overlay" style="display:none">'+
                '<div class="sf-modal-card">'+
                    '<div class="sf-modal-header"><span>ℹ️ Servicio DEWAN</span><button class="sf-modal-close" type="button">×</button></div>'+
                    '<div class="sf-modal-body">'+
                        '<p>Este restaurante aún no es <strong>⭐ Aliado DEWAN</strong>.</p>'+
                        '<p>Agregamos una <strong>tarifa de servicio fija de $0.10</strong> que nos permite mantener la logística, la app y el delivery funcionando para ti.</p>'+
                        '<p>Los restaurantes <strong>⭐ Aliados</strong> no tienen este recargo — pagas exactamente lo mismo que en el local.</p>'+
                        '<button class="sf-modal-ok" type="button">Entendido</button>'+
                    '</div>'+
                '</div>'+
            '</div>';
            document.body.insertAdjacentHTML('beforeend',html);
            var modal=document.getElementById('service-fee-modal');
            if(!modal) return;
            modal.addEventListener('click',function(e){
                if(e.target===modal && Date.now()-window._modalOpenedAt>250) closeServiceFeeInfo();
            });
            var x=modal.querySelector('.sf-modal-close');
            if(x) x.addEventListener('click',function(e){e.stopPropagation();closeServiceFeeInfo()});
            var ok=modal.querySelector('.sf-modal-ok');
            if(ok) ok.addEventListener('click',function(e){e.stopPropagation();closeServiceFeeInfo()});
        }

        if(document.readyState==='loading'){

        // ── CART + CHECKOUT UNIFICADO ──
        // ── Cotización REAL del envío (ruta Google) al abrir el carrito ──
        // El estimado de la lista (haversine×1.3) se queda corto o se pasa según el
        // trazado de calles (caso pedido #484: estimó $2.00, la ruta real valía $2.42).
        // Aquí pedimos el precio oficial al webhook calcular-precio (SIN pedido_id:
        // solo cotiza y responde; no toca ninguna tabla) y corregimos carrito+tarjetas.
        // Si Google/red fallan, el estimado queda como fallback y el pedido sale igual.
        window._envioReal=window._envioReal||{};
        function aplicarEnvioReal(nombre,precio){
            var cambio=false;
            window._cart.forEach(function(c){
                if(c.restaurante===nombre&&Math.abs(parsePrice(c.delivery)-precio)>0.005){c.delivery=precio;cambio=true;}
            });
            var r=getRestByName(nombre);
            if(r&&Math.abs((Number(r.precio_delivery)||0)-precio)>0.005){r.precio_delivery=precio;cambio=true;}
            if(cambio){saveCart();if(currentView==='cart'&&_cartSheetOpen())showCart();else updateCartFloat();}
        }
        function cotizarEnvioReal(){
            if(!window._clientGPS||!window._cart.length)return;
            var rests={};window._cart.forEach(function(c){rests[c.restaurante]=true});
            Object.keys(rests).forEach(function(nombre){
                var r=getRestByName(nombre);
                if(!r||!r.restaurante_lat||!r.restaurante_lng)return;
                var gpsKey=nombre+'|'+Number(window._clientGPS.lat).toFixed(4)+','+Number(window._clientGPS.lng).toFixed(4);
                var cache=window._envioReal[nombre];
                if(cache&&cache.gpsKey===gpsKey&&(Date.now()-cache.ts)<10*60*1000){aplicarEnvioReal(nombre,cache.precio);return;}
                if(cache&&cache.pending&&(Date.now()-cache.ts)<15000)return; // ya hay una consulta en vuelo
                window._envioReal[nombre]={pending:true,ts:Date.now(),gpsKey:gpsKey};
                var ctl=('AbortController'in window)?new AbortController():null;
                if(ctl)setTimeout(function(){ctl.abort()},8000);
                fetch('https://restaurante1-n8n.bqspdc.easypanel.host/webhook/calcular-precio',{
                    method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({origen_lat:r.restaurante_lat,origen_lng:r.restaurante_lng,destino_lat:window._clientGPS.lat,destino_lng:window._clientGPS.lng}),
                    signal:ctl?ctl.signal:undefined
                }).then(function(x){return x.json()}).then(function(j){
                    if(j&&j.ok&&Number(j.precio)>0){
                        window._envioReal[nombre]={precio:Number(j.precio),km:j.distancia_km,ts:Date.now(),gpsKey:gpsKey};
                        aplicarEnvioReal(nombre,Number(j.precio));
                    }else{delete window._envioReal[nombre];}
                }).catch(function(){delete window._envioReal[nombre];});
            });
        }

            var byRest={};

            h+='<div style="padding:16px;padding-bottom:40px">';
            if(OP_MODE) h+='<div style="background:#1d1d1f;color:#E8431A;font-weight:700;padding:9px 14px;border-radius:10px;margin-bottom:14px;font-size:0.88rem">🎧 Modo centralista</div>';

            Object.keys(byRest).forEach(function(rest){
                h+='<div class="cart-rest-label">'+esc(rest)+'</div>';
                byRest[rest].forEach(function(c,ci){
                    var cartIdx=window._cart.indexOf(c);
                    if(c.wingsChoices){
                        var totalConEnvase=(parsePrice(c.precio)+parsePrice(c.cargo_envase));
                        h+='<div class="cart-item" style="flex-wrap:wrap">'+

        // ── CART LOGIC ──
        // V4.2: parser defensivo de precios — soporta "6.50", "6,50", null, undefined → siempre devuelve Number
        function parsePrice(v){
            if(v==null)return 0;
            if(typeof v==='number')return isFinite(v)?v:0;
            var n=parseFloat(String(v).replace(',','.'));
            return isFinite(n)?n:0;
        }

        // V4.2: Particula que vuela del punto (x0,y0) hasta el carrito flotante
        // Da feedback visual de "se agrego" + sensacion de progreso/recompensa.
        function flyFromPoint(x0,y0,emoji){
            try{
                if(x0==null||y0==null)return;
                var cart=document.getElementById('cart-float');
                if(!cart||cart.style.display==='none'){
                    // Cart aun no visible: usar bottom-center como destino aproximado
                    var x1d=window.innerWidth/2,y1d=window.innerHeight-32;
                    return _spawnParticle(x0,y0,x1d,y1d,emoji);
                }
                var ctaEl=cart.querySelector('.cart-float-cta')||cart;
                var dRect=ctaEl.getBoundingClientRect();
                _spawnParticle(x0,y0,dRect.left+dRect.width/2,dRect.top+dRect.height/2,emoji);
            }catch(e){}
        }
        function _spawnParticle(x0,y0,x1,y1,emoji){
            var p=document.createElement('span');
            p.className='fly-particle';
            p.textContent=emoji||'✨';
            p.style.left=(x0-12)+'px';
            p.style.top=(y0-12)+'px';
            p.style.transform='translate(0,0) scale(1)';
            p.style.opacity='1';
            p.style.transition='none';
            document.body.appendChild(p);
            void p.offsetWidth; // reflow para que la transicion arranque
            var dx=x1-x0,dy=y1-y0;
            p.style.transition='transform 620ms cubic-bezier(0.55,0,0.65,1),opacity 620ms ease-in';
            p.style.transform='translate('+dx+'px,'+dy+'px) scale(0.32) rotate(360deg)';
            p.style.opacity='0';
            setTimeout(function(){if(p.parentNode)p.parentNode.removeChild(p)},680);
        }
        // Captura las coordenadas del boton + tocado ANTES del refreshView()
        function captureClickPoint(){
            try{
                var ev=window.event;
                if(ev){
                    var t=ev.changedTouches&&ev.changedTouches[0];
                    if(t)return{x:t.clientX,y:t.clientY};
                    if(ev.clientX!=null)return{x:ev.clientX,y:ev.clientY};
                    var tgt=ev.currentTarget||ev.target;
                    if(tgt&&tgt.getBoundingClientRect){var r=tgt.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2}}
                }
            }catch(e){}
            return null;
        }
        function pickEmojiForFly(nombre){
            try{return getEmojiPlato(nombre)||'✨'}catch(e){return '✨'}
        }

        window.addCart=function(rest,nombre,precio,delivery,fotoUrl,cargoEnvase,precioRegular,precioBase){
            var _rc=getRestByName(rest); if(_rc&&isRestOpen(_rc.horario)===false){ avisarCerrado(_rc); return; } // [19-jun] no agregar de locales cerrados
            var p=parsePrice(precio),d=parsePrice(delivery),e=parsePrice(cargoEnvase);
            var pr=(precioRegular!=null&&precioRegular!==''&&Number(precioRegular)>0)?parsePrice(precioRegular):null;
            var pb=(precioBase!=null&&precioBase!==''&&Number(precioBase)>0)?parsePrice(precioBase):null;
            var pt=captureClickPoint();
            var c=findCart(rest,nombre);
            if(c){c.qty++;c.precio=p;c.delivery=d;if(cargoEnvase!=null)c.cargo_envase=e;if(fotoUrl)c.foto_url=fotoUrl;c.precio_regular=pr;if(pb!=null)c.precio_base=pb;}
            else{window._cart.push({restaurante:rest,nombre:nombre,precio:p,delivery:d,qty:1,foto_url:fotoUrl||null,cargo_envase:e,precio_regular:pr,precio_base:pb})}
            saveCart(); // CAMBIO 2
            try{if(navigator.vibrate)navigator.vibrate(12)}catch(e){}
            markEtapa('agrego_carrito');
            try{if(typeof fbq==='function')fbq('track','AddToCart',{content_name:nombre,value:p,currency:'USD'});}catch(e){}
            refreshView();
            if(pt)requestAnimationFrame(function(){flyFromPoint(pt.x,pt.y,pickEmojiForFly(nombre))});
        };

            var c=findCart(rest,nombre);
            if(c){c.qty--;if(c.qty<=0)window._cart=window._cart.filter(function(x){return!(x.restaurante===rest&&x.nombre===nombre)})}
            saveCart(); // CAMBIO 2

        // ── Promo "Envío $1 · Lun-Mié · pedidos de $10+" ──  [25-jun: mínimo subido $8→$10]
        // dias: 1=Lun,2=Mar,3=Mié (Date.getDay, hora local del dispositivo).
        // Solo socios (aliado|cliente_paga, vía esSocioPromo), envíos cercanos (base ≤ $2) y subtotal ≥ $10. El moto SIEMPRE
        // cobra su tarifa completa; DEWAN absorbe la diferencia (cubierta por el markup de la comida).

        function promoEnvioDiaActivo(){return PROMO_ENVIO.dias.indexOf(new Date().getDay())!==-1}
        // ── Promo "Envío GRATIS durante el partido" (Mundial 2026) ──
        // Ventana puntual fijada en UTC (NO depende de la zona del celular del cliente).
        // 14-jun-2026 17:30–20:30 Ecuador (UTC-5) = 22:30–01:30 UTC. Para apagarla: poner end en el pasado.
        // Solo socios, locales cercanos (base ≤ $2), pedidos ≥ $10. El moto cobra completo; DEWAN/socio absorbe.

        // Animated count-up del total: anima de `from` a `to` con easeOutCubic
        function animateMoney(el,from,to,duration,suffix){
            if(!el)return;

            if(duration==null)duration=420;
            suffix=suffix||'';
            if(!duration||duration<=0||Math.abs(to-from)<0.005){el.textContent='$'+to.toFixed(2)+suffix;return}
            var start=null;
            var step=function(ts){
                if(!start)start=ts;
                var p=Math.min((ts-start)/duration,1);
                var e=1-Math.pow(1-p,3);
                var val=from+(to-from)*e;
                el.textContent='$'+val.toFixed(2)+suffix;
                if(p<1)requestAnimationFrame(step);
            };
            requestAnimationFrame(step);
        }

        // Se llama tras cada render del carrito (showCart → setTimeout): el innerHTML destruye el mapa,

        // ── HORARIO / ABIERTO-CERRADO (reescrito 2026-06-19) ──
        // isRestOpen(horario) -> true=abierto / false=cerrado / null=sin horario o no se pudo leer.
        // Soporta multi-rango por coma y dias de la semana (cierra domingo, etc.). Probado contra
        // los 99 horarios reales de la BD. Politica: ante la duda -> null = PERMITIR (no perder
        // ventas); solo se bloquea el pedido cuando esta CONFIRMADO cerrado (isRestOpen===false).
        function _hNorm(s){
            return String(s||'').toLowerCase()
                .replace(/[áàä]/g,'a').replace(/[éèë]/g,'e').replace(/[íìï]/g,'i')
                .replace(/[óòö]/g,'o').replace(/[úùü]/g,'u');
        }
        var _HDOW={domingo:0,dom:0,lunes:1,lun:1,martes:2,mar:2,miercoles:3,mier:3,mie:3,jueves:4,jue:4,viernes:5,vier:5,vie:5,sabado:6,sab:6};
        // Dias permitidos (array 0=Dom..6=Sab) o null si el texto no menciona dias.
        function _hParseDays(sn){
            if(/todos los dias|todos los d|diario|toda la semana|lun(?:es)?\s*[a-]\s*dom/.test(sn)) return [0,1,2,3,4,5,6];
            var re=/(domingo|lunes|martes|miercoles|jueves|viernes|sabado|dom|lun|mar|mie|jue|vie|sab)/g,matches=[],m;
            while((m=re.exec(sn))){ matches.push({idx:_HDOW[m[1]],pos:m.index,end:re.lastIndex}); }
            if(!matches.length) return null;
            var allowed={};
            for(var i=0;i<matches.length;i++){
                if(i>0){
                    var between=sn.slice(matches[i-1].end,matches[i].pos);
                    if(/\b(a|al|hasta)\b|-|–/.test(between)){ // rango de dias (con wrap)
                        for(var d=matches[i-1].idx; d!==matches[i].idx; d=(d+1)%7) allowed[d]=1;
                        allowed[matches[i].idx]=1; continue;
                    }
                }
                allowed[matches[i].idx]=1;
            }
            return Object.keys(allowed).map(Number);
        }
        // Horas (minutos desde 00:00) en un trozo de texto. am/pm solo desplaza si la hora es 1-12.
        function _hTimes(str){
            var re=/(\d{1,2})[:h](\d{2})\s*(a\.?m\.?|p\.?m\.?)?/gi,out=[],m;
            while((m=re.exec(str))){
                var h=+m[1],mn=+m[2],ap=m[3]?m[3].replace(/[.\s]/g,'').toLowerCase():null;
                if(ap==='pm'&&h<12) h+=12;
                if(ap==='am'&&h===12) h=0;
                if(h>23||mn>59) continue;
                out.push(h*60+mn);
            }
            return out;
        }
        // Rangos [abre,cierra] en minutos. Multi-rango por coma; cae al texto completo si no hubo comas con horas.
        function _hRanges(sn){
            var ranges=[];
            sn.split(',').forEach(function(seg){ var t=_hTimes(seg); if(t.length>=2) ranges.push([t[0],t[t.length-1]]); });
            if(!ranges.length){ var t=_hTimes(sn); if(t.length>=2) ranges.push([t[0],t[t.length-1]]); }
            return ranges;
        }
        var _hCache={};
        function _hParse(horario){
            var k=String(horario);
            if(_hCache[k]) return _hCache[k];
            var sn=_hNorm(horario);
            return (_hCache[k]={days:_hParseDays(sn),ranges:_hRanges(sn)});
        }
        function _hNowEc(){ return new Date(new Date().toLocaleString('en-US',{timeZone:'America/Guayaquil'})); }
        function isRestOpen(horario){
            if(!horario||!String(horario).trim()) return null;
            var pr=_hParse(horario),now=_hNowEc(),dow=now.getDay(),nowMin=now.getHours()*60+now.getMinutes();
            if(pr.days&&pr.days.indexOf(dow)===-1) return false; // hoy cerrado por dia de la semana
            if(!pr.ranges.length) return null; // no se pudo leer la hora -> permitir
            for(var i=0;i<pr.ranges.length;i++){
                var o=pr.ranges[i][0],c=pr.ranges[i][1];
                if(c<=o){ if(nowMin>=o||nowMin<c) return true; } // cruza medianoche
                else { if(nowMin>=o&&nowMin<c) return true; }
            }
            return false;
        }
