            var precio=p.porUnidad?(Math.round(p.qty*p.precioUnidad*100)/100):p.precio;
            var precioBase=p.porUnidad?(Math.round(p.qty*(p.precioBaseUnidad||p.precioUnidad)*100)/100):(p.precioBase||p.precio);
            var nombre=p.porUnidad?(p.qty+' Alitas'):p.nombre;
            window._cart.push({restaurante:p.rest,nombre:nombre,precio:precio,delivery:p.delivery,qty:1,cargo_envase:p.envase,wingsChoices:choices,precio_base:precioBase,foto_url:p.foto||null});
            saveCart();
            window._wingsPending=null;
            closeModal();
            refreshView();
        };

        // ── MULTI-GRUPO (ej. Papazota: 2 ensaladas + 2 salsas) ──
        // Reusa el mismo estilo del modal de alas, pero con N grupos independientes.
        // Cada grupo tiene su contador "elige X", permite repetir, y el botón se habilita
        // solo cuando TODOS los grupos están completos. El precio NO cambia (incluido).
        function openWingsModalGrupos(rest,nombre,data,delivery,precioFinal,foto,envaseCol){
            var precio=(precioFinal!=null)?Number(precioFinal):(data.precio||0);
            var precioBase=Number(data.precio||0); // precio REAL del local (sin uplift)
            var grupos=(data.grupos||[]).map(function(g){
                return {label:g.label||'Opciones',emoji:g.emoji||'🌶️',elige:g.elige||1,
                        opciones:g.opciones||[],counts:(g.opciones||[]).map(function(){return 0})};
            });
            var p={rest:rest,nombre:nombre,delivery:delivery,envase:(envaseCol!=null?envaseCol:(data.envase||0)),
                   precio:precio,precioBase:precioBase,grupos:grupos,foto:foto||null};
            window._wingsPending=p;
            var h='<div class="almuerzo-modal">'+
                '<div class="almuerzo-header">'+
                    '<div class="almuerzo-header-icon">🥔</div>'+
                    '<div class="almuerzo-header-title">'+esc(nombre)+'</div>'+
                    '<div class="almuerzo-header-rest">'+esc(rest)+'</div>'+
                    '<div class="almuerzo-header-price">$'+precio.toFixed(2)+(p.envase>0?' <span style="font-size:0.7rem;color:var(--gris);font-weight:700">+ envase $'+Number(p.envase).toFixed(2)+'</span>':'')+'</div>'+
                '</div>';
            grupos.forEach(function(g,gi){
                h+='<div class="wings-counter">'+g.emoji+' Elige <b>'+g.elige+'</b> '+esc(g.label.toLowerCase())+' · puedes repetir · faltan <span id="wleft-'+gi+'">'+g.elige+'</span></div>'+
                   '<div class="wings-list">';
                g.opciones.forEach(function(s,oi){
                    h+='<div class="wings-row">'+
                        '<span class="wings-salsa-name">'+esc(s)+'</span>'+
                        '<div class="wings-stepper">'+
                            '<button class="btn-qty btn-qty-minus" onclick="changeWingGrupo('+gi+','+oi+',-1)">−</button>'+
                            '<span class="wings-salsa-count" id="wgc-'+gi+'-'+oi+'">0</span>'+
                            '<button class="btn-qty btn-qty-plus" onclick="changeWingGrupo('+gi+','+oi+',1)">+</button>'+
                        '</div>'+
                    '</div>';
                });
                h+='</div>';
            });
            h+='<button class="btn-almuerzo-add" id="btn-wings-add" onclick="confirmWingsGrupos()" disabled>🛒 Agregar al pedido</button>'+
                '<button class="btn btn-outline" style="margin-top:8px" onclick="closeModal()">Cancelar</button>'+
            '</div>';
            document.getElementById('modal-content').innerHTML=h;
            document.getElementById('modal-overlay').classList.add('visible');
        }
        function gruposCompletos(p){
            return p.grupos.every(function(g){return g.counts.reduce(function(a,b){return a+b},0)===g.elige;});
        }
        window.changeWingGrupo=function(gi,oi,delta){
            var p=window._wingsPending; if(!p||!p.grupos)return;
            var g=p.grupos[gi]; if(!g)return;
            var total=g.counts.reduce(function(a,b){return a+b},0);
            if(delta>0&&total>=g.elige) return; // no exceder el máximo del grupo
            var nv=g.counts[oi]+delta; if(nv<0)nv=0;
            g.counts[oi]=nv;
            var cEl=document.getElementById('wgc-'+gi+'-'+oi); if(cEl)cEl.textContent=nv;
            var newTotal=g.counts.reduce(function(a,b){return a+b},0);
            var lEl=document.getElementById('wleft-'+gi); if(lEl)lEl.textContent=(g.elige-newTotal);
            var btn=document.getElementById('btn-wings-add'); if(btn)btn.disabled=!gruposCompletos(p);
        };
        window.confirmWingsGrupos=function(){
            var p=window._wingsPending; if(!p||!p.grupos)return;
            var _rc=getRestByName(p.rest); if(_rc&&isRestOpen(_rc.horario)===false){ avisarCerrado(_rc); closeModal(); return; } // [19-jun]
            if(!gruposCompletos(p))return;
            var choices=p.grupos.map(function(g){
                var items=[];
                g.opciones.forEach(function(s,i){ if(g.counts[i]>0) items.push({opcion:s,n:g.counts[i]}); });
                return {label:g.label,emoji:g.emoji,items:items};
            });
            window._cart.push({restaurante:p.rest,nombre:p.nombre,precio:p.precio,delivery:p.delivery,qty:1,cargo_envase:p.envase,wingsChoices:choices,precio_base:p.precioBase,foto_url:p.foto||null});
            saveCart();
            window._wingsPending=null;
            closeModal();
            refreshView();
        };

        // V2: Modal estricto para forzar GPS o dirección antes de pedir
        window.openGPSStrict=function(){
            var modalRoot=document.getElementById('modal-overlay');
            var content=document.getElementById('modal-content');
            if(!modalRoot||!content) return;
            content.innerHTML='<div class="gps-strict">'+
                '<button class="modal-close" onclick="closeModal()" aria-label="Cerrar">✕</button>'+
                '<div class="gps-strict-icon">📍</div>'+
                '<div class="gps-strict-title">¿Dónde llevamos tu pedido?</div>'+
                '<div class="gps-strict-text">Para que tu rider te encuentre al toque necesitamos tu ubicación o una dirección.</div>'+
                '<div class="gps-strict-actions">'+
                    '<button class="btn btn-accent" style="margin:0" onclick="gpsStrictUseLocation()">📍 Usar mi ubicación GPS</button>'+
                    '<button class="btn btn-outline" style="margin:0" onclick="gpsStrictUseAddress()">📝 Escribir mi dirección</button>'+
                '</div>'+
            '</div>';
            modalRoot.classList.add('visible');
        };
        function pulseHint(el){
            if(!el) return;
            el.classList.add('pulse-hint');
            setTimeout(function(){try{el.classList.remove('pulse-hint')}catch(e){}},6000);
        }
        window.gpsStrictUseLocation=function(){
            closeModal();
            setTimeout(function(){
                var gpsBtn=document.getElementById('btn-gps-cart');
                if(gpsBtn){pulseHint(gpsBtn);gpsBtn.scrollIntoView({behavior:'smooth',block:'center'})}
                // Dispara la solicitud de GPS directamente
                if(typeof requestGPSCart==='function'){setTimeout(function(){if(gpsBtn) gpsBtn.click()},300);}
            },150);
        };
        window.gpsStrictUseAddress=function(){
            closeModal();
            setTimeout(function(){
                var addrInput=document.getElementById('loc-addr');
                if(addrInput){
                    addrInput.scrollIntoView({behavior:'smooth',block:'center'});
                    setTimeout(function(){addrInput.focus();pulseHint(addrInput)},320);
                }
            },150);
        };
    })();
    </script>

    <!-- ============ PWA CLIENTE: service worker + banner "Instalar la app" ============ -->
    <script>
    (function(){
        'use strict';
        // ¿Ya corre instalada? → no molestar
        var esStandalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;

        // 1) Service worker propio del CLIENTE (scope acotado a menu.html para no pisar el sw.js del motorizado)
        if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
            navigator.serviceWorker.register('/app/sw-cliente.js', { scope: '/app/menu.html' }).catch(function(e){ console.warn('SW cliente no registrado:', e); });
        }

        // 2) Banner de instalación (respetuoso: 1 vez, se puede cerrar, duerme 7 días)
        var SNOOZE_KEY = 'dewan_pwa_snooze';
        function dormido(){ try{ return Number(localStorage.getItem(SNOOZE_KEY)||0) > Date.now(); }catch(e){ return false; } }
        function dormir(dias){ try{ localStorage.setItem(SNOOZE_KEY, String(Date.now() + dias*24*60*60*1000)); }catch(e){} }
        if (esStandalone || dormido()) return;

        var esIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
        // In-app browser (Facebook/Instagram/WebView de WhatsApp): beforeinstallprompt NUNCA
        // dispara ahí — justo de donde viene la pauta. En Android ofrecemos abrir en Chrome.
        var esInApp = /FBAN|FBAV|FB_IAB|Instagram|; wv\)/i.test(navigator.userAgent);
        var esAndroid = /android/i.test(navigator.userAgent);
        var deferredPrompt = null;

        function pintarBanner(modo){
            if (document.getElementById('pwa-banner')) return;
            var b = document.createElement('div');
            b.id = 'pwa-banner';
            b.innerHTML =
                '<style>'+
                '#pwa-banner{position:fixed;left:12px;right:12px;bottom:14px;z-index:9990;background:#1f1a17;color:#fff;border-radius:16px;padding:12px 13px;display:flex;align-items:center;gap:12px;box-shadow:0 14px 40px rgba(0,0,0,.38);animation:pwaSube .35s ease}'+
                '@keyframes pwaSube{from{transform:translateY(24px);opacity:0}to{transform:none;opacity:1}}'+
                '#pwa-banner img{width:44px;height:44px;border-radius:11px;flex:0 0 auto}'+
                '#pwa-banner .t{flex:1;min-width:0}'+
                '#pwa-banner .t b{display:block;font-size:.92rem}'+
                '#pwa-banner .t span{display:block;font-size:.76rem;color:#cfc7bd;margin-top:2px;line-height:1.3}'+
                '#pwa-banner button{border:none;cursor:pointer;font-weight:800;border-radius:11px;padding:10px 14px;font-size:.85rem}'+
                '#pwa-banner .ok{background:#FFB627;color:#1f1a17;white-space:nowrap}'+
                '#pwa-banner .no{background:none;color:#8d857b;font-size:1.05rem;padding:8px 6px}'+
                '#pwa-ios-sheet{position:fixed;inset:0;z-index:9995;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:center}'+
                '#pwa-ios-sheet .card{background:#fff;color:#1f1a17;border-radius:20px 20px 0 0;padding:22px 20px 30px;max-width:520px;width:100%}'+
                '#pwa-ios-sheet h3{margin:0 0 12px;font-size:1.05rem}'+
                '#pwa-ios-sheet ol{margin:0 0 16px;padding-left:20px;font-size:.92rem;line-height:1.65}'+
                '#pwa-ios-sheet button{width:100%;border:none;background:#FFB627;color:#1f1a17;font-weight:800;border-radius:12px;padding:13px;font-size:.95rem;cursor:pointer}'+
                '</style>'+
                '<img src="/app/icons-cliente/icon-192.png" alt="DEWAN">'+
                '<div class="t"><b>Instala la app de DEWAN</b><span>'+(modo==='ios' ? 'Tenla en tu inicio y pide en 2 toques' : (modo==='chrome' ? 'Ábrela en Chrome y tenla en tu inicio' : 'Gratis, liviana y pides en 2 toques'))+'</span></div>'+
                '<button class="ok" id="pwa-instalar">'+(modo==='ios' ? 'Ver cómo' : (modo==='chrome' ? 'Abrir' : 'Instalar'))+'</button>'+
                '<button class="no" id="pwa-cerrar" aria-label="cerrar">✕</button>';
            document.body.appendChild(b);
            document.getElementById('pwa-cerrar').onclick = function(){ b.remove(); dormir(7); };
            document.getElementById('pwa-instalar').onclick = function(){
                if (modo === 'ios') { hojaIOS(); return; }
                if (modo === 'chrome') { // salir del in-app browser hacia Chrome (ahí sí se puede instalar)
                    b.remove(); dormir(1);
                    location.href = 'intent://pedir.dewansas.com/#Intent;scheme=https;package=com.android.chrome;end';
                    return;
                }
                if (!deferredPrompt) { b.remove(); return; }
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(function(r){
                    if (r && r.outcome === 'accepted') { try{ if(typeof fbq==='function') fbq('trackCustom','PWAInstall'); }catch(e){} }
                    else dormir(7);
                    b.remove();
                    deferredPrompt = null;
                });
            };
        }

        function hojaIOS(){
            var s = document.createElement('div');
            s.id = 'pwa-ios-sheet';
            s.innerHTML = '<div class="card"><h3>📲 Instalar DEWAN en tu iPhone</h3>'+
                '<ol><li>Toca el botón <b>Compartir</b> <span style="font-size:1.1em">⬆️</span> abajo en Safari</li>'+
                '<li>Elige <b>"Añadir a pantalla de inicio"</b></li>'+
                '<li>Toca <b>Añadir</b> — ¡y listo!</li></ol>'+
                '<button id="pwa-ios-ok">Entendido</button></div>';
            document.body.appendChild(s);
            s.addEventListener('click', function(e){ if (e.target === s) s.remove(); });
            document.getElementById('pwa-ios-ok').onclick = function(){ s.remove(); dormir(14); var bb=document.getElementById('pwa-banner'); if(bb) bb.remove(); };
        }

        window.addEventListener('beforeinstallprompt', function(e){
            e.preventDefault();
            deferredPrompt = e;
            setTimeout(function(){ pintarBanner('android'); }, 12000);
        });
        window.addEventListener('appinstalled', function(){
            try{ if(typeof fbq==='function') fbq('trackCustom','PWAInstall'); }catch(e){}
            var bb = document.getElementById('pwa-banner'); if (bb) bb.remove();
            dormir(3650);
        });
        if (esIOS && !esInApp) setTimeout(function(){ pintarBanner('ios'); }, 15000);
        else if (esAndroid && esInApp) setTimeout(function(){ pintarBanner('chrome'); }, 12000);
    })();
    </script>
    <script>
    /* ===== Sellos DEWAN: cada 6 pedidos, envío gratis (widget autocontenido) ===== */
    (function(){
        var LS_TEL='dewan_sellos_tel';
        function telGuardado(){ try{return localStorage.getItem(LS_TEL)||''}catch(e){return''} }
        function pintarCirculos(n){
            var h='';
            for(var i=0;i<6;i++){
                h+='<span style="width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;'+
                   (i<n?'background:#F59E0B;color:#fff;':'background:#EDE4D3;color:#B9A88F;')+'margin:0 3px;">'+(i<n?'🎟':'')+'</span>';
            }
            return h;
        }
        function consultar(tel, cont){
            fetch(SB_URL+'/rest/v1/rpc/sellos_estado',{method:'POST',
                headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},
                body:JSON.stringify({tel:tel})})
            .then(function(r){return r.json()})
            .then(function(d){
                if(!d||typeof d.sellos==='undefined'){ cont.innerHTML='<div style="font-size:.82rem;color:#8a7a6d">No pudimos consultar ahora, intenta más tarde.</div>'; return; }
                try{localStorage.setItem(LS_TEL,tel)}catch(e){}
                var premio = d.premios_disponibles>0;
                cont.innerHTML=
                    '<div style="display:flex;align-items:center;justify-content:center;margin:6px 0 4px">'+pintarCirculos(d.sellos)+'</div>'+
                    (premio
                        ? '<div style="font-weight:800;color:#1F9D55;font-size:.92rem">🎁 ¡Tienes un ENVÍO GRATIS para tu próximo pedido!</div>'
                        : '<div style="font-size:.88rem;color:#4A2C17">Llevas <b>'+d.sellos+' de 6</b> — te '+(d.faltan===1?'falta <b>1 pedido</b>':'faltan <b>'+d.faltan+' pedidos</b>')+' para tu <b>envío GRATIS</b> 🛵</div>')+
                    '<button onclick="dewanSellosCambiarTel()" style="background:none;border:0;color:#B9A88F;font-size:.72rem;margin-top:4px;text-decoration:underline;font-family:inherit">consultar otro número</button>';
            })
            .catch(function(){ cont.innerHTML='<div style="font-size:.82rem;color:#8a7a6d">Sin conexión — intenta más tarde.</div>'; });
        }
        window.dewanSellosCambiarTel=function(){
            try{localStorage.removeItem(LS_TEL)}catch(e){}
            var c=document.getElementById('dewan-sellos-body'); if(c) pintarForm(c);
        };
        function pintarForm(cont){
            cont.innerHTML='<div style="font-size:.88rem;color:#4A2C17;margin-bottom:6px">Cada 6 pedidos, tu carrera va <b>GRATIS</b> (¡y ya llevas 2 de regalo!)</div>'+
                '<div style="display:flex;gap:6px;justify-content:center">'+
                '<input id="dewan-sellos-tel" type="tel" inputmode="tel" placeholder="Tu número (09...)" style="border:1.5px solid #EDE4D3;border-radius:10px;padding:8px 10px;font-size:.9rem;width:170px;font-family:inherit">'+
                '<button onclick="dewanSellosVer()" style="background:#F59E0B;color:#fff;border:0;border-radius:10px;padding:8px 14px;font-weight:800;font-family:inherit;font-size:.88rem">Ver mis sellos</button></div>';
        }
        window.dewanSellosVer=function(){
            var i=document.getElementById('dewan-sellos-tel');
            var tel=(i&&i.value||'').replace(/\D/g,'');
            if(tel.length<9){ if(i){i.style.borderColor='#D93A0B'; i.focus();} return; }
            consultar(tel, document.getElementById('dewan-sellos-body'));
        };
        function montar(){
            if(document.getElementById('dewan-sellos')) return;
            var card=document.createElement('div');
            card.id='dewan-sellos';
            card.style.cssText='margin:14px 12px;background:#fff;border-radius:14px;padding:14px;text-align:center;box-shadow:0 3px 12px rgba(74,44,23,.08);max-width:406px;margin-left:auto;margin-right:auto;';
            card.innerHTML='<div style="font-weight:900;color:#4A2C17;font-size:.98rem;margin-bottom:2px">🎟️ Sellos DEWAN</div><div id="dewan-sellos-body"></div>';
            var footer=document.querySelector('footer');
            if(footer) footer.parentNode.insertBefore(card,footer); else document.body.appendChild(card);
            var body=card.querySelector('#dewan-sellos-body');
            var t=telGuardado();
            if(t) consultar(t, body); else pintarForm(body);
        }
        if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',function(){setTimeout(montar,800)});
        else setTimeout(montar,800);
    })();
    </script>
