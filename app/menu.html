    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#FBF4EA;--card:#FFFCF7;--card2:#F4EADB;--border:#EAD9C4;
            --acc:#E8431A;--acc-soft:rgba(232,67,26,0.10);
            --cta:#E8431A;--cta-hover:#CF3A12;--cta-soft:rgba(232,67,26,0.10);
            --texto:#221A14;--gris:#6B5D4F;--gris-2:#A9978A;
            /* Escala de espaciado base-4 + tap-target mínimo (audit visual 2026-06-13) */
            --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-6:24px;--sp-8:32px;
            --pad-x:14px;--gap-card:10px;--gap-section:24px;--tap-min:44px;
            --green:#1F9D55;--wa:#25D366;--radius:16px;--logo:url("/app/img/logo.png");
        }
        html,body{overscroll-behavior-y:none} /* evita pull-to-refresh accidental que recarga toda la app */
        body{font-family:'Nunito',system-ui,sans-serif;background:var(--bg);color:var(--texto);min-height:100vh;-webkit-font-smoothing:antialiased;max-width:430px;margin:0 auto}

        /* GPS Welcome */
        .gps-welcome{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;overflow:hidden}
        .gps-welcome::before{content:'';position:absolute;top:-40%;left:-20%;width:140%;height:80%;background:radial-gradient(ellipse at center,rgba(232,67,26,0.06) 0%,transparent 70%);pointer-events:none}
        .gps-welcome::after{content:'';position:absolute;bottom:-10%;right:-10%;width:50%;height:50%;background:radial-gradient(circle,rgba(232,67,26,0.04) 0%,transparent 70%);pointer-events:none}

        /* Brand */
        .welcome-logo{width:170px;aspect-ratio:380 / 213;margin:0 auto 16px;background:var(--logo) center/contain no-repeat;filter:drop-shadow(0 6px 26px rgba(232,67,26,0.30));position:relative;z-index:1}
        .welcome-brand{margin-bottom:6px;position:relative;z-index:1}
        .welcome-brand-name{font-size:2.2rem;font-weight:900;color:var(--acc);letter-spacing:0.04em;line-height:1}
        .welcome-brand-sub{font-size:0.85rem;font-weight:700;color:var(--texto);letter-spacing:0.25em;text-transform:uppercase;opacity:0.7;margin-top:2px}
        .welcome-brand-tag{font-size:0.7rem;color:var(--gris);margin-top:6px;font-weight:600}

        /* Floating food orbit */
        .welcome-orbit{position:relative;width:160px;height:160px;margin:28px auto 24px;z-index:1}
        .welcome-orbit-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--acc),#E0951A);display:flex;align-items:center;justify-content:center;font-size:2rem;box-shadow:0 0 40px rgba(232,67,26,0.3),0 0 80px rgba(232,67,26,0.1)}
        .welcome-orbit-ring{position:absolute;inset:0;border-radius:50%;border:1.5px dashed rgba(232,67,26,0.15);animation:welcome-spin 20s linear infinite}
        .welcome-orbit-ring2{position:absolute;inset:-18px;border-radius:50%;border:1px dashed rgba(232,67,26,0.08);animation:welcome-spin 30s linear infinite reverse}
        .welcome-food{position:absolute;font-size:1.6rem;animation:welcome-float 3s ease-in-out infinite;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.4))}
        .welcome-food:nth-child(1){top:-8px;left:50%;transform:translateX(-50%);animation-delay:0s}
        .welcome-food:nth-child(2){top:22%;right:-12px;animation-delay:0.5s}
        .welcome-food:nth-child(3){bottom:22%;right:-8px;animation-delay:1s}
        .welcome-food:nth-child(4){bottom:-8px;left:50%;transform:translateX(-50%);animation-delay:1.5s}
        .welcome-food:nth-child(5){bottom:22%;left:-12px;animation-delay:2s}
        .welcome-food:nth-child(6){top:22%;left:-8px;animation-delay:2.5s}
        @keyframes welcome-spin{to{transform:rotate(360deg)}}
        @keyframes welcome-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

        /* Pulse rings behind center */
        .welcome-pulse{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:50%}
        .welcome-pulse::before,.welcome-pulse::after{content:'';position:absolute;inset:-12px;border-radius:50%;border:2px solid var(--acc);opacity:0;animation:welcome-ping 2.5s ease-out infinite}
        .welcome-pulse::after{animation-delay:1.25s}
        @keyframes welcome-ping{0%{transform:scale(1);opacity:0.4}100%{transform:scale(2.2);opacity:0}}

        /* Text */
        .welcome-title{font-size:1.35rem;font-weight:900;color:var(--texto);margin-bottom:6px;position:relative;z-index:1}
        .welcome-text{font-size:0.85rem;color:var(--gris);line-height:1.6;margin-bottom:28px;max-width:300px;position:relative;z-index:1}

        /* GPS status */
        .gps-status{text-align:center;font-size:0.82rem;color:var(--gris);margin-bottom:10px;min-height:20px;transition:all 0.3s}
        .gps-status.success{color:var(--green);font-weight:700}
        .gps-status.error{color:var(--gris);font-weight:600}

        /* Welcome features row */
        .welcome-features{display:flex;flex-direction:column;gap:8px;margin:8px 0 20px;position:relative;z-index:1;width:100%;max-width:320px}
        .welcome-feat{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:0.82rem;font-weight:700;color:var(--texto)}
        .welcome-feat span{font-size:1.2rem}

        /* CTA button with glow */
        .welcome-cta{position:relative;z-index:1;width:100%;max-width:320px;margin-bottom:10px}
        .welcome-cta .btn-accent{animation:welcome-glow 2.5s ease-in-out infinite;box-shadow:0 4px 20px rgba(232,67,26,0.25);font-size:1.05rem;padding:18px 24px;border-radius:16px;font-weight:900}
        @keyframes welcome-glow{0%,100%{box-shadow:0 4px 20px rgba(232,67,26,0.25)}50%{box-shadow:0 4px 36px rgba(232,67,26,0.45)}}
        .welcome-skip{background:transparent;border:1.5px solid var(--border);color:var(--texto);font-size:0.85rem;font-weight:700;cursor:pointer;font-family:inherit;padding:12px 20px;border-radius:14px;transition:all 0.2s;position:relative;z-index:1;width:100%;max-width:320px;display:flex;align-items:center;justify-content:center;gap:6px}
        .welcome-skip:hover,.welcome-skip:active{background:var(--card);border-color:var(--acc);color:var(--acc)}

        .btn{border:none;border-radius:14px;padding:14px 20px;font-weight:800;font-size:0.95rem;cursor:pointer;font-family:inherit;width:100%;max-width:320px;transition:all 0.2s;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
        .btn:active{transform:scale(0.97)}
        .btn-accent{background:var(--acc);color:#111}
        .btn-accent:disabled{opacity:0.5;cursor:not-allowed}
        .btn-outline{background:transparent;color:var(--gris);border:1.5px solid var(--border)}
        .btn-green{background:var(--green);color:white}

        /* Header sticky */
        .header-sticky{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:calc(20px + env(safe-area-inset-top,0px)) var(--pad-x) 16px}
        .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
        .header-loc{display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--gris);font-weight:700}
        .header-title{font-size:1.35rem;font-weight:900;letter-spacing:-0.03em;margin-top:4px}
        .home-trust{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:7px;margin-top:11px;font-size:0.72rem;font-weight:700;color:var(--gris-2);background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:9px 10px;line-height:1}
        .home-trust .trust-dot{color:var(--border);font-weight:900}
        .btn-cart{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:9px 16px;cursor:pointer;color:var(--gris);font-weight:800;font-size:0.82rem;font-family:inherit;display:flex;align-items:center;gap:8px;transition:all 0.2s}
        .btn-cart.has-items{background:var(--acc);color:#111;border-color:var(--acc)}

        /* Sort pills */
        .sort-bar{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:12px var(--pad-x)}
        .sort-bar::-webkit-scrollbar{display:none}
        .pill{flex-shrink:0;padding:11px 16px;border-radius:100px;border:1.5px solid var(--border);background:transparent;color:var(--gris);font-weight:800;font-size:0.75rem;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.2s}
        .pill.active{background:var(--acc);color:#111;border-color:var(--acc)}
        .pill.disabled{opacity:0.4;cursor:not-allowed;pointer-events:none}

        /* GPS Banner */
        .gps-banner{background:var(--card2);border:1.5px solid rgba(232,67,26,0.42);border-radius:14px;margin:4px 14px 12px;padding:12px 13px;display:flex;align-items:center;gap:11px;font-size:0.9rem;color:var(--texto);cursor:pointer;transition:transform 0.15s;box-shadow:0 2px 12px rgba(232,67,26,0.13)}
        .gps-banner:active{transform:scale(0.99)}
        .gps-banner-icon{font-size:1.5rem;flex-shrink:0;line-height:1}
        .gps-banner-text{flex:1;line-height:1.28;font-weight:800;letter-spacing:-0.01em}
        .gps-banner-text small{display:block;font-weight:600;font-size:0.75rem;color:var(--gris);margin-top:2px;letter-spacing:0}
        .gps-banner-cta{flex-shrink:0;background:var(--acc);color:#1d1d1f;font-weight:900;font-size:0.82rem;padding:9px 15px;border-radius:999px;border:none;cursor:pointer;white-space:nowrap;font-family:inherit}
        .gps-banner-cta:active{transform:scale(0.96)}
        .gps-banner-close{background:none;border:none;color:var(--gris);font-size:1rem;cursor:pointer;padding:6px;min-width:30px;min-height:30px;display:flex;align-items:center;justify-content:center;opacity:0.45;flex-shrink:0}
        .gps-banner-close:hover{opacity:1}

        /* Restaurant Card */
        .rest-card{background:var(--card);border:1px solid var(--border);border-radius:20px;margin:0 14px 12px;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s}
        .rest-card:active{transform:scale(0.985)}
        .rest-color-bar{height:4px}
        .rest-body{padding:14px 14px 12px}
        .rest-top{display:flex;gap:12px;align-items:center}
        .rest-avatar{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.7rem;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
        .rest-info{flex:1;min-width:0}
        .rest-name{font-weight:900;font-size:1.02rem;line-height:1.2}
        .rest-platos-count{font-size:0.68rem;color:var(--gris);font-weight:700;margin-top:2px}
        .rest-meta{display:flex;gap:10px;margin-top:5px;font-size:0.73rem;flex-wrap:wrap}
        .rest-meta span{color:var(--gris);display:flex;align-items:center;gap:2px}

        /* Compact restaurant card (slim, ~86px tall, 4-5 per screen) */
        .rest-compact{display:flex;align-items:stretch;background:var(--card);border:1px solid var(--border);border-radius:16px;margin:0 14px 9px;overflow:hidden;cursor:pointer;transition:transform 0.15s,border-color 0.2s}
        .rest-compact:active{transform:scale(0.985)}
        .rest-compact-stripe{width:4px;flex-shrink:0}
        .rest-compact-body{flex:1;padding:12px 12px 12px 14px;display:flex;gap:12px;align-items:center;min-width:0}
        .rest-compact-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,0.2);position:relative;overflow:hidden}
        .rest-compact-avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:var(--card2)}
        .rest-compact-info{flex:1;min-width:0}
        .rest-compact-name{font-weight:800;font-size:0.95rem;line-height:1.2;letter-spacing:-0.01em;display:flex;align-items:center;gap:6px;color:var(--texto);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .rest-compact-meta{display:flex;gap:10px;margin-top:4px;font-size:0.74rem;color:var(--gris-2);font-weight:700;flex-wrap:wrap}
        .rest-compact-meta span{display:flex;align-items:center;gap:3px;white-space:nowrap}
        .rest-compact-meta .dot{color:var(--border);font-weight:900}
        .rest-compact-chevron{color:var(--gris);font-size:1.1rem;flex-shrink:0;opacity:0.45}

        /* Home horizontal carrusel (Apple-style) */
        .home-carrusel{padding:4px 0 8px}
        .home-carrusel-head{display:flex;align-items:baseline;justify-content:space-between;padding:16px 14px 12px}
        .home-carrusel-title{font-size:1.05rem;font-weight:900;letter-spacing:-0.02em;display:flex;align-items:center;gap:6px}
        .home-carrusel-sub{font-size:0.7rem;color:var(--gris);font-weight:700;letter-spacing:0.04em;text-transform:uppercase}
        .home-carrusel-scroll{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:0 14px 6px;scroll-snap-type:x mandatory}
        .home-carrusel-scroll::-webkit-scrollbar{display:none}
        .carrusel-card{flex-shrink:0;width:146px;background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;cursor:pointer;scroll-snap-align:start;transition:transform 0.15s,border-color 0.2s;display:flex;flex-direction:column;position:relative}
        .carrusel-card:active{transform:scale(0.97)}
        .carrusel-top{height:88px;display:flex;align-items:center;justify-content:center;font-size:2.4rem;position:relative}
        .carrusel-body{padding:10px 12px 12px}
        .carrusel-name{font-weight:800;font-size:0.85rem;line-height:1.22;letter-spacing:-0.01em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.15em;color:var(--texto)}
        .carrusel-meta{display:flex;gap:6px;margin-top:6px;font-size:0.7rem;color:var(--gris-2);font-weight:700;flex-wrap:wrap}
        .carrusel-meta span{display:flex;align-items:center;gap:2px}
        .carrusel-closed{position:absolute;top:8px;right:8px;background:rgba(255,59,48,0.22);color:#FF3B30;font-size:0.55rem;font-weight:800;padding:3px 7px;border-radius:20px;letter-spacing:0.04em;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
        .list-section-title{font-size:0.72rem;font-weight:900;color:var(--gris);text-transform:uppercase;letter-spacing:0.14em;padding:14px 14px 10px;display:flex;align-items:center;gap:8px}
        .list-section-title::after{content:'';flex:1;height:1px;background:var(--border);opacity:0.4}

        /* Info strip */
        .info-strip{display:flex;gap:6px;margin-top:16px;padding:10px;background:rgba(239,227,211,0.92);backdrop-filter:blur(14px) saturate(150%);-webkit-backdrop-filter:blur(14px) saturate(150%);border-radius:16px;border:1px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,0.06);position:relative;z-index:2}
        .info-box{flex:1;background:transparent;border-radius:10px;padding:6px 4px;text-align:center;border:none;position:relative}
        .info-box+.info-box::before{content:'';position:absolute;left:-3px;top:15%;bottom:15%;width:1px;background:var(--border)}
        .info-box-icon{font-size:0.95rem;line-height:1;margin-bottom:3px}
        .info-box-val{font-weight:900;font-size:0.82rem;color:var(--texto);letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
        .info-box-label{font-size:0.58rem;color:var(--gris-2);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-top:2px}

        /* Category label */
        .cat-label{font-size:0.72rem;font-weight:800;color:var(--acc);text-transform:uppercase;letter-spacing:0.1em;padding:16px 0 8px;display:flex;align-items:center;gap:8px}
        .cat-label::after{content:'';flex:1;height:1px;background:var(--border);opacity:0.5}

        /* Product card */
        .prod-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px;margin-bottom:10px;transition:border-color 0.2s,background 0.2s,transform 0.15s;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
        .prod-card.in-cart{border-color:rgba(232,67,26,0.4);background:rgba(232,67,26,0.025)}
        .prod-top{display:flex;gap:12px;align-items:flex-start;position:relative}
        .prod-sello{position:absolute;top:-7px;left:-7px;z-index:2;background:#ff3b30;color:#fff;font-size:0.74rem;font-weight:900;min-width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 9px rgba(255,59,48,0.5);border:2.5px solid var(--card);letter-spacing:-0.03em}
        .prod-emoji{width:112px;height:112px;border-radius:16px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:3rem;flex-shrink:0;border:1px solid var(--border);overflow:hidden}
        .prod-info{flex:1;min-width:0}
        .prod-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px}
        .badge{font-size:0.6rem;font-weight:800;padding:3px 8px;border-radius:20px;letter-spacing:0.04em;display:inline-flex;align-items:center;gap:3px}
        .badge-recomendado{background:var(--acc-soft);color:var(--acc)}
        .badge-popular{background:var(--acc-soft);color:var(--acc)}
        .badge-cart{background:var(--acc);color:#111}
        .badge-cat{background:var(--card2);color:var(--gris-2);border:1px solid var(--border)}
        .prod-name{font-weight:800;font-size:0.96rem;line-height:1.25;letter-spacing:-0.01em}
        .prod-desc{color:var(--gris-2);font-size:0.78rem;margin-top:4px;line-height:1.45}
        .prod-envase{color:var(--gris);font-size:0.7rem;margin-top:4px;font-weight:700;letter-spacing:0.01em}
        .prod-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:10px}
        .prod-price{font-weight:900;font-size:1.1rem;color:var(--texto);letter-spacing:-0.01em}
        .prod-price-antes{font-weight:600;font-size:0.85rem;color:var(--gris);text-decoration:line-through;margin-right:6px;opacity:0.7}
        .prod-price-badge{font-size:0.62rem;font-weight:800;color:var(--green);background:rgba(31,157,85,0.12);border-radius:6px;padding:2px 6px;margin-left:6px;text-transform:uppercase;letter-spacing:0.03em;vertical-align:middle}
        .promo-badge{display:inline-block;background:#ff3b30;color:#fff;font-size:0.6rem;font-weight:900;padding:2px 7px;border-radius:6px;margin-left:4px;letter-spacing:0.02em;vertical-align:middle}
        .prod-disc-pct{font-size:0.66rem;font-weight:900;color:#ff3b30;margin-left:6px;white-space:nowrap}
        .btn-agregar{position:relative;width:36px;height:36px;border-radius:50%;background:var(--cta-soft);color:var(--cta);border:1.5px solid rgba(232,67,26,0.32);font-weight:900;font-size:1.3rem;line-height:1;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;padding:0;transition:transform 0.15s,background 0.15s;flex-shrink:0}
        .btn-agregar::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:var(--tap-min);height:var(--tap-min);border-radius:50%}
        .btn-agregar:active{transform:scale(0.88)}
        .btn-agregar.btn-agregar-wide{width:auto;height:auto;padding:10px 18px;border-radius:12px;font-size:0.82rem;gap:6px}

        /* Qty controls */
        .qty-ctrl{display:flex;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--border);border-radius:100px;padding:2px}
        .btn-qty{position:relative;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.05rem;cursor:pointer;font-family:inherit;transition:transform 0.15s;line-height:1;padding:0}
        .btn-qty::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:var(--tap-min);height:var(--tap-min);border-radius:50%}
        .btn-qty:active{transform:scale(0.88)}
        .btn-qty-minus{border:none;background:transparent;color:var(--texto)}
        .btn-qty-plus{border:none;background:var(--cta);color:#fff;box-shadow:0 2px 8px rgba(232,67,26,0.28)}
        .qty-num{font-weight:900;font-size:0.95rem;min-width:18px;text-align:center;color:var(--texto)}

        /* Menu section inside restaurant */
        .menu-section{padding:0 14px 14px}
        .menu-count{color:var(--gris);font-size:0.68rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:12px;padding:0 14px}

        /* Sticky category tabs (within restaurant view) */
        .cat-tabs-wrap{position:sticky;top:0;z-index:45;background:rgba(243,236,224,0.92);backdrop-filter:blur(14px) saturate(150%);-webkit-backdrop-filter:blur(14px) saturate(150%);border-bottom:1px solid var(--border);padding:10px 0;display:flex;align-items:center;gap:8px}
        .cat-tabs-back{flex-shrink:0;margin-left:12px;width:36px;height:36px;border-radius:50%;background:var(--card2);border:1px solid var(--border);color:var(--texto);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;font-family:inherit;transition:transform 0.15s}
        .cat-tabs-back:active{transform:scale(0.9)}
        .cat-tabs{flex:1;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:0 12px 0 4px;scroll-behavior:smooth}
        .cat-tabs::-webkit-scrollbar{display:none}
        .cat-tab{flex-shrink:0;padding:11px 14px;border-radius:100px;border:1.5px solid var(--border);background:transparent;color:var(--gris-2);font-weight:800;font-size:0.78rem;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.2s;letter-spacing:0.01em}
        .cat-tab.active{background:var(--acc);color:#111;border-color:var(--acc)}
        .cat-tabs-restname{flex:1;font-weight:800;font-size:0.9rem;color:var(--texto);padding:0 14px 0 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-0.01em}

        /* Destacados horizontal carousel */
        .destacados{padding:10px 0 8px}
        #home-food-rail:empty{display:none}
        .destacados-head{display:flex;align-items:baseline;justify-content:space-between;padding:0 14px 12px}
        .destacados-title{font-size:0.98rem;font-weight:900;letter-spacing:-0.02em;display:flex;align-items:center;gap:6px}
        .destacados-sub{font-size:0.7rem;color:var(--gris);font-weight:700;letter-spacing:0.04em;text-transform:uppercase}
        .destacados-scroll{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:0 14px 4px;scroll-snap-type:x mandatory}
        .destacados-scroll::-webkit-scrollbar{display:none}
        .dest-card{flex-shrink:0;width:160px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 12px 12px;scroll-snap-align:start;position:relative;transition:border-color 0.2s,transform 0.15s;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,0.08)}
        .dest-photo{position:relative}
        .dest-logo-chip{position:absolute;top:8px;left:8px;width:34px;height:34px;border-radius:50%;background:#fff;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.16);z-index:2;border:1.5px solid #fff}
        .dest-logo-chip img{width:100%;height:100%;object-fit:cover}
        .dest-card:active{transform:scale(0.98)}
        .dest-card.in-cart{border-color:rgba(232,67,26,0.4);background:rgba(232,67,26,0.025)}
        .dest-emoji{width:140px;height:140px;border-radius:16px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:3.2rem;margin-bottom:12px;border:1px solid var(--border);overflow:hidden}
        .dest-name{font-weight:800;font-size:0.85rem;line-height:1.25;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.15em;letter-spacing:-0.01em}
        .dest-footer{display:flex;align-items:center;justify-content:space-between;gap:6px}
        .dest-price{font-weight:900;font-size:0.98rem;color:var(--texto);letter-spacing:-0.01em}
        .dest-price-antes{font-weight:600;font-size:0.78rem;color:var(--gris);text-decoration:line-through;margin-right:5px;opacity:0.7}
        .dest-plus{position:relative;width:30px;height:30px;border-radius:50%;background:var(--cta-soft);color:var(--cta);border:1.5px solid rgba(232,67,26,0.32);font-weight:900;font-size:1.15rem;line-height:1;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;padding:0;transition:transform 0.15s,background 0.15s;flex-shrink:0}
        .dest-plus::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:var(--tap-min);height:var(--tap-min);border-radius:50%}
        .dest-plus:active{transform:scale(0.88)}
        .dest-qty-mini{background:var(--acc);color:#111;border-radius:100px;padding:4px 10px;font-weight:900;font-size:0.74rem;display:inline-flex;align-items:center;gap:4px}
        .dest-rest-tag{font-size:0.68rem;color:var(--gris);font-weight:700;margin:7px 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        /* Tarjeta de local CERRADO en el carril: foto en gris + cinta de apertura (variedad de noche, honesta) */
        .dest-card-cerrada .dest-emoji{filter:grayscale(45%) brightness(0.82);opacity:0.92}
        .dest-cerrada-cinta{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.78);color:#FFD98A;font-size:0.68rem;font-weight:800;padding:4px 9px;border-radius:8px;z-index:2;letter-spacing:0.01em}
        /* Cinta fina de confianza (reemplaza el banner grande de precio del local, sin el peso) */
        .trust-strip{text-align:center;font-size:0.72rem;color:var(--gris);font-weight:700;padding:2px 14px 10px;letter-spacing:0.01em}
        /* Encabezado de mini-carril por restaurante (opción agrupada) */
        .rail-rest-head{display:flex;align-items:baseline;gap:8px;padding:12px 14px 7px}
        .rail-rest-name{font-size:0.86rem;font-weight:800;color:var(--texto);letter-spacing:-0.01em}
        .rail-rest-estado{font-size:0.7rem;font-weight:700;color:var(--gris)}
        /* Lightbox de foto (tap para ampliar) */
        .foto-zoom{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.84);display:flex;align-items:center;justify-content:center;padding:18px}
        .foto-zoom-box{position:relative;width:100%;max-width:430px;background:var(--card);border-radius:22px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,0.65)}
        .foto-zoom-img{width:100%;max-height:62vh;object-fit:cover;display:block;background:#000}
        .foto-zoom-x{position:absolute;top:10px;right:10px;width:40px;height:40px;border-radius:50%;border:none;background:rgba(0,0,0,0.55);color:#fff;font-size:1.15rem;font-weight:800;cursor:pointer;z-index:2;line-height:1}
        .foto-zoom-info{padding:14px 18px 4px}
        .foto-zoom-name{font-weight:800;font-size:1.12rem;letter-spacing:-0.01em;line-height:1.2}
        .foto-zoom-sub{font-size:0.86rem;color:var(--gris);font-weight:700;margin-top:4px}
        .foto-zoom-cta{display:block;width:calc(100% - 36px);margin:14px 18px 18px;padding:15px;border:none;border-radius:14px;background:var(--cta);color:#fff;font-weight:900;font-size:1rem;font-family:inherit;cursor:pointer}
        .foto-zoom-cta:active{transform:scale(0.98)}
        .foto-zoom-note{text-align:center;font-size:0.74rem;color:var(--gris);font-weight:600;padding:0 18px 16px;margin-top:-6px}
        /* CTA con verbo en la tarjeta del carril (mejor que un "+" mudo) */
        .dest-cta-full{margin-top:9px;padding:9px 0;border-radius:11px;background:var(--cta);color:#fff;font-weight:800;font-size:0.82rem;text-align:center;letter-spacing:-0.01em}
        .dest-cta-full.in-cart{background:rgba(34,197,94,0.16);color:var(--green);border:1px solid rgba(34,197,94,0.4)}

        /* Cart floating — V4: Premium two-section bar (dark + orange CTA) */
        .cart-float{position:fixed;bottom:calc(14px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);width:94%;max-width:402px;z-index:60;animation:cart-rise 0.35s cubic-bezier(0.34,1.3,0.64,1)}
        @keyframes cart-rise{from{transform:translate(-50%,120%);opacity:0}to{transform:translate(-50%,0);opacity:1}}
        .cart-float-btn{width:100%;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);color:var(--texto);border:1px solid var(--border);border-radius:18px;padding:8px 8px 8px 16px;font-weight:800;font-size:0.9rem;cursor:pointer;font-family:inherit;display:flex;justify-content:space-between;align-items:center;gap:10px;box-shadow:0 10px 30px rgba(0,0,0,0.14),0 0 0 1px rgba(232,67,26,0.06);transition:all 0.2s;overflow:hidden}
        .cart-float-btn:active{transform:scale(0.985)}
        .cart-float-info{display:flex;flex-direction:column;align-items:flex-start;gap:1px;min-width:0;flex:1}
        .cart-float-info-title{font-weight:900;font-size:0.85rem;color:var(--texto);letter-spacing:-0.01em;line-height:1.15}
        .cart-float-info-sub{font-weight:600;font-size:0.68rem;color:var(--gris-2);line-height:1.15;letter-spacing:0.01em}
        .cart-float-cta{display:flex;align-items:center;gap:8px;background:var(--cta);color:#fff;padding:12px 14px;border-radius:12px;font-weight:900;font-size:0.9rem;box-shadow:0 4px 14px rgba(217,58,11,0.42),inset 0 1px 0 rgba(255,255,255,0.15);letter-spacing:-0.01em;flex-shrink:0;transition:background 0.2s}
        .cart-float-btn:active .cart-float-cta{background:var(--cta-hover)}
        .cart-float-count{background:rgba(255,255,255,0.22);border-radius:999px;min-width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:0.72rem;padding:0 6px;letter-spacing:0}
        .cart-float-total{font-variant-numeric:tabular-nums;font-weight:900}
        .cart-float-bump{animation:cart-bump 0.42s cubic-bezier(0.34,1.56,0.64,1)}
        @keyframes cart-bump{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}

        /* V4.2: Particula que vuela del boton "+" al carrito al agregar */
        .fly-particle{position:fixed;z-index:200;pointer-events:none;font-size:1.4rem;will-change:transform,opacity;filter:drop-shadow(0 4px 12px rgba(232,67,26,0.55));font-family:system-ui;line-height:1;user-select:none}

        /* Cart page — V4 Premium */
        .cart-header{padding:20px 16px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(243,236,224,0.9);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);z-index:50}
        .cart-header-title{font-weight:900;font-size:1.45rem;letter-spacing:-0.03em;line-height:1}
        .cart-header-count{margin-left:auto;background:var(--card2);border:1px solid var(--border);border-radius:999px;padding:5px 14px;font-size:0.75rem;color:var(--gris-2);font-weight:800;letter-spacing:0.02em}
        .btn-back{background:var(--card2);border:1px solid var(--border);border-radius:12px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.15rem;color:var(--texto);transition:all 0.15s}
        .btn-back:active{transform:scale(0.92);background:var(--border)}
        .cart-rest-label{font-weight:900;font-size:0.72rem;color:var(--acc);padding:14px 2px 8px;letter-spacing:0.08em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
        .cart-rest-label::after{content:'';flex:1;height:1px;background:var(--border)}
        .cart-item{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px;display:flex;gap:12px;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.05);transition:border-color 0.2s}
        .cart-item-emoji{width:96px;height:96px;border-radius:14px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:2.6rem;flex-shrink:0;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);overflow:hidden}
        .cart-summary-box{background:linear-gradient(180deg,var(--card) 0%,var(--card2) 100%);border:1px solid var(--border);border-radius:20px;padding:18px 18px 20px;margin:12px 0 16px;box-shadow:0 4px 18px rgba(0,0,0,0.07)}
        .cart-summary-title{font-weight:900;font-size:0.72rem;color:var(--gris-2);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
        .cart-summary-title::after{content:'';flex:1;height:1px;background:var(--border)}
        .cart-row{display:flex;justify-content:space-between;padding:8px 0;font-size:0.9rem;align-items:center}
        .cart-row+.cart-row{border-top:1px dashed var(--border)}
        .cart-row-label{color:var(--gris-2);font-weight:600}
        .cart-row-val{font-weight:800;font-variant-numeric:tabular-nums}
        .cart-total-row{display:flex;justify-content:space-between;align-items:baseline;padding-top:16px;margin-top:10px;border-top:1.5px solid var(--border)}
        .promo-envio-badge{font-size:0.62rem;font-weight:900;background:var(--cta-soft);color:var(--cta-hover);border:1px solid rgba(217,58,11,0.30);border-radius:6px;padding:2px 6px;letter-spacing:0.01em;vertical-align:middle;white-space:nowrap}
        .promo-nudge{display:flex;justify-content:center;align-items:center;gap:5px;color:var(--acc);font-weight:800;font-size:0.82rem;background:var(--acc-soft);border-radius:10px;padding:9px 12px;margin:6px 0 2px}
        .cart-total-label{font-weight:900;font-size:1rem;letter-spacing:-0.01em}
        .cart-total-val{font-weight:900;font-size:1.55rem;color:var(--texto);letter-spacing:-0.02em;font-variant-numeric:tabular-nums;line-height:1}

        /* Modal */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
        .modal-overlay.visible{opacity:1;pointer-events:auto}
        .modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:430px;transform:translateY(100%);transition:transform 0.3s ease;position:relative}
        /* FIX #5: Botón X visible en todos los modales */
        .modal-close{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:var(--card2);border:1px solid var(--border);color:var(--texto);font-size:1.1rem;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;z-index:2;transition:all 0.15s}
        .modal-close:active{transform:scale(0.9);background:var(--border)}
        .modal-overlay.visible .modal{transform:translateY(0)}
        .modal-title{font-size:1.15rem;font-weight:900;margin-bottom:6px}
        .modal-text{font-size:0.85rem;color:var(--gris);margin-bottom:20px;line-height:1.5}
        .modal-items{background:var(--card2);border-radius:12px;padding:12px 14px;margin-bottom:20px;max-height:200px;overflow-y:auto}
        .modal-rest-label{font-weight:800;font-size:0.78rem;color:var(--acc);padding:6px 0 2px}
        .modal-item{display:flex;justify-content:space-between;padding:6px 0;font-size:0.82rem}
        .modal-item+.modal-item{border-top:1px solid var(--border)}
        .modal-item-name{font-weight:600}
        .modal-item-price{font-weight:800;color:var(--texto)}
        .modal-total{display:flex;justify-content:space-between;padding:10px 0 0;border-top:2px solid var(--border);font-weight:900;font-size:0.92rem;margin-top:4px}

        /* States */
        .state-container{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:20px}
        .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .state-title{font-size:1.1rem;font-weight:800;margin-bottom:8px}
        .state-text{font-size:0.88rem;color:var(--gris)}
        .empty-icon{font-size:3rem;margin-bottom:16px}

        /* Preview chips */
        .preview-chips{display:flex;gap:6px;margin-top:10px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
        .preview-chips::-webkit-scrollbar{display:none}
        .preview-chip{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:5px 12px;font-size:0.7rem;font-weight:700;color:var(--gris);white-space:nowrap;flex-shrink:0}
        .preview-chip-price{color:#FF7A00;font-weight:700;margin-left:4px}
        .preview-chip-more{font-weight:800;color:var(--acc)}

        /* Rest detail header — V4.2 Premium: hero estilo "Cocina de la Mama" con foto + card flotante */
        .rest-detail-header{position:relative;padding:0 0 18px;border-bottom:1px solid var(--border);overflow:hidden;isolation:isolate}
        .rest-detail-header::after{content:'';position:absolute;left:0;right:0;bottom:0;height:35%;background:linear-gradient(180deg,transparent 0%,var(--bg) 100%);pointer-events:none;z-index:0}
        /* Zona de foto del local (cabecera). Si no hay imagen real, usa un gradient con el color del restaurante. */
        .rest-detail-photo{position:relative;height:180px;background-color:var(--card2);background-size:cover;background-position:center;background-repeat:no-repeat;overflow:hidden}
        .rest-detail-photo::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 30%,var(--rest-color,rgba(232,67,26,0.2)) 0%,transparent 55%),radial-gradient(ellipse at 80% 60%,rgba(232,67,26,0.10) 0%,transparent 55%);pointer-events:none;mix-blend-mode:screen}
        .rest-detail-photo::after{content:'';position:absolute;left:0;right:0;bottom:0;height:60%;background:linear-gradient(180deg,transparent 0%,rgba(243,236,224,0.85) 80%,var(--bg) 100%);pointer-events:none}
        .rest-detail-photo-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:5rem;opacity:0.18;filter:blur(0.5px) drop-shadow(0 6px 20px rgba(0,0,0,0.4))}
        .rest-detail-nav{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 0;position:absolute;top:0;left:0;right:0;z-index:3}
        .rest-detail-nav .btn-back,.rest-detail-nav .btn-cart{background:rgba(20,20,24,0.78);backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);border:1px solid rgba(255,255,255,0.08);box-shadow:0 4px 14px rgba(0,0,0,0.45)}
        /* Card flotante con la info del local */
        .rest-detail-card{position:relative;z-index:2;margin:-46px 14px 0;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:0 14px 36px rgba(0,0,0,0.12)}
        .rest-detail-info{display:flex;gap:14px;align-items:center}
        .rest-detail-avatar{width:62px;height:62px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;box-shadow:0 6px 16px rgba(0,0,0,0.16);position:relative;overflow:hidden;background-clip:padding-box}
        .rest-detail-avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;background:var(--card2)}
        .rest-detail-name{font-weight:900;font-size:1.26rem;line-height:1.15;letter-spacing:-0.025em;color:var(--texto)}
        .rest-meta{display:flex;gap:8px;margin-top:5px;font-size:0.74rem;flex-wrap:wrap;align-items:center}
        .rest-meta span{color:var(--gris-2);display:inline-flex;align-items:center;gap:3px;font-weight:600;letter-spacing:-0.01em}
        /* Pills de "Rapido 25min" / "Envio gratis" */
        .rest-pills{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
        .rest-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(31,157,85,0.12);color:var(--green);font-size:0.72rem;font-weight:800;padding:5px 11px;border-radius:999px;letter-spacing:-0.01em;border:1px solid rgba(31,157,85,0.28)}
        .rest-pill.is-rating{background:rgba(232,67,26,0.1);color:var(--acc);border-color:rgba(232,67,26,0.22)}
        .rest-pill.is-neutral{background:var(--card2);color:var(--gris-2);border-color:var(--border)}

        .app-footer{text-align:center;padding:20px 20px 80px;font-size:0.7rem;color:var(--gris)}
        body.has-cart{padding-bottom:80px}

        /* Badge abierto/cerrado — CAMBIO 4 */
        .badge-open{font-size:0.6rem;font-weight:600;padding:2px 8px;border-radius:20px;background:rgba(31,157,85,0.16);color:var(--green);margin-left:6px;vertical-align:middle}
        .badge-closed{font-size:0.6rem;font-weight:600;padding:2px 8px;border-radius:20px;background:rgba(255,59,48,0.18);color:#FF3B30;margin-left:6px;vertical-align:middle}
        /* Toast de aviso (local cerrado) — 2026-06-19 */
        .dewan-toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(18px);max-width:90%;background:#1f1a17;color:#fff;padding:12px 18px;border-radius:14px;font-size:0.9rem;line-height:1.32;text-align:center;box-shadow:0 12px 34px rgba(0,0,0,0.34);opacity:0;pointer-events:none;z-index:9999;transition:opacity .22s ease,transform .22s ease}
        .dewan-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

        /* Cart nota input — V4: más grande y legible */
        .cart-nota-wrap{width:100%;display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
        .cart-nota-icon{font-size:0.95rem;flex-shrink:0;opacity:0.7}
        .cart-nota-input{flex:1;background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;font-size:0.88rem;color:var(--texto);font-family:inherit;outline:none;transition:all 0.2s;font-weight:600}
        .cart-nota-input::placeholder{color:var(--gris-2);font-size:0.82rem;font-weight:500}
        .cart-nota-input:focus{border-color:var(--acc);background:rgba(232,67,26,0.04);box-shadow:0 0 0 3px rgba(232,67,26,0.08)}

        /* Checkout inline (dentro del carrito) */
        .checkout-gps-box{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px;text-align:center}
        .checkout-gps-ok{color:var(--green);font-weight:800;font-size:0.88rem}
        .checkout-gps-searching{color:var(--acc);font-size:0.82rem}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
        .checkout-gps-searching{animation:pulse 1.5s ease-in-out infinite}
        .btn-wa{background:linear-gradient(180deg,var(--cta) 0%,#B5320A 100%);color:white;font-size:1.08rem;font-weight:900;padding:18px 22px;border-radius:18px;box-shadow:0 8px 28px rgba(217,58,11,0.42),inset 0 1px 0 rgba(255,255,255,0.2);max-width:100%;letter-spacing:-0.01em;border:none;transition:all 0.2s;font-family:inherit;cursor:pointer;width:100%}
        .btn-wa:active{transform:scale(0.98)}
        .btn-wa:hover{filter:brightness(1.05)}
        .cta-helper{text-align:center;font-size:0.8rem;color:var(--gris-2);margin:8px 0 12px;line-height:1.45;padding:0 8px;font-weight:600}

        /* FIX #4: Pantalla de éxito */
        .success-screen{padding:40px 20px 32px;text-align:center;max-width:420px;margin:0 auto}
        .success-icon-wrap{position:relative;width:120px;height:120px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center}
        .success-icon-wrap::before{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,rgba(37,211,102,0.25) 0%,transparent 70%);animation:succ-pulse 2s ease-out infinite}
        @keyframes succ-pulse{0%{transform:scale(0.9);opacity:0.8}100%{transform:scale(1.4);opacity:0}}
        .success-icon{width:90px;height:90px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:2.6rem;box-shadow:0 10px 40px rgba(37,211,102,0.4);position:relative;z-index:1}
        .success-title{font-size:1.6rem;font-weight:900;margin-bottom:10px;color:var(--texto)}
        .success-text{font-size:0.9rem;color:var(--gris);line-height:1.5;margin-bottom:22px}
        .success-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 18px;margin-bottom:24px;text-align:left}
        .success-row{display:flex;justify-content:space-between;align-items:center;font-size:0.9rem;padding:6px 0;color:var(--texto);font-weight:700}
        .success-row span:first-child{color:var(--gris);font-weight:600}
        .success-hint{font-size:0.78rem;color:var(--gris);margin-bottom:8px}
        .btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--texto);border-radius:14px;padding:13px 20px;font-weight:800;font-size:0.9rem;cursor:pointer;font-family:inherit;width:100%;margin-top:12px;transition:all 0.2s}
        .btn-ghost:active{transform:scale(0.97);background:var(--card2)}
        .checkout-nota{font-size:0.72rem;color:var(--gris);padding:2px 0 0 16px}

        /* Location section in cart — V4 */
        .loc-section{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:18px 16px;margin:10px 0 14px}
        .loc-title{font-weight:900;font-size:1rem;margin-bottom:14px;display:flex;align-items:center;gap:8px;letter-spacing:-0.01em}
        .btn-gps-main{background:var(--cta);color:#fff;border:none;border-radius:14px;padding:16px 20px;font-weight:900;font-size:1rem;cursor:pointer;font-family:inherit;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;box-shadow:0 8px 22px rgba(232,67,26,0.30),inset 0 1px 0 rgba(255,255,255,0.18);letter-spacing:-0.01em}
        .btn-gps-main:active{transform:scale(0.97)}
        .btn-gps-main:disabled{opacity:0.5;cursor:not-allowed}
        .loc-toggle{background:none;border:none;color:var(--acc);font-size:0.75rem;font-weight:700;cursor:pointer;font-family:inherit;padding:10px 0 0;display:block;text-align:center;width:100%;opacity:0.8;transition:opacity 0.2s}
        .loc-toggle:hover{opacity:1}
        .loc-addr-wrap{margin-top:10px;display:block}
        .loc-or{display:flex;align-items:center;gap:12px;font-size:0.72rem;color:var(--gris-2);font-weight:800;letter-spacing:0.14em;text-transform:uppercase;margin:16px 0 12px;white-space:nowrap}
        .loc-or::before,.loc-or::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border) 50%,transparent)}
        .loc-addr-label{font-size:0.82rem;color:var(--texto);font-weight:800;margin-bottom:8px;letter-spacing:-0.01em}
        .loc-addr-input{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;font-size:0.95rem;color:var(--texto);font-family:inherit;outline:none;transition:all 0.2s;font-weight:600}
        .loc-addr-input::placeholder{color:var(--gris-2);font-size:0.88rem;font-weight:500}
        .loc-addr-input:focus{border-color:var(--acc);background:rgba(232,67,26,0.04);box-shadow:0 0 0 3px rgba(232,67,26,0.1)}
        .loc-gps-ok{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(31,157,85,0.1);border:1px solid rgba(31,157,85,0.28);border-radius:12px;margin-bottom:10px}
        .loc-gps-ok span{color:var(--green);font-weight:800;font-size:0.85rem}
        .loc-ref-label{font-size:0.75rem;color:var(--gris);font-weight:700;margin-bottom:6px}

        /* Almuerzo selector modal */
        .almuerzo-modal{max-height:85vh;overflow-y:auto;overscroll-behavior:contain;padding-bottom:env(safe-area-inset-bottom,20px)}
        .almuerzo-header{text-align:center;margin-bottom:18px}
        .almuerzo-header-icon{font-size:2.2rem;margin-bottom:6px}
        .almuerzo-header-title{font-size:1.15rem;font-weight:900}
        .almuerzo-header-rest{font-size:0.8rem;color:var(--gris);margin-top:2px}
        .almuerzo-header-price{font-size:1.3rem;font-weight:900;color:var(--texto);margin-top:6px}
        .almuerzo-cat{margin-bottom:14px}
        .almuerzo-cat-title{font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--gris);margin-bottom:8px;display:flex;align-items:center;gap:6px}
        .almuerzo-cat-badge{font-size:0.6rem;font-weight:800;padding:2px 8px;border-radius:20px}
        .almuerzo-cat-badge.elige{background:rgba(217,58,11,0.2);color:#FF6B35}
        .almuerzo-cat-badge.incluido{background:rgba(37,211,102,0.15);color:var(--green)}
        .almuerzo-opt{background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:border-color 0.2s}
        .almuerzo-opt.selected{border-color:var(--acc);background:rgba(232,67,26,0.06)}
        .almuerzo-opt.single{cursor:default;border-color:var(--green);background:rgba(37,211,102,0.06)}
        .almuerzo-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
        .almuerzo-opt.selected .almuerzo-radio{border-color:var(--acc);background:var(--acc)}
        .almuerzo-opt.selected .almuerzo-radio::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--texto)}
        .almuerzo-opt.single .almuerzo-radio{border-color:var(--green);background:var(--green)}
        .almuerzo-opt.single .almuerzo-radio::after{content:'✓';font-size:0.7rem;color:white;font-weight:900}
        .almuerzo-opt-name{font-weight:700;font-size:0.88rem}
        .btn-almuerzo-add{background:var(--cta);color:#fff;border:none;border-radius:14px;padding:14px 20px;font-weight:900;font-size:0.95rem;cursor:pointer;font-family:inherit;width:100%;margin-top:12px;transition:opacity 0.2s}
        .btn-almuerzo-add:disabled{opacity:0.4;cursor:not-allowed}
        .almuerzo-choices{font-size:0.72rem;color:var(--gris);line-height:1.6;margin-top:4px}
        .almuerzo-remove{background:var(--card2);border:1px solid var(--border);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;color:var(--texto);flex-shrink:0;transition:all 0.15s}
        .almuerzo-remove:active{transform:scale(0.9);background:rgba(229,62,62,0.2);border-color:#e53e3e;color:#e53e3e}

        /* ═══════════════════════════════════════════════
           V2: HOME PREMIUM (saludo + search hero + chips)
           ═══════════════════════════════════════════════ */
        .home-v2-brand{display:flex;align-items:center;margin-bottom:7px}
        .app-logo{display:block;height:22px;aspect-ratio:380 / 213;background:var(--logo) left center/contain no-repeat}
        .home-v2-top{padding:12px 16px 8px;background:transparent}
        .home-v2-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
        .home-v2-loc{font-size:0.72rem;color:var(--gris);font-weight:700;display:flex;align-items:center;gap:4px;margin-bottom:3px;letter-spacing:0.01em}
        .home-v2-greeting{font-size:1.12rem;font-weight:900;letter-spacing:-0.03em;line-height:1.2;color:var(--texto)}
        .home-v2-greeting-sub{font-size:0.78rem;color:var(--gris-2);font-weight:600;margin-top:3px;letter-spacing:-0.01em}

        /* Search hero (tap-through) */
        .search-hero{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color 0.2s,transform 0.15s,box-shadow 0.2s;font-family:inherit;outline:none}
        .search-hero:active{transform:scale(0.985);border-color:var(--acc);box-shadow:0 0 0 3px rgba(232,67,26,0.08)}
        .search-hero-icon{font-size:1.1rem;color:var(--gris-2)}
        .search-hero-text{color:var(--gris-2);font-size:0.95rem;font-weight:600;flex:1;text-align:left;letter-spacing:-0.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .search-hero-tag{background:var(--acc);color:#111;font-size:0.58rem;font-weight:900;padding:3px 7px;border-radius:20px;letter-spacing:0.05em;flex-shrink:0}

        /* Category chips row */
        .cat-chips-wrap{padding:14px 0 6px}
        /* 1 sola fila con scroll horizontal — más bajo, deja ver la comida arriba */
        .cat-chips-scroll{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:0 14px 4px;-webkit-overflow-scrolling:touch}
        .cat-chips-scroll::-webkit-scrollbar{display:none}
        .cat-chip{padding:11px 11px;background:var(--card);border:1.5px solid var(--border);border-radius:14px;color:var(--texto);font-size:0.78rem;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s;letter-spacing:-0.01em}
        .cat-chip:active{transform:scale(0.96)}
        .cat-chip.active{background:var(--acc);color:#111;border-color:var(--acc);box-shadow:0 2px 10px rgba(232,67,26,0.25)}
        .cat-chip-icon{font-size:1.05rem}

        /* Active filter banner */
        .filter-banner-v2{margin:4px 14px 10px;padding:10px 14px;background:var(--acc-soft);border:1px solid rgba(232,67,26,0.22);border-radius:12px;display:flex;align-items:center;gap:10px;font-size:0.82rem;font-weight:800;color:var(--acc);letter-spacing:-0.01em}
        .filter-banner-v2 button{background:none;border:none;color:var(--acc);font-size:1.15rem;font-weight:900;cursor:pointer;font-family:inherit;margin-left:auto;padding:0 4px;opacity:0.7;transition:opacity 0.15s}
        .filter-banner-v2 button:hover{opacity:1}

        /* ═══════════════════════════════════════════════
           V2: SEARCH SCREEN
           ═══════════════════════════════════════════════ */
        .search-header-v2{position:sticky;top:0;z-index:50;background:var(--bg);padding:14px var(--pad-x) 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
        .search-header-v2 .btn-back{flex-shrink:0}
        .search-input-wrap{flex:1;display:flex;align-items:center;gap:8px;background:var(--card);border:1.5px solid var(--acc);border-radius:14px;padding:10px 12px;transition:border-color 0.2s}
        .search-input-wrap-icon{font-size:0.98rem;color:var(--gris-2);flex-shrink:0}
        .search-input{flex:1;background:transparent;border:none;outline:none;color:var(--texto);font-size:0.95rem;font-weight:700;font-family:inherit;letter-spacing:-0.01em;min-width:0}
        .search-input::placeholder{color:var(--gris);font-weight:600}
        .search-clear{background:var(--card2);border:none;width:22px;height:22px;border-radius:50%;color:var(--texto);font-size:0.72rem;font-weight:700;cursor:pointer;font-family:inherit;align-items:center;justify-content:center;display:none;flex-shrink:0}
        .search-clear.visible{display:flex}
        .search-clear:active{background:var(--border)}

        /* Search section titles */
        .search-section-title-v2{font-size:0.72rem;font-weight:900;color:var(--gris);text-transform:uppercase;letter-spacing:0.14em;padding:18px 16px 10px;display:flex;align-items:center;gap:8px}
        .search-section-title-v2::after{content:'';flex:1;height:1px;background:var(--border);opacity:0.4}
        .search-section-count{background:var(--card2);color:var(--gris-2);padding:2px 7px;border-radius:20px;font-size:0.6rem;letter-spacing:0.04em;order:10}

        /* Chips (recent, suggest) */
        .chip-row{display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 8px}
        .chip-btn{background:var(--card);border:1px solid var(--border);border-radius:100px;padding:11px 13px;font-size:0.78rem;font-weight:700;color:var(--texto);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s;letter-spacing:-0.01em}
        .chip-btn:active{transform:scale(0.96)}
        .chip-btn:hover{border-color:var(--acc);color:var(--acc)}
        .chip-btn-icon{font-size:0.9rem;opacity:0.75}
        .chip-btn-rm{background:none;border:none;color:var(--gris);font-size:0.85rem;opacity:0.55;margin:-2px -4px -2px 2px;padding:0 4px;cursor:pointer;font-family:inherit}
        .chip-btn-rm:hover{opacity:1}

        /* Plate search result card */
        .plate-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin:0 14px 8px;padding:11px 14px 11px 12px;cursor:pointer;display:flex;gap:11px;align-items:center;transition:transform 0.15s,border-color 0.2s}
        .plate-card:active{transform:scale(0.985)}
        .plate-emoji{width:42px;height:42px;border-radius:12px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
        .plate-info{flex:1;min-width:0}
        .plate-name{font-weight:800;font-size:0.9rem;line-height:1.2;letter-spacing:-0.01em;color:var(--texto);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .plate-rest{font-size:0.72rem;color:var(--gris-2);font-weight:600;margin-top:2px;display:flex;align-items:center;gap:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .plate-price{font-weight:800;font-size:0.98rem;color:var(--texto);letter-spacing:-0.01em;flex-shrink:0}

        /* Empty state */
        .search-empty-state-v2{text-align:center;padding:48px 20px 20px}
        .search-empty-icon{font-size:2.8rem;margin-bottom:12px;opacity:0.55}
        .search-empty-title{font-size:1rem;font-weight:800;margin-bottom:6px;letter-spacing:-0.01em}
        .search-empty-text{font-size:0.85rem;color:var(--gris);line-height:1.5;max-width:280px;margin:0 auto}

        /* Skeleton loaders */
        @keyframes skel-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .skel-row{background:linear-gradient(90deg,var(--card) 0%,var(--card2) 50%,var(--card) 100%);background-size:200% 100%;border:1px solid var(--border);border-radius:16px;height:84px;margin:0 14px 9px;animation:skel-shimmer 1.6s ease-in-out infinite}
        .skel-carrusel-row{display:flex;gap:10px;overflow:hidden;padding:0 14px}
        .skel-carrusel-card{flex-shrink:0;width:146px;height:180px;background:linear-gradient(90deg,var(--card) 0%,var(--card2) 50%,var(--card) 100%);background-size:200% 100%;border:1px solid var(--border);border-radius:18px;animation:skel-shimmer 1.6s ease-in-out infinite}

        /* GPS enforcement modal (strict) */
        .gps-strict{padding:32px 24px 24px;text-align:center}
        .gps-strict-icon{font-size:3.2rem;margin-bottom:14px;display:inline-block}
        .gps-strict-title{font-size:1.25rem;font-weight:900;letter-spacing:-0.02em;margin-bottom:8px}
        .gps-strict-text{font-size:0.9rem;color:var(--gris-2);line-height:1.5;margin-bottom:22px;max-width:320px;margin-left:auto;margin-right:auto}
        .gps-strict-actions{display:flex;flex-direction:column;gap:10px}

        /* V2.1: Badge cuenta de platos por restaurante en búsqueda/categoría */
        .rest-compact-meta .badge-count{background:var(--acc-soft);color:var(--acc);font-weight:900;padding:2px 8px;border-radius:20px;letter-spacing:0.02em}

        /* V4.2: Banner premium de "falta ubicacion" en checkout */
        .loc-missing-banner{margin:14px 0 12px;padding:14px 16px;background:linear-gradient(135deg,rgba(255,179,0,0.12) 0%,rgba(255,179,0,0.04) 100%);border:1.5px solid rgba(255,179,0,0.32);border-radius:16px;display:flex;align-items:flex-start;gap:12px;position:relative;overflow:hidden}
        .loc-missing-banner::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#FFB800,#FF8800)}
        .loc-missing-icon{font-size:1.4rem;flex-shrink:0;margin-top:-1px;animation:loc-icon-pulse 2.4s ease-in-out infinite}
        @keyframes loc-icon-pulse{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-2px) rotate(-5deg)}75%{transform:translateY(-2px) rotate(5deg)}}
        .loc-missing-content{flex:1;min-width:0}
        .loc-missing-title{font-weight:900;font-size:0.92rem;color:#FFB800;margin-bottom:3px;letter-spacing:-0.01em}
        .loc-missing-text{font-size:0.78rem;color:var(--gris-2);line-height:1.45;font-weight:600}
        @keyframes loc-hint-pulse{0%{box-shadow:0 0 0 0 rgba(232,67,26,0.7),0 0 0 0 rgba(232,67,26,0)}70%{box-shadow:0 0 0 10px rgba(232,67,26,0),0 0 30px rgba(232,67,26,0.2)}100%{box-shadow:0 0 0 0 rgba(232,67,26,0)}}
        .loc-addr-input.pulse-hint,.btn-gps-main.pulse-hint{animation:loc-hint-pulse 1.6s ease-out 3;border-color:var(--acc)!important}
        .loc-section.pulse-hint{animation:loc-hint-pulse 1.6s ease-out 3;border-color:var(--acc)!important}

        /* V4.6: Selector de método de pago — Efectivo / Transferencia */
        .pay-section{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:16px;margin:10px 0 14px}
        .pay-title{font-weight:900;font-size:1rem;margin-bottom:14px;display:flex;align-items:center;gap:8px;letter-spacing:-0.01em}
        .pay-options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .pay-btn{background:var(--card2);border:1.5px solid var(--border);border-radius:14px;padding:14px 12px;font-family:inherit;font-weight:800;font-size:0.88rem;cursor:pointer;color:var(--gris-2);display:flex;flex-direction:column;align-items:center;gap:6px;transition:all 0.2s;letter-spacing:-0.01em}
        .pay-btn:active{transform:scale(0.97)}
        .pay-btn-icon{font-size:1.5rem;line-height:1}
        .pay-btn.is-active{background:var(--acc-soft);border-color:var(--acc);color:var(--texto);box-shadow:0 0 0 3px rgba(232,67,26,0.08),inset 0 1px 0 rgba(255,255,255,0.05)}
        .pay-btn.is-active .pay-btn-icon{filter:drop-shadow(0 2px 6px rgba(232,67,26,0.4))}
        .pay-transfer-note{display:none;align-items:flex-start;gap:10px;margin-top:14px;padding:12px 14px;background:var(--card2);border:1.5px solid rgba(232,67,26,0.28);border-radius:14px;position:relative;overflow:hidden;animation:pay-note-in 0.3s ease-out}
        .pay-transfer-note::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--acc),#E0951A)}
        @keyframes pay-note-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
        .pay-transfer-note-icon{font-size:1.2rem;flex-shrink:0;margin-top:1px}
        .pay-transfer-note-text{font-size:0.8rem;color:var(--texto);line-height:1.45;font-weight:600;letter-spacing:-0.01em}
        .pay-transfer-note-text strong{color:var(--acc);font-weight:900}

        /* CTA "agrega tu ubicacion" — V4.2 premium (deshabilitado pero invitando) */
        .btn-wa-need-loc{background:linear-gradient(180deg,var(--cta) 0%,#B5320A 100%)!important;color:#fff!important;border:none!important;box-shadow:0 6px 22px rgba(217,58,11,0.32)!important;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;flex-direction:column;padding:15px 18px!important;font-size:0.82rem!important;line-height:1.35;font-weight:700!important;letter-spacing:-0.01em;text-transform:none}
        .btn-wa-need-loc-primary{font-size:0.95rem;font-weight:900;color:#fff;display:flex;align-items:center;gap:8px;letter-spacing:-0.02em}
        .btn-wa-need-loc-primary span:first-child{font-size:1.05rem;animation:loc-icon-pulse 2.4s ease-in-out infinite}
        .btn-wa-need-loc-hint{font-size:0.7rem;color:rgba(255,255,255,0.88);font-weight:600;letter-spacing:0.02em}
        .btn-wa-need-loc:active{transform:none}

        /* V2.1: Banner de filtro activo dentro del menú del restaurante */
        .rest-filter-banner{margin:10px 14px 4px;padding:10px 14px;background:var(--acc-soft);border:1px solid rgba(232,67,26,0.22);border-radius:12px;display:flex;align-items:center;gap:10px;font-size:0.78rem;font-weight:700;color:var(--acc);letter-spacing:-0.01em}

        /* V3.0: Grilla 3 columnas (home default) — con soporte de imagen/logo */
        .grid3-wrap{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--gap-card);padding:8px var(--pad-x) 10px}
        .grid3-wrap.solo{grid-template-columns:1fr}
        .grid3-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform 0.15s,border-color 0.2s;display:flex;flex-direction:column;position:relative}
        .grid3-card:active{transform:scale(0.95)}
        .grid3-top{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:2rem;position:relative;overflow:hidden}
        .grid3-emoji{position:relative;z-index:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
        /* Monograma de marca para locales SIN foto (inicial grande + emoji de categoría chico) — reemplaza el emoji plano */
        .grid3-mono{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:2.6rem;color:rgba(0,0,0,0.9);z-index:1;letter-spacing:-0.02em;text-shadow:0 1px 2px rgba(255,255,255,0.45)}
        .grid3-mono-cat{position:absolute;bottom:6px;right:8px;font-size:1.05rem;opacity:0.55;z-index:1}
        .grid3-sello{position:absolute;top:8px;right:8px;z-index:3;background:#ff3b30;color:#fff;font-size:0.72rem;font-weight:900;padding:4px 9px;border-radius:999px;box-shadow:0 3px 9px rgba(255,59,48,0.5);letter-spacing:-0.02em}
        .grid3-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;background:var(--card2)}
        .grid3-body{padding:7px 9px 9px;min-height:44px}
        .grid3-name{font-weight:800;font-size:0.84rem;line-height:1.2;color:var(--texto);letter-spacing:-0.01em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.4em}
        .grid3-meta{font-size:0.64rem;color:var(--gris-2);font-weight:700;margin-top:3px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;line-height:1.2}
        .grid3-badge-count{background:var(--acc-soft);color:var(--acc);font-size:0.56rem;font-weight:900;padding:1px 6px;border-radius:20px;letter-spacing:0.02em}
        /* Línea "qué vende" (categoría) + claim de aliado */
        .grid3-cat{display:flex;align-items:center;gap:5px;margin-top:2px;min-width:0}
        .grid3-cat-name{font-size:0.66rem;color:var(--acc);font-weight:800;text-transform:capitalize;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:0 1 auto}
        .grid3-suc{font-size:0.61rem;color:#6b7280;font-weight:800;margin-top:1px;line-height:1.18;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .grid3-pl{font-size:0.6rem;color:var(--green);font-weight:800;white-space:nowrap;flex:0 0 auto;display:flex;align-items:center;gap:2px}
        .grid3-aliado-perks{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:2px}
        .grid3-envio1{font-size:0.58rem;color:var(--cta-hover);font-weight:900;background:var(--cta-soft);border:1px solid rgba(217,58,11,0.30);border-radius:6px;padding:1px 5px;white-space:nowrap}
        /* Banner de la sección de aliados destacados (categoría/búsqueda) */
        .aliados-banner{margin:0 14px 10px;padding:8px 12px;background:linear-gradient(135deg,rgba(34,197,94,0.14),rgba(232,67,26,0.10));border:1px solid rgba(34,197,94,0.30);border-radius:12px;font-size:0.72rem;font-weight:800;color:var(--green);display:flex;align-items:center;gap:6px;line-height:1.3}
        .almuerzo-day-banner{margin:0 14px 10px;padding:8px 12px;background:var(--card2);border:1px solid rgba(232,67,26,0.35);border-radius:12px;font-size:0.72rem;font-weight:800;color:var(--acc);display:flex;align-items:center;gap:6px;line-height:1.3}
        /* [25-jun] cupones Bienvenida/Vuelve removidos (.promo-chip era el chip del cupón) */
        /* Pills de valor en la cabecera del restaurante */
        .rest-pill-aliado{background:rgba(34,197,94,0.14)!important;border-color:rgba(34,197,94,0.35)!important;color:var(--green)!important;font-weight:800}
        .rest-pill-envio1{background:var(--cta-soft)!important;border-color:rgba(217,58,11,0.30)!important;color:var(--cta-hover)!important;font-weight:800}
        /* Gancho de retorno en la pantalla de éxito */
        .success-return{margin:14px auto 0;max-width:320px;padding:10px 14px;background:rgba(34,197,94,0.10);border:1px solid rgba(34,197,94,0.25);border-radius:12px;font-size:0.82rem;font-weight:700;color:var(--green);line-height:1.35}
        /* Modal de alas con salsas */
        .wings-counter{margin:4px 0 12px;padding:9px 12px;background:var(--cta-soft);border:1px solid rgba(217,58,11,0.30);border-radius:10px;font-size:0.82rem;font-weight:800;color:var(--cta-hover);text-align:center}
        .wings-list{display:flex;flex-direction:column;gap:8px;max-height:46vh;overflow-y:auto}
        .wings-row{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:10px 12px}
        .wings-salsa-name{font-weight:800;font-size:0.9rem;color:var(--texto)}
        .wings-stepper{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:100px;padding:2px;flex-shrink:0}
        .wings-salsa-count{min-width:18px;text-align:center;font-weight:900;font-size:0.95rem;color:var(--acc)}
        /* "Precio del local" — claim verde discreto bajo el nombre del aliado */
        .grid3-precio-local{font-size:0.62rem;color:var(--green);font-weight:800;margin-top:3px;letter-spacing:0.01em;display:flex;align-items:center;gap:2px}
        /* Sección destacada de aliados en home */
        .destacados-section{margin:6px 0 12px}
        .destacados-title{padding:0 14px 8px;font-size:0.78rem;font-weight:900;color:var(--texto);letter-spacing:-0.01em;display:flex;align-items:center;gap:6px}
        .destacados-title-acc{color:var(--green)}
        .destacados-scroll{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding:0 14px 6px;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
        .destacados-scroll::-webkit-scrollbar{display:none}
        .destacados-card{flex:0 0 130px;scroll-snap-align:start;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform 0.15s,border-color 0.2s;position:relative}
        .destacados-card:active{transform:scale(0.97)}
        .destacados-card .grid3-top{aspect-ratio:1/1}
        .destacados-card .grid3-body{padding:7px 9px 9px}
        .destacados-card .grid3-name{font-weight:800;font-size:0.72rem;line-height:1.15;color:var(--texto);letter-spacing:-0.01em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:1.65em}
        /* Banner Mundial 2026 — Ecuador colores */
        .mundial-banner{position:relative;margin:0 14px 12px;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,#FFD60A 0%,#FFD60A 40%,#003893 65%,#FF0000 100%);padding:14px 44px 14px 16px;color:#fff;box-shadow:0 4px 14px rgba(0,0,0,0.25);cursor:pointer}
        .mundial-banner:active{transform:scale(0.99)}
        .mundial-banner-title{font-size:0.92rem;font-weight:900;line-height:1.2;letter-spacing:-0.01em;text-shadow:0 2px 6px rgba(0,0,0,0.4)}
        .mundial-banner-sub{font-size:0.72rem;font-weight:700;color:#fff;margin-top:3px;opacity:0.95;text-shadow:0 1px 3px rgba(0,0,0,0.4)}
        .mundial-banner-x{position:absolute;top:7px;right:7px;width:24px;height:24px;background:rgba(0,0,0,0.35);border:none;border-radius:50%;color:#fff;font-size:0.85rem;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;font-family:inherit}
        .mundial-banner-x:active{background:rgba(0,0,0,0.55)}
        .promo-home-banner{display:flex;align-items:center;gap:12px;margin:0 14px 12px;border-radius:16px;background:var(--acc-soft);padding:13px 16px;color:#1A1300;box-shadow:0 4px 14px rgba(232,67,26,0.28)}
        .promo-home-banner-emoji{font-size:1.7rem;flex-shrink:0;line-height:1}
        .promo-home-banner-title{font-size:1rem;font-weight:900;letter-spacing:-0.01em;line-height:1.15;color:#1A1300}
        .promo-home-banner-sub{font-size:0.74rem;font-weight:800;opacity:0.85;margin-top:2px;line-height:1.2;color:#1c2a0a}
        /* [25-jun] cupones Bienvenida/Vuelve removidos (.cupon-banner / .cart-row-cupon) */
        .precio-tachado{text-decoration:line-through;color:var(--gris);opacity:0.7;font-weight:600;margin-right:4px}
        .cart-row-ahorro{color:var(--green);font-weight:900;background:rgba(34,197,94,0.10);border-radius:8px;padding:8px 10px;margin-top:2px}
        .cart-row-ahorro .cart-row-val{color:var(--green);font-size:1.05rem}
        .cart-row-final{display:flex;justify-content:space-between;align-items:center;padding:14px 14px 10px;margin-top:6px;background:linear-gradient(90deg,rgba(34,197,94,0.18),rgba(34,197,94,0.08));border:2px solid var(--green);border-radius:12px;color:var(--green);font-weight:900;font-size:1.35rem}
        .cart-row-final span:first-child{font-size:0.95rem;text-transform:uppercase;letter-spacing:0.04em}
        .cart-row-final-hint{font-size:0.72rem;color:var(--green);font-weight:700;margin-top:4px;text-align:right;padding-right:4px}
        .cart-total-sub{font-size:0.74rem;color:var(--gris);text-align:right;margin-top:3px;font-weight:600}
        .btn-whatsapp{background:linear-gradient(180deg,#25D366 0%,#1da851 100%);color:#fff;font-size:1.08rem;font-weight:900;padding:18px 22px;border-radius:18px;box-shadow:0 8px 28px rgba(37,211,102,0.4);border:none;font-family:inherit;cursor:pointer;width:100%;display:block;text-align:center;text-decoration:none;letter-spacing:-0.01em}
        .btn-whatsapp:active{transform:scale(0.98)}
        /* [25-jun] cupón VUELVE removido (.vuelve-banner) */
        .price-tachado{text-decoration:line-through;color:#94a3b8;font-weight:600;font-size:0.78rem;margin-right:4px}
        @keyframes mundialPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        .mundial-flag{display:inline-block;animation:mundialPulse 2s ease-in-out infinite;margin-right:4px}
        .grid3-closed{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.65);color:#d9d2c9;font-size:0.52rem;font-weight:800;padding:2px 7px;border-radius:20px;letter-spacing:0.02em;z-index:3;white-space:nowrap;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
        /* Badge Aliado: visible, dorado, esquina sup-izq */
        .aliado-badge{position:absolute;top:6px;left:6px;background:linear-gradient(135deg,#FFD700,#FFA500);color:#1a1a1a;font-size:0.55rem;font-weight:900;padding:2px 7px;border-radius:20px;letter-spacing:0.04em;box-shadow:0 2px 6px rgba(0,0,0,0.3);z-index:3;display:flex;align-items:center;gap:2px}
        /* Tarifa servicio: discreto, neutro, esquina sup-der (sólo si no hay CERRADO) */
        .service-fee-badge{position:absolute;top:5px;right:5px;background:rgba(244,239,231,0.88);color:var(--gris-2);font-size:0.58rem;font-weight:800;padding:4px 9px;border-radius:20px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid var(--border);z-index:5;letter-spacing:0.02em;-webkit-tap-highlight-color:rgba(232,67,26,0.3);user-select:none;min-height:24px;touch-action:manipulation}
        .top-semana-badge{position:absolute;bottom:6px;left:6px;background:linear-gradient(135deg,#FF6B35,#FF3D00);color:#fff;font-size:0.55rem;font-weight:900;padding:3px 8px;border-radius:20px;letter-spacing:0.04em;box-shadow:0 2px 8px rgba(255,61,0,0.45);z-index:4;display:inline-flex;align-items:center;gap:3px;animation:topSemanaPulse 2.4s ease-in-out infinite}
        @keyframes topSemanaPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
        .service-fee-badge:active{background:rgba(232,67,26,0.35);transform:scale(0.96)}
        /* Modal explicación tarifa — clase única para evitar conflicto con .modal-overlay del sistema */
        .sf-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:10000;padding:20px;opacity:1;pointer-events:auto;animation:sfModalFadeIn 0.2s ease-out}
        .sf-modal-card{background:var(--card);border:1px solid var(--border);border-radius:20px;max-width:380px;width:100%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
        .sf-modal-header{padding:16px 18px;display:flex;justify-content:space-between;align-items:center;font-weight:900;font-size:1.02rem;border-bottom:1px solid var(--border)}
        .sf-modal-close{background:transparent;border:none;color:var(--texto);font-size:1.5rem;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:inherit;padding:0;line-height:1}
        .sf-modal-close:active{background:var(--card2)}
        .sf-modal-body{padding:18px}
        .sf-modal-body p{margin:0 0 12px;line-height:1.55;font-size:0.9rem;color:var(--texto)}
        .sf-modal-body p:last-of-type{margin-bottom:18px}
        .sf-modal-ok{width:100%;background:var(--acc);color:#111;border:none;border-radius:14px;padding:13px;font-weight:900;font-size:0.95rem;cursor:pointer;font-family:inherit}
        .sf-modal-ok:active{transform:scale(0.98)}
        @keyframes sfModalFadeIn{from{opacity:0}to{opacity:1}}
        /* Botón "Ver otros restaurantes" — separa visualmente a los no-socios */
        .ver-otros-btn{display:block;width:calc(100% - 28px);margin:18px 14px 6px;padding:14px 18px;background:var(--card);border:1.5px dashed var(--border);border-radius:16px;color:var(--texto);font-family:inherit;cursor:pointer;text-align:center;transition:all 0.2s;letter-spacing:-0.01em}
        /* Tarjeta por sección (híbrida: superficie cálida para que la comida resalte + sombra suave sin borde). El carril "Para ti" (.destacados) queda full-bleed a propósito. */
        .home-card,.destacados-section,#silenciosos-section{background:var(--card2);border:1px solid var(--border);border-radius:18px;margin:0 var(--pad-x) var(--gap-section);padding:10px 6px 8px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
        .home-card>.list-section-title,#silenciosos-section>.list-section-title{padding:6px 8px 8px}
        .home-card>.grid3-wrap,#silenciosos-section>.grid3-wrap{padding:0 4px 2px}
        .home-card .ver-otros-btn,.home-card .ocultar-otros-btn,#silenciosos-section .ver-otros-btn,#silenciosos-section .ocultar-otros-btn{width:calc(100% - 8px);margin:12px 4px 2px}
        .home-card>.aliados-banner,#silenciosos-section>.aliados-banner{margin-left:6px;margin-right:6px}
        .destacados-section .destacados-scroll{padding-left:8px;padding-right:8px}
        .destacados-section .destacados-title{padding-left:6px}
        .ver-otros-btn:active{transform:scale(0.985);border-color:var(--acc)}
        .ver-otros-title{display:block;font-size:0.92rem;font-weight:900;margin-bottom:3px}
        .ver-otros-count{display:inline-block;background:var(--acc);color:#111;font-size:0.72rem;font-weight:900;padding:1px 8px;border-radius:20px;margin-left:5px;vertical-align:middle}
        .ver-otros-hint{display:block;font-size:0.72rem;color:var(--gris);font-weight:600}
        .ocultar-otros-btn{display:block;width:calc(100% - 28px);margin:16px 14px 4px;padding:10px;background:transparent;border:1px solid var(--border);border-radius:14px;color:var(--gris);font-family:inherit;font-size:0.78rem;font-weight:800;cursor:pointer}
        .ocultar-otros-btn:active{background:var(--card2)}
        .rest-filter-banner-text{flex:1;line-height:1.35}
        .rest-filter-banner-text strong{color:var(--acc);font-weight:900}
        .rest-filter-banner button{background:rgba(232,67,26,0.15);border:1px solid rgba(232,67,26,0.3);color:var(--acc);font-size:0.7rem;font-weight:800;padding:6px 11px;border-radius:100px;cursor:pointer;font-family:inherit;flex-shrink:0;transition:all 0.15s;letter-spacing:-0.01em}
        .rest-filter-banner button:active{transform:scale(0.96);background:rgba(232,67,26,0.25)}
        @media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}
