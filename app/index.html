async function registerPushNotifications(motorizadoId) {
  try {

function ToastContainer({ toasts }) {
  return (<div className="toast-container">{toasts.map((t) => (<div key={t.id} className={`toast toast-${t.type}`}>{t.type === "success" && I.check}{t.type === "error" && I.alert}{t.type === "info" && I.clock}{t.type === "new" && "\u{1F514}"}<span>{t.message}</span></div>))}</div>);
}

function LoginScreen({ onLogin, toast }) {
  const [telefono, setTelefono] = useState("");
  const [pin, setPin] = useState("");
  const [loading, setLoading] = useState(false);
  const handleLogin = async (e) => {
    e.preventDefault();
    if (!telefono || !pin) { toast("Ingresa teléfono y PIN", "error"); return; }
    setLoading(true);
    try {
      const res = await apiCall(API.login, { telefono, pin });
      if (res.ok) { const user = { motorizado_id: cleanStr(String(res.motorizado_id)), nombre: cleanStr(res.nombre), telefono }; saveSession(user); onLogin(user); toast(`¡Bienvenido, ${user.nombre}!`, "success"); registerPushNotifications(user.motorizado_id).then(ok => { if(ok) toast("🔔 Notificaciones activadas", "info"); }); }
      else { toast(res.error || "Credenciales incorrectas", "error"); }
    } catch { toast("Error de conexión", "error"); }
    setLoading(false);
  };
  return (
    <div>
      <div className="splash-screen" id="splash" style={{opacity: typeof window !== "undefined" && window.__splashDone ? 0 : 1}}>
        <img src="logo.jpeg" className="splash-logo" alt="DEWAN" style={{width:180, borderRadius: 24, boxShadow: '0 8px 32px rgba(57, 255, 20, 0.2)'}} />
        <div className="splash-bar"><div className="splash-bar-fill"></div></div>
      </div>
      <div className="login-screen fade-in">
        <div className="login-logo" style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:40}}>
          <img src="logo.jpeg" style={{width:160, height: 160, objectFit: 'contain', borderRadius: 24, marginBottom:24, boxShadow: '0 8px 32px rgba(57, 255, 20, 0.15)', border: '1px solid rgba(255,255,255,0.05)'}} alt="DEWAN" />
          <h1 style={{fontFamily:"var(--font)",fontSize:28,fontWeight:700,color:"#fff",letterSpacing:-0.5, marginBottom: 8}}>Acceso Motorizado</h1>
          <p style={{fontFamily:"var(--font)",fontSize:12,fontWeight:600,color:"var(--accent)",letterSpacing:4,textTransform:"uppercase"}}>DEWAN APP</p>
        </div>
        <form className="login-form" onSubmit={handleLogin}>
          <div className="input-group"><label>Teléfono</label><input type="tel" placeholder="0999999999" value={telefono} onChange={(e) => setTelefono(e.target.value)} autoComplete="tel" /></div>
          <div className="input-group"><label>PIN de acceso</label><input type="password" placeholder="••••" value={pin} onChange={(e) => setPin(e.target.value)} maxLength={6} inputMode="numeric" /></div>
          <button type="submit" className="btn btn-primary btn-full" disabled={loading} style={{ marginTop: 8, height: 52 }}>{loading ? <div className="spinner spinner-sm" /> : "Iniciar Sesión"}</button>
        </form>
      </div>
    </div>
  );
}

function MapModal({ direccion, lat, lng, direccionRetiro, onClose }) {
  const hasCoords = lat && lng && lat !== "" && lng !== "" && lat !== "undefined" && lng !== "undefined";
  const coordStr = hasCoords ? `${lat},${lng}` : null;
  const encoded = hasCoords ? coordStr : encodeURIComponent(direccion + ", Riobamba, Ecuador");
  const mapUrl = hasCoords ? `https://www.google.com/maps/embed/v1/place?key=AIzaSyBktkFnRg3Lp8h93MktPzQ2XtAcim7lAhs&q=${lat},${lng}&zoom=17` : `https://www.google.com/maps/embed/v1/place?key=AIzaSyBktkFnRg3Lp8h93MktPzQ2XtAcim7lAhs&q=${encodeURIComponent(direccion + ", Riobamba, Ecuador")}&zoom=16`;
  const navUrl = hasCoords ? `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving` : `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(direccion + ", Riobamba, Ecuador")}&travelmode=driving`;
  const wazeUrl = hasCoords ? `https://waze.com/ul?ll=${lat},${lng}&navigate=yes` : `https://waze.com/ul?q=${encodeURIComponent(direccion + ", Riobamba, Ecuador")}&navigate=yes`;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal map-modal" onClick={(e) => e.stopPropagation()}>
        <div className="map-modal-header">
          <div>
            <h3 style={{ fontSize: 15 }}>📍 Entrega: {direccion}</h3>
            {direccionRetiro && <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 4 }}>📦 Retiro: {direccionRetiro}</div>}
            {hasCoords && <div style={{ fontSize: 10, color: "var(--accent)", marginTop: 2, fontFamily: "monospace" }}>GPS: {Number(lat).toFixed(6)}, {Number(lng).toFixed(6)}</div>}
          </div>
          <button className="btn btn-ghost btn-icon" onClick={onClose} style={{ width: 32, height: 32, flexShrink: 0 }}>{I.x}</button>
        </div>
        <iframe className="map-frame" src={mapUrl} allowFullScreen loading="lazy" referrerPolicy="no-referrer-when-downgrade" />
        <div className="map-modal-actions" style={{ flexDirection: "column", gap: 10 }}>
          <a href={navUrl} target="_blank" rel="noopener noreferrer" className="btn btn-primary btn-sm btn-full" style={{ textDecoration: "none" }}>{I.nav} Navegar (Google Maps)</a>
          <a href={wazeUrl} target="_blank" rel="noopener noreferrer" className="btn btn-ghost btn-sm btn-full" style={{ textDecoration: "none", color: "var(--info)" }}>🗺️ Abrir en Waze</a>
        </div>
      </div>
    </div>
  );
}

function ChatScreen({ chatInfo, user, onBack, toast }) {

  const prevPedidoIdsRef = useRef(new Set()); const prevDispIdsRef = useRef(new Set()); const intervalRef = useRef(null); const wakeLockRef = useRef(null); const keepaliveRef = useRef(null);

  useEffect(() => { const handler = (event) => { const pedido = event.detail; NotificationManager.startAlarm(); setAlarmPedidos([pedido]); toast('🔔 ¡Nuevo pedido via push!', 'new'); }; window.addEventListener('dewan-push-pedido', handler); return () => window.removeEventListener('dewan-push-pedido', handler); }, [toast]);
  useEffect(() => { const unlockAudio = () => { NotificationManager.init(); NotificationManager.unlock(); document.removeEventListener('touchstart', unlockAudio); document.removeEventListener('click', unlockAudio); }; document.addEventListener('touchstart', unlockAudio, { once: true }); document.addEventListener('click', unlockAudio, { once: true }); NotificationManager.init(); return () => { document.removeEventListener('touchstart', unlockAudio); document.removeEventListener('click', unlockAudio); }; }, []);
  useEffect(() => { const acquireWakeLock = async () => { try { if ('wakeLock' in navigator) { wakeLockRef.current = await navigator.wakeLock.request('screen'); wakeLockRef.current.addEventListener('release', () => { setTimeout(acquireWakeLock, 3000); }); } } catch (e) {} }; acquireWakeLock(); const onVisChange = () => { if (document.visibilityState === 'visible') acquireWakeLock(); }; document.addEventListener('visibilitychange', onVisChange); return () => { document.removeEventListener('visibilitychange', onVisChange); if (wakeLockRef.current) { wakeLockRef.current.release().catch(() => {}); } }; }, []);
  useEffect(() => { keepaliveRef.current = setInterval(() => { if (NotificationManager._unlocked && !NotificationManager._playing) { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const buf = ctx.createBuffer(1, 1, 22050); const src = ctx.createBufferSource(); src.buffer = buf; src.connect(ctx.destination); src.start(0); setTimeout(() => ctx.close().catch(() => {}), 200); } catch(e) {} } }, 20000); return () => clearInterval(keepaliveRef.current); }, []);

  const dismissAlarm = useCallback(() => { NotificationManager.stopAlarm(); setAlarmPedidos([]); }, []);
  const cargarPedidos = useCallback(async (showLoader = false) => {
    if (showLoader) setLoading(true);
    const res = await apiCall(API.pedidos, { motorizado_id: user.motorizado_id });
    if (res.ok) {
      const nuevos = res.pedidos || []; const currentIds = new Set(nuevos.filter((p) => p.estado !== "entregado").map((p) => p.pedido_id)); const prevIds = prevPedidoIdsRef.current; const brandNew = [...currentIds].filter((id) => !prevIds.has(id) && prevIds.size > 0);
      if (brandNew.length > 0) { const pedidosNuevos = nuevos.filter(p => brandNew.includes(p.pedido_id)); NotificationManager.startAlarm(); setAlarmPedidos(pedidosNuevos); toast(`🔔 ${brandNew.length} pedido${brandNew.length > 1 ? "s" : ""} nuevo${brandNew.length > 1 ? "s" : ""}!`, "new"); setNewPedidoIds(new Set(brandNew)); setTimeout(() => setNewPedidoIds(new Set()), 8000); }
      prevPedidoIdsRef.current = currentIds; setPedidos(nuevos);
      const disp = res.disponibles || []; const dispIds = new Set(disp.map(p => p.pedido_id)); const prevDisp = prevDispIdsRef.current; const dispNuevos = [...dispIds].filter(id => !prevDisp.has(id) && prevDisp.size > 0);
      if (dispNuevos.length > 0) { const pedDisp = disp.filter(p => dispNuevos.includes(p.pedido_id)); NotificationManager.startAlarm(); setAlarmPedidos(pedDisp); toast(`📡 ${dispNuevos.length} pedido${dispNuevos.length > 1 ? "s" : ""} disponible${dispNuevos.length > 1 ? "s" : ""}!`, "new"); }
      prevDispIdsRef.current = dispIds; setDisponibles(disp);
    }
    setLoading(false); setRefreshing(false);
  }, [user.motorizado_id, toast]);

  useEffect(() => { cargarPedidos(true); intervalRef.current = setInterval(() => cargarPedidos(false), 5000); return () => clearInterval(intervalRef.current); }, [cargarPedidos]);
  const handleRefresh = () => { setRefreshing(true); cargarPedidos(false); };
  const handleAction = (action, data) => { if (action === "chat") setChatInfo(data); else if (action === "rechazar") setRejectPedido(data); else cargarPedidos(false); };
  
  if (showRanking) return <RankingScreen user={user} onBack={() => setShowRanking(false)} />;
  if (chatInfo) return <ChatScreen chatInfo={chatInfo} user={user} onBack={() => setChatInfo(null)} toast={toast} />;
  
  const pedidosActivos = pedidos.filter((p) => p.estado !== "entregado"); const pedidosHistorial = pedidos.filter((p) => p.estado === "entregado"); const pendientes = pedidos.filter((p) => p.estado === "pendiente" || p.estado === "confirmado" || p.estado === "asignado").length; const enProceso = pedidos.filter((p) => p.estado === "aceptado" || p.estado === "en_camino").length; const listaPedidos = tab === "activos" ? pedidosActivos : pedidosHistorial;
  
  return (
    <div className="app-container">
      {alarmPedidos.length > 0 && <AlarmOverlay pedidos={alarmPedidos} onDismiss={dismissAlarm} />}
      <div className="header">
        <div className="header-left">
          <img src="logo.jpeg" alt="Logo" style={{ width: 44, height: 44, borderRadius: 14, objectFit: 'cover', border: '1.5px solid rgba(57, 255, 20, 0.3)', boxShadow: '0 4px 12px rgba(57, 255, 20, 0.15)' }} />
          <div><div className="header-title">{user.nombre}</div><div className="header-subtitle"><span className="status-dot" /> EN LÍNEA</div></div>
        </div>
        <div className="header-right"><button className="btn btn-ghost btn-icon" onClick={() => { NotificationManager.unlock(); NotificationManager.startAlarm(); setAlarmPedidos([{cliente:"TEST", detalle:"Prueba de alarma", direccion:"Test"}]); }} title="Probar alarma" style={{ color: "var(--warning)", fontSize: 14 }}>🔔</button><button className="btn btn-ghost btn-icon" onClick={handleRefresh} style={{ animation: refreshing ? "spin .6s linear infinite" : "none" }}>{I.refresh}</button><button className="btn btn-ghost btn-icon" onClick={() => { clearSession(); onLogout(); }} style={{ color: "var(--danger)" }}>{I.logout}</button></div>
      </div>
      <div className="stats-row"><div className="stat-card"><div className="stat-number" style={{ color: "var(--accent)" }}>{pedidosActivos.length}</div><div className="stat-label">Activos</div></div><div className="stat-card"><div className="stat-number" style={{ color: "var(--warning)" }}>{pendientes}</div><div className="stat-label">Pendientes</div></div><div className="stat-card"><div className="stat-number" style={{ color: "var(--info)" }}>{enProceso}</div><div className="stat-label">En Proceso</div></div></div>

      {disponibles.length > 0 && (
        <div style={{ padding: "0 20px 4px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10, marginTop: 4 }}><span style={{ fontSize: 18, animation: "pulse 1s infinite" }}>📡</span><span style={{ fontWeight: 700, fontSize: 14, color: "var(--accent)" }}>Pedidos Disponibles</span><span style={{ marginLeft: "auto", background: "var(--accent)", color: "#000", fontSize: 11, fontWeight: 800, padding: "2px 9px", borderRadius: 10, fontFamily: "monospace" }}>{disponibles.length}</span></div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>{disponibles.map(p => (<DisponibleCard key={p.pedido_id} pedido={p} user={user} onAceptado={() => cargarPedidos(false)} toast={toast} />))}</div>
          <div style={{ height: 1, background: "rgba(255,255,255,0.05)", margin: "16px 0 4px" }} />
        </div>
      )}

      <div className="tabs">
        <button className={`tab ${tab === "activos" ? "active" : ""}`} onClick={() => setTab("activos")}>{I.pkg} Activos {pedidosActivos.length > 0 && <span className="tab-badge">{pedidosActivos.length}</span>}</button>
        <button className={`tab ${tab === "historial" ? "active" : ""}`} onClick={() => setTab("historial")}>{I.history} Historial {pedidosHistorial.length > 0 && <span className="tab-badge" style={{ background: "rgba(255,255,255,0.2)", color: "#fff" }}>{pedidosHistorial.length}</span>}</button>
        <button className="tab" onClick={() => setShowRanking(true)} style={{ color: "#fbbf24" }}>🏆 Ranking</button>
      </div>
      {tab === "historial" && pedidosHistorial.length > 0 && <HistoryStats pedidos={pedidos} />}
      {loading ? <div className="loading-overlay"><div className="spinner" /></div> : listaPedidos.length === 0 ? (
        <div className="empty-state fade-in"><div className="empty-icon">{tab === "activos" ? "📦" : "📊"}</div><div className="empty-title">{tab === "activos" ? "Sin pedidos activos" : "Sin entregas aún"}</div><div className="empty-text">{tab === "activos" ? "Los nuevos pedidos aparecerán aquí automáticamente" : "Las entregas completadas se mostrarán aquí"}</div></div>
      ) : <div className="pedido-list">{listaPedidos.map((p) => <PedidoCard key={p.pedido_id} pedido={p} user={user} onAction={handleAction} toast={toast} isNew={newPedidoIds.has(p.pedido_id)} />)}</div>}
      {rejectPedido && <RejectModal pedido={rejectPedido} user={user} onClose={() => setRejectPedido(null)} onDone={() => { setRejectPedido(null); cargarPedidos(false); }} toast={toast} />}
    </div>
  );
}

function App() {
  const [user, setUser] = useState(() => getSession()); const [toasts, setToasts] = useState([]);
  const addToast = useCallback((message, type = "info") => { const id = Date.now(); setToasts((prev) => [...prev, { id, message, type }]); setTimeout(() => setToasts((prev) => prev.filter((t) => t.id !== id)), 4000); }, []);
  useEffect(() => { if (user?.motorizado_id) { registerPushNotifications(user.motorizado_id); } }, [user]);

  useEffect(() => {
    if (!('serviceWorker' in navigator)) return;
    const handler = (event) => {
      const msg = event.data; if (!msg) return;
      if (msg.type === 'NUEVO_PEDIDO_PUSH') {
        NotificationManager.init(); NotificationManager.startAlarm();
        const pedidoPush = { cliente: msg.cliente || 'Cliente', detalle: msg.detalle || '', direccion: msg.direccion || '', direccion_retiro: msg.direccion_retiro || '', pedido_id: msg.pedido_id };
        window.__dewanPushPedido = pedidoPush; window.dispatchEvent(new CustomEvent('dewan-push-pedido', { detail: pedidoPush }));
      }
    };
    navigator.serviceWorker.addEventListener('message', handler); return () => navigator.serviceWorker.removeEventListener('message', handler);
  }, []);
  return (<><style>{globalStyles}</style><ToastContainer toasts={toasts} />{user ? <Dashboard user={user} onLogout={() => setUser(null)} toast={addToast} /> : <LoginScreen onLogin={setUser} toast={addToast} />}</>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

setTimeout(() => {
  const s = document.getElementById('splash');
  if (s) { s.style.opacity = '0'; setTimeout(() => s.style.display = 'none', 500); }
  window.__splashDone = true;
}, 2000);
</script>
</body>
</html>
